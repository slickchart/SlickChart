<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SlickChart — Offline</title>
<style>
  html,body{height:100%;margin:0;}
  body{background:#0d0d0d;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .box{max-width:360px;}
  .logo{width:56px;height:56px;border-radius:16px;background:#C8A882;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;}
  h1{font-size:20px;font-weight:600;margin:0 0 8px;}
  p{color:#a99e91;font-size:14px;line-height:1.6;margin:0 0 20px;}
  button{background:#C8A882;color:#1a1208;border:none;border-radius:10px;padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">🌿</div>
    <h1>You're offline</h1>
    <p>SlickChart needs an internet connection to sync your account. Check your connection and try again.</p>
    <button onclick="(window.slickchartDesktop&&window.slickchartDesktop.retry)?window.slickchartDesktop.retry():location.reload()">Retry</button>
  </div>
</body>
</html>
