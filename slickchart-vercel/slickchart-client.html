<style>
*{box-sizing:border-box;margin:0;padding:0;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
:root{
  --accent:#C8A882;--accent-2:#2C5F8A;--accent-ink:#1a1208;
  --accent-tint:#2a231b;--accent-tint2:#3c3227;
  --accent-lt:#f5ede3;--accent-lt2:#f5e6d3;
  --accent-a20:rgba(200,168,130,.125);--accent-a30:rgba(200,168,130,.19);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0eb;display:flex;justify-content:center;padding:24px 0 48px;min-height:100vh;}
.shell{width:390px;background:#fff;border-radius:24px;border:1px solid #e8e0d8;overflow:hidden;min-height:720px;display:flex;flex-direction:column;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.08);}
@media (max-width:480px){
  html,body{height:100%;}
  body{padding:0;min-height:100%;background:#fff;overflow:hidden;}
  .shell{width:100%;max-width:100%;height:100vh;height:100dvh;min-height:0;border-radius:0;border:none;box-shadow:none;}
}
.sb{background:#fff;padding:10px 20px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sb span{font-size:13px;font-weight:500;color:#1a1a1a;}
.sb .ic{display:flex;gap:6px;font-size:12px;color:#1a1a1a;}
.topbar{background:#fff;padding:10px 16px 13px;border-bottom:1px solid #f0ebe4;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo i{font-size:15px;color:#fff;}
#tt{font-size:17px;font-weight:500;color:#1a1a1a;flex:1;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-lt2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;border:1.5px solid #e8d5c0;}
main.scr{flex:1;overflow-y:auto;padding-bottom:72px;}
main.scr::-webkit-scrollbar{display:none;}
nav.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0ebe4;display:flex;padding:6px 0 12px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px 0;border:none;background:none;min-height:44px;justify-content:center;}
.ni i{font-size:18px;color:#c4b9ae;}
.ni span{font-size:10px;color:#c4b9ae;font-weight:500;}
.ni.active i,.ni.active span{color:var(--accent);}
.ni:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
.card{background:#fff;border:1px solid #f0ebe4;border-radius:14px;margin:0 16px 10px;padding:16px;cursor:pointer;}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.sh{padding:14px 16px 7px;}
.swipe-card{transition:transform .2s;touch-action:pan-y;position:relative;z-index:1;}
.swipe-reveal{position:absolute;right:0;top:0;bottom:0;width:80px;z-index:0;background:#e6f4ec;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border-radius:0 13px 13px 0;}
.swipe-reveal i{font-size:18px;color:#2e9e6b;}
.swipe-reveal span{font-size:10px;color:#2e9e6b;font-weight:700;letter-spacing:.04em;}
.sh h2{font-size:11px;font-weight:600;color:#b8a898;text-transform:uppercase;letter-spacing:.08em;}
.btnp{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
.btnp:focus-visible{outline:2px solid #9a7d5e;outline-offset:2px;}
.btng{background:#fff;border:1.5px solid #e8ddd3;border-radius:10px;padding:10px 14px;font-size:13px;color:#6b5d52;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.btng:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.back{background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;font-weight:500;display:flex;align-items:center;gap:4px;padding:0;min-height:44px;}
.back:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
.pill-row{display:flex;gap:6px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;}
.pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;border:1.5px solid #e8ddd3;color:#9a8a7e;background:#fff;cursor:pointer;white-space:nowrap;font-weight:500;}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.fi{width:100%;background:#faf7f4;border:1.5px solid #e8ddd3;border-radius:10px;padding:10px 12px;font-size:14px;color:#1a1a1a;font-family:inherit;}
.fi:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent);}
.tag{font-size:12px;padding:5px 12px;border-radius:20px;background:var(--accent-lt);color:#8b6b4a;border:none;font-weight:500;display:inline-block;}
.divider{height:1px;background:#f0ebe4;margin:0 16px;}
/* Progress bar */
.prog-track{height:6px;background:#f0ebe4;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#e0b88a);}
/* Countdown ring */
.ring-wrap{position:relative;width:80px;height:80px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-wrap .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
/* Message bubbles */
.bub-them{background:#f5f0eb;color:#1a1a1a;border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:80%;align-self:flex-start;overflow-wrap:break-word;}
.bub-me{background:var(--accent);color:#fff;border-radius:16px;border-bottom-right-radius:4px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:80%;align-self:flex-end;overflow-wrap:break-word;}
/* Check circle */
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid #e8ddd3;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.check-circle.done{background:var(--accent);border-color:var(--accent);}
.check-circle.done i{color:#fff;}
/* Stat card */
.stat{background:#faf7f4;border-radius:12px;padding:12px 14px;flex:1;}
/* Skin score arc */
.score-arc{position:relative;width:120px;height:64px;overflow:hidden;}
.score-arc svg{position:absolute;top:0;left:0;}
@media print{
  .sb,.topbar,.nav,#client-notif-bell,.no-print{display:none !important;}
  .shell{box-shadow:none !important;border:none !important;border-radius:0 !important;width:100% !important;max-width:100% !important;height:auto !important;overflow:visible !important;}
  #S{overflow:visible !important;height:auto !important;}
  body{background:#fff !important;}
}
</style>

<body>
<div class="shell">
  <div class="sb"><span>9:41</span><span class="ic"><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span></div>
  <div class="topbar">
    <button id="topbar-back" onclick="navBack()" aria-label="Go back" style="display:none;align-items:center;gap:3px;background:var(--accent-a20);border:1px solid var(--accent-a30);cursor:pointer;height:30px;padding:0 11px 0 8px;border-radius:8px;flex-shrink:0;margin-left:-2px;font-family:inherit;"><i class="ti ti-chevron-left" aria-hidden="true" style="font-size:17px;color:#8b6b4a;"></i><span style="font-size:13px;font-weight:600;color:#8b6b4a;">Back</span></button>
    <div class="logo" id="topbar-logo"><i class="ti ti-sparkles" aria-hidden="true"></i></div>
    <span id="tt">SlickChart</span>
    <button onclick="nav('notifications')" id="client-notif-bell" aria-label="Notifications" style="position:relative;background:none;border:none;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;margin-left:auto;margin-right:2px;">
      <i class="ti ti-bell" aria-hidden="true" style="font-size:20px;color:#9a8a7e;"></i>
      <span id="client-notif-badge" style="position:absolute;top:1px;right:1px;min-width:16px;height:16px;padding:0 3px;background:#e87070;border-radius:8px;font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;border:2px solid #fff;">0</span>
    </button>
    <button class="avatar" data-nav="profile" aria-label="Settings"><i class="ti ti-settings" aria-hidden="true" style="font-size:16px;"></i></button>
  </div>
  <main class="scr" id="S" aria-live="polite" aria-label="App content"></main>
  <nav class="nav" aria-label="Main navigation">
    <button class="ni active" id="ni-home" data-nav="home" aria-label="Home"><i class="ti ti-home" aria-hidden="true"></i><span>Home</span></button>
    <button class="ni" id="ni-journey" data-nav="journey" aria-label="My journey"><i class="ti ti-chart-line" aria-hidden="true"></i><span>Journey</span></button>
    <button class="ni" id="ni-homecare" data-nav="homecare" aria-label="Homecare"><i class="ti ti-droplet" aria-hidden="true"></i><span>Homecare</span></button>
    <button class="ni" id="ni-messages" data-nav="messages" aria-label="Messages"><i class="ti ti-message-circle" aria-hidden="true"></i><span>Messages</span></button>
    <button class="ni" id="ni-shop" data-nav="shop" aria-label="Recommended products"><i class="ti ti-shopping-bag" aria-hidden="true"></i><span>Shop</span></button>
  </nav>
</div>
<script>
const S=document.getElementById('S');

/* ════════════════════════════════════════════════════════════════
   SLICKBRIDGE — cross-app channel (provider tab ⇆ client tab)
   Uses localStorage for persistence + storage events + BroadcastChannel
   for live delivery between the two SlickChart apps on the same origin.
   ════════════════════════════════════════════════════════════════ */
const SlickBridge=(function(){
  const K_BOOKINGS='sc_bookings';
  const K_AVAIL='sc_availability';
  const K_BUS='sc_bus';
  const handlers={};
  let bc=null;
  try{bc=new BroadcastChannel('slickchart');}catch(e){bc=null;}

  function read(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
  function write(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

  function emit(type,payload){
    (handlers[type]||[]).forEach(fn=>{try{fn(payload);}catch(e){console.warn(e);}});
  }
  let _seen=null;
  try{const cur=read(K_BUS,null);if(cur&&cur.id)_seen=cur.id;}catch(e){}
  function _ingest(m){if(!m||!m.id||m.id===_seen)return;_seen=m.id;emit(m.type,m.payload);}
  function post(type,payload){
    const msg={type,payload,t:Date.now(),id:'m'+Math.random().toString(36).slice(2)};
    _seen=msg.id;                     // our own echo won't re-fire
    write(K_BUS,msg);                 // fires 'storage' in OTHER tabs
    if(bc){try{bc.postMessage(msg);}catch(e){}}  // live in other tabs
    emit(type,payload);               // local same-tab listeners
  }
  function on(type,fn){(handlers[type]=handlers[type]||[]).push(fn);}

  // Inbound from other tab via storage event
  window.addEventListener('storage',e=>{
    if(e.key===K_BUS&&e.newValue){
      try{_ingest(JSON.parse(e.newValue));}catch(_){}
    }
  });
  // Inbound from other tab via BroadcastChannel
  if(bc)bc.onmessage=e=>{_ingest(e.data);};
  // Fallback: storage/BroadcastChannel don't fire reliably between locally-opened files, so poll the shared bus too (deduped by id)
  setInterval(()=>{try{_ingest(read(K_BUS,null));}catch(e){}},700);

  return{
    post,on,
    getBookings:()=>read(K_BOOKINGS,[]),
    setBookings:(arr)=>write(K_BOOKINGS,arr),
    upsertBooking(b){const all=read(K_BOOKINGS,[]);const i=all.findIndex(x=>x.id===b.id);if(i>=0)all[i]=b;else all.unshift(b);write(K_BOOKINGS,all);return b;},
    getAvailability:()=>read(K_AVAIL,null),
  };
})();

/* Shared URL helpers — provider-supplied product/guide/site URLs reach the client via
   sync, so treat them as untrusted: block unsafe schemes, prefix bare domains, and
   escape for the href="" attribute and for display text. */
function _safeUrl(u){
  u=String(u||'').trim();if(!u)return'';
  if(/^[a-z][a-z0-9+.-]*:/i.test(u)&&!/^https?:\/\//i.test(u))return'';   // reject javascript:, data:, file:, ...
  return /^https?:\/\//i.test(u)?u:'https://'+u;
}
function _urlAttr(u){return String(u||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Safe <img src> value: only allow data:image/* and http(s) URLs (blocks a crafted
// javascript:/other scheme sneaking through a data field), and escape it so a stray
// quote can't break out of the src="…" attribute.
function _imgSrc(u){u=String(u||'').trim();if(!u)return'';if(!/^data:image\//i.test(u)&&!/^https?:\/\//i.test(u)&&!/^blob:/i.test(u))return'';return _urlAttr(u);}
function _txt(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Emoji-safe initials (first letter of the first two words). Uses Array.from so a name with
// an emoji or other multi-byte character yields a whole glyph, not a broken half-surrogate.
function _initialsOf(name){var parts=String(name==null?'':name).trim().split(/\s+/).filter(Boolean);var ini=parts.slice(0,2).map(function(w){return Array.from(w)[0]||'';}).join('');return (ini||'?').toUpperCase();}
// Convert a display time like "2:30 PM" to the HHMMSS form _apptParts expects, so a booked
// appointment's calendar event lands at the real time rather than the noon fallback. Returns
// '' for anything unparseable (callers then fall back to the existing behavior).
function _timeTo24ISO(t){var m=String(t==null?'':t).trim().match(/^(\d{1,2}):(\d{2})\s*([AaPp][Mm])?$/);if(!m)return '';var h=parseInt(m[1],10),mi=parseInt(m[2],10),ap=(m[3]||'').toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;if(h<0||h>23||mi<0||mi>59)return '';return String(h).padStart(2,'0')+String(mi).padStart(2,'0')+'00';}
// Escape a value for safe placement inside a single-quoted JS string in an inline handler
// (onclick="fn('…')"). Backslash MUST be escaped first, otherwise a name like  x\'+code+'
// would slip an apostrophe through and break out of the string. Also neutralizes < so a
// stray closing script tag in the data can't terminate the surrounding block.
function _jsAttr(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,'\\n').replace(/\r/g,'').replace(/</g,'\\x3c');}
// Time-of-day greeting based on the client's own device clock.
function _greeting(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';}

/* ════════════════════════════════════════════════════════════════
   PUSH ENGINE — real Web Notifications API with graceful fallback.
   Fires a true system notification when permission is granted and the
   tab is backgrounded; otherwise shows an in-app push-style banner.
   Always records to the in-app notification center (the bell).
   ════════════════════════════════════════════════════════════════ */
const Push=(function(){
  const supported=typeof window!=='undefined'&&'Notification'in window;
  function permission(){return supported?Notification.permission:'unsupported';}
  async function request(){
    if(!supported)return 'unsupported';
    try{
      let p=Notification.permission;
      if(p==='default')p=await Notification.requestPermission();
      return p;
    }catch(e){return 'blocked';}
  }
  function inQuietHours(prefs){
    if(!prefs||!prefs.quietStart||!prefs.quietEnd)return false;
    const now=new Date();const cur=now.getHours()*60+now.getMinutes();
    const[sh,sm]=prefs.quietStart.split(':').map(Number);
    const[eh,em]=prefs.quietEnd.split(':').map(Number);
    const start=sh*60+sm,end=eh*60+em;
    return start<end ? (cur>=start&&cur<end) : (cur>=start||cur<end); // overnight wrap
  }
  function fireSystem(title,body,onclick){
    try{
      const n=new Notification(title,{body,tag:'slickchart',icon:'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="%23C8A882"/%3E%3C/svg%3E'});
      n.onclick=()=>{window.focus();if(onclick)onclick();n.close();};
      return true;
    }catch(e){return false;}
  }
  return{supported,permission,request,inQuietHours,fireSystem};
})();

/* In-app notification center (the bell) */
let clientNotifs=[
  {id:'cn1',type:'messagereply',icon:'ti-message-circle',col:'#f0f5ff',ic:'#5ba3e8',title:'New message from Jessica',body:'"Looking forward to seeing you! Remember to skip retinol 3 days before."',time:'2h ago',read:false},
  {id:'cn2',type:'summaryReady',icon:'ti-file-text',col:'var(--accent-lt)',ic:'var(--accent)',title:'Your session summary is ready',body:'Notes & homecare from your June 26 Hydrafacial are now in the app.',time:'2 days ago',read:true},
];
function clientUnread(){return clientNotifs.filter(n=>!n.read).length;}
function updateClientBadge(){
  const b=document.getElementById('client-notif-badge');if(!b)return;
  const c=clientUnread();
  b.textContent=c>99?'99+':c;
  b.style.display=c>0?'flex':'none';
}
function markClientRead(id){const n=clientNotifs.find(x=>x.id===id);if(n)n.read=true;updateClientBadge();}

/* central fire point used everywhere a notification should happen */
function pushNotify(o){
  // o = {type,title,body,icon,col,ic,onclick}
  const entry={id:'cn'+Date.now()+Math.random().toString(36).slice(2,5),type:o.type||'general',
    icon:o.icon||'ti-bell',col:o.col||'var(--accent-lt)',ic:o.ic||'var(--accent)',
    title:o.title,body:o.body||'',time:'Just now',read:false};
  clientNotifs.unshift(entry);
  updateClientBadge();

  const prefs=loadNotifPrefs();
  const typeOn=o.type?prefs[o.type]!==false:true;
  const allowed=o.force||(prefs.enabled&&typeOn&&!Push.inQuietHours(prefs));
  if(!allowed)return entry; // recorded in center, but no push/banner (off or quiet hours)

  const fireApp=()=>showPushBanner(entry,o.onclick);
  if(Push.permission()==='granted'&&document.hidden){
    if(!Push.fireSystem(o.title,o.body,o.onclick))fireApp();
  }else{
    fireApp();
  }
  return entry;
}

/* in-app banner styled like a phone push notification */
function showPushBanner(n,onclick){
  const old=document.getElementById('push-banner');if(old)old.remove();
  const shell=document.querySelector('.shell');if(!shell)return;
  const el=document.createElement('div');
  el.id='push-banner';
  el.style.cssText='position:absolute;top:8px;left:8px;right:8px;z-index:500;background:rgba(255,255,255,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(0,0,0,.06);border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.18);padding:11px 13px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transform:translateY(-130%);transition:transform .34s cubic-bezier(.2,.9,.3,1.3);';
  el.innerHTML=`
    <div style="width:36px;height:36px;border-radius:9px;background:${n.col};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <i class="ti ${n.icon}" aria-hidden="true" style="font-size:18px;color:${n.ic};"></i>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;">
        <span style="font-size:13px;font-weight:700;color:#1a1a1a;">SlickChart</span>
        <span style="font-size:11px;color:#b8a898;flex-shrink:0;">now</span>
      </div>
      <div style="font-size:13px;font-weight:600;color:#1a1a1a;margin-top:1px;">${_txt(n.title)}</div>
      ${n.body?`<div style="font-size:12px;color:#6b5d52;line-height:1.45;margin-top:2px;">${_txt(n.body)}</div>`:''}
    </div>`;
  el.onclick=()=>{markClientRead(n.id);el.remove();if(onclick)onclick();else nav('notifications');};
  shell.appendChild(el);
  requestAnimationFrame(()=>{el.style.transform='translateY(0)';});
  setTimeout(()=>{if(el.parentNode){el.style.transform='translateY(-130%)';setTimeout(()=>el.remove(),350);}},5200);
}

function initSwipe(card,i){
  if(!card||card._swipeInit)return;card._swipeInit=true;
  const W=80;
  let startX=0,startY=0,dx=0,dragging=false,opened=false,decided=false,horiz=false;
  const setX=x=>{card.style.transform='translateX('+x+'px)';};
  const open=()=>{opened=true;card.style.transition='transform .2s';card.style.transform='translateX(-'+W+'px)';};
  const close=()=>{opened=false;card.style.transition='transform .2s';card.style.transform='translateX(0px)';};
  const closeOthers=()=>{try{document.querySelectorAll('.swipe-card').forEach(el=>{if(el!==card){el.style.transition='transform .2s';el.style.transform='translateX(0px)';if(el._setClosed)el._setClosed();}});}catch(e){}};
  card._setClosed=()=>{opened=false;};
  const onStart=(x,y)=>{startX=x;startY=y;dx=opened?-W:0;dragging=true;decided=false;horiz=false;card.style.transition='none';};
  const onMove=(x,y)=>{
    if(!dragging)return;
    const mx=x-startX,my=y-startY;
    if(!decided){if(Math.abs(mx)>6||Math.abs(my)>6){decided=true;horiz=Math.abs(mx)>Math.abs(my);}else return;}
    if(!horiz){dragging=false;card.style.transition='transform .2s';setX(opened?-W:0);return;}
    let nx=(opened?-W:0)+mx;if(nx>0)nx=0;if(nx<-W-20)nx=-W-20;dx=nx;setX(nx);
  };
  const onEnd=()=>{
    if(!dragging)return;dragging=false;
    if(!horiz){card.style.transition='transform .2s';return;}
    if(dx<-W/2){closeOthers();open();}else{close();}
  };
  card.addEventListener('touchstart',e=>{if(e.touches&&e.touches[0])onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{if(e.touches&&e.touches[0])onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchend',onEnd);card.addEventListener('touchcancel',onEnd);
  card.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);const mm=ev=>onMove(ev.clientX,ev.clientY);const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
}

/* ════════════════════════════════════════════════════════════════
   BRAND THEMING — client-facing screens inherit the provider's
   brand colors (set in the provider app's Branding section).
   ════════════════════════════════════════════════════════════════ */
function _hexA(hex,a){const h=hex.replace('#','');return`rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
function _ink(hex){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return((r*299+g*587+b*114)/1000)>=140?'#181410':'#ffffff';}
function _mixDark(hex,f){const h=hex.replace('#','');const m=(c)=>Math.round(parseInt(c,16)*f).toString(16).padStart(2,'0');return`#${m(h.slice(0,2))}${m(h.slice(2,4))}${m(h.slice(4,6))}`;}
function _mixLight(hex,wa){const h=hex.replace('#','');const f=(c)=>Math.round(parseInt(c,16)*(1-wa)+255*wa).toString(16).padStart(2,'0');return`#${f(h.slice(0,2))}${f(h.slice(2,4))}${f(h.slice(4,6))}`;}
function loadClientBrand(){try{const s=localStorage.getItem('sc_brand_colors');if(s)return JSON.parse(s);}catch(e){}return{primary:'#C8A882',secondary:'#2C5F8A'};}
let clientBrand=loadClientBrand();
function applyClientTheme(b){
  if(b)clientBrand=b;
  // Provider brand colors arrive via sync and may be missing, malformed, or a named
  // color — any of which would make the hex math below produce "#NaNNaNNaN" (invalid
  // CSS the browser ignores, breaking every tint). Normalize to a valid 6-digit hex,
  // falling back to the default accent so the theme always renders.
  const _normHex=(c,fallback)=>{
    c=String(c==null?'':c).trim();
    if(/^#?[0-9a-fA-F]{6}$/.test(c))return c[0]==='#'?c:('#'+c);
    if(/^#?[0-9a-fA-F]{3}$/.test(c)){const x=c.replace('#','');return '#'+x[0]+x[0]+x[1]+x[1]+x[2]+x[2];}
    return fallback;
  };
  const p=_normHex(clientBrand.primary,'#C8A882'),s=_normHex(clientBrand.secondary,'#2C5F8A'),root=document.documentElement;
  root.style.setProperty('--accent',p);
  root.style.setProperty('--accent-2',s);
  root.style.setProperty('--accent-ink',_ink(p));
  root.style.setProperty('--accent-tint',_mixDark(p,0.21));
  root.style.setProperty('--accent-tint2',_mixDark(p,0.30));
  root.style.setProperty('--accent-lt',_mixLight(p,0.80));
  root.style.setProperty('--accent-lt2',_mixLight(p,0.72));
  root.style.setProperty('--accent-a20',_hexA(p,0.125));
  root.style.setProperty('--accent-a30',_hexA(p,0.19));
  updateTopbarLogo();
}

// Sync the active provider's details into the flat fields the app reads everywhere
let APPT=new Date('2026-07-17T10:00:00');
let messages=[];
function _saveClientMessages(){
  try{
    const map={};
    (client.providers||[]).forEach(p=>{map[p.id]=p.thread||[];});
    localStorage.setItem('sc_client_messages',JSON.stringify(map));
  }catch(e){}
}
function _loadClientMessagesInto(p){
  try{
    const raw=localStorage.getItem('sc_client_messages');
    if(raw){const map=JSON.parse(raw);if(map&&Array.isArray(map[p.id])&&map[p.id].length)p.thread=map[p.id];}
  }catch(e){}
}
function activeProvider(){return client.providers.find(p=>p.id===client.activeProviderId)||client.providers[0];}
function recomputeCountdown(){
  // Real clients count from the actual current date; the demo stays pinned to its
  // seeded "today" (TODAY) so the sample countdown reads coherently whenever it's viewed.
  const now=(client._real)?new Date():new Date(TODAY);
  // If the appointment date is missing or unparseable (e.g. nothing scheduled yet),
  // there's no countdown — mark it as such so the UI can show "Not scheduled" instead
  // of "NaN days away" or a broken progress ring. new Date(null) yields the 1970 epoch
  // rather than an Invalid Date, so also reject anything before year 2000.
  if(!APPT||isNaN(APPT.getTime())||APPT.getFullYear()<2000){
    client.daysUntilNext=null;client.hoursUntilNext=0;
    client.isThisWeek=false;client.isTomorrow=false;client.isToday=false;client.hasNextAppt=false;
    return;
  }
  client.hasNextAppt=true;
  // Count whole calendar days between today and the appointment, ignoring time-of-day
  // so an appointment later *today* reads as 0 ("Today!"), not 1. Using midnight-to-
  // midnight avoids the off-by-one that raw ms subtraction + Math.ceil produced.
  const startOfToday=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const apptDay=new Date(APPT.getFullYear(),APPT.getMonth(),APPT.getDate());
  const daysLeft=Math.round((apptDay-startOfToday)/(1000*60*60*24));
  client.daysUntilNext=daysLeft;
  client.hoursUntilNext=Math.max(0,Math.floor((APPT-now)/(1000*60*60)));
  // "This week" = within the next 7 days and not already past.
  client.isThisWeek=daysLeft>=0&&daysLeft<=7;client.isTomorrow=daysLeft===1;client.isToday=daysLeft===0;
}

  client.nextDate=p.nextDate;client.nextTime=p.nextTime;

}

// Derive the appointment's local date/time parts from a reliable source. For real
// clients nextDateISO/nextTimeISO are empty, so we fall back to APPT (parsed from
// apptISO). Returns local wall-clock parts — calendar files should use floating local
// time (no trailing Z), otherwise a 10am local appointment lands at 10am UTC.
function _apptParts(){
  let d=null;
  // Prefer the explicit ISO fields when present AND well-formed (demo data supplies them).
  if(client.nextDateISO&&client.nextTimeISO&&/^\d{8}$/.test(client.nextDateISO)&&/^\d{6}$/.test(client.nextTimeISO)){
    // These were historically stored UTC-shifted; reconstruct the intended instant then
    // read back local parts so the calendar shows the right wall-clock time.
    const Y=+client.nextDateISO.slice(0,4),Mo=+client.nextDateISO.slice(4,6)-1,Da=+client.nextDateISO.slice(6,8);
    const H=+client.nextTimeISO.slice(0,2),Mi=+client.nextTimeISO.slice(2,4);
    d=new Date(Date.UTC(Y,Mo,Da,H,Mi,0));
  } else if(APPT&&!isNaN(APPT.getTime())&&APPT.getFullYear()>=2000){
    d=new Date(APPT);
  }
  if(!d||isNaN(d.getTime()))return null;
  const p=n=>String(n).padStart(2,'0');
  return {
    date:d.getFullYear()+p(d.getMonth()+1)+p(d.getDate()),
    time:p(d.getHours())+p(d.getMinutes())+'00',
    dObj:d
  };
}
// Escape a value for an iCal text field (RFC 5545): backslash, semicolon, comma, newlines.
function _icsEsc(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');}
function buildICS(){
  const parts=_apptParts();
  const dtstamp=(function(){const d=new Date();const p=n=>String(n).padStart(2,'0');return d.getUTCFullYear()+p(d.getUTCMonth()+1)+p(d.getUTCDate())+'T'+p(d.getUTCHours())+p(d.getUTCMinutes())+p(d.getUTCSeconds())+'Z';})();
  const uid='slickchart-'+((parts&&parts.date)||'appt')+'-'+Math.random().toString(36).slice(2,8)+'@slickchart.app';
  const dur=(parseInt(client.durationMins,10)||60);
  const lines=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SlickChart//EN','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'DTSTAMP:'+dtstamp,
    // Floating local time (no Z) so the event shows at the provider's local wall-clock time.
    parts?('DTSTART:'+parts.date+'T'+parts.time):'DTSTART:'+dtstamp,
    'DURATION:PT'+dur+'M',
    'SUMMARY:'+_icsEsc(client.treatment+' with '+client.provider),
    'DESCRIPTION:'+_icsEsc('Your '+client.treatment+' appointment at '+client.studio+'.\nAddress: '+(client.studioAddress||'')+'\nPhone: '+(client.studioPhone||'')),
    'LOCATION:'+_icsEsc(client.studioAddress||client.studio||''),
    'END:VEVENT','END:VCALENDAR'
  ];
  return lines.join('\r\n');
}

function downloadICS(){
  const blob=new Blob([buildICS()],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='slickchart-appointment.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  closeCalModal();
  showToast('Appointment file downloaded! Open it to add to your calendar.');
}

function openGoogleCal(){
  const parts=_apptParts();
  if(!parts){closeCalModal();showToast('No appointment date to add yet.');return;}
  const start=parts.date+'T'+parts.time;   // floating local time (Google uses the user's cal tz)
  const dur=(parseInt(client.durationMins,10)||60);
  const e=new Date(parts.dObj.getTime()+dur*60000);
  const pad=n=>String(n).padStart(2,'0');
  const end=e.getFullYear()+pad(e.getMonth()+1)+pad(e.getDate())+'T'+pad(e.getHours())+pad(e.getMinutes())+'00';
  const url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(client.treatment+' with '+client.provider)}&dates=${start}/${end}&details=${encodeURIComponent('Your '+client.treatment+' at '+client.studio)}&location=${encodeURIComponent(client.studioAddress||client.studio||'')}`;
  window.open(url,'_blank');
  closeCalModal();
}

// Reliable clipboard copy with a fallback for webviews/older browsers where the async
// clipboard API is missing — otherwise a copy could silently fail while still telling the
// client it succeeded. Runs onDone only when the copy actually went through.
function _clientCopy(text,onDone,onFail){
  const ok=()=>{try{onDone&&onDone();}catch(e){}};
  const fail=()=>{try{onFail&&onFail();}catch(e){}};
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(String(text)).then(ok).catch(()=>_clientCopyFallback(text,ok,fail));return;}
  }catch(e){}
  _clientCopyFallback(text,ok,fail);
}
function _clientCopyFallback(text,ok,fail){
  try{
    const ta=document.createElement('textarea');ta.value=String(text);ta.style.cssText='position:fixed;top:-1000px;left:-1000px;';
    document.body.appendChild(ta);ta.focus();ta.select();
    const done=document.execCommand('copy');document.body.removeChild(ta);
    if(done)ok();else fail();
  }catch(e){fail();}
}

// localStorage is kept only as an instant-load cache now; the server is the
// actual source of truth, so settings survive a cleared browser or a new device.
let _prefsSyncTimer=null;
function _collectClientPrefs(){
  let welcomeDismissed=[];try{welcomeDismissed=JSON.parse(localStorage.getItem('sc_welcome_dismissed')||'[]');}catch(e){}
  const installDismissed=(function(){try{return localStorage.getItem('sc_install_dismissed')==='1';}catch(e){return false;}})();

function _syncClientPrefsToServer(){
  if(!client._real||!client._token)return; // nothing to sync in local/demo mode
  clearTimeout(_prefsSyncTimer);
  _prefsSyncTimer=setTimeout(()=>{
    fetch('/api/client-prefs?t='+encodeURIComponent(client._token),{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prefs:_collectClientPrefs()})
    }).catch(e=>console.error('[client prefs] save failed:',e&&e.message));
  },900);
}
async function _loadClientPrefsFromServer(){
  if(!client._real||!client._token)return;
  try{
    const r=await fetch('/api/client-prefs?t='+encodeURIComponent(client._token));
    const j=await r.json();
    if(!(j&&j.ok&&j.prefs&&Object.keys(j.prefs).length))return; // nothing saved server-side yet — keep local defaults
    const p=j.prefs;
    if(p.notif)saveNotifPrefs(p.notif);
    if(p.eng){_eng=Object.assign(_eng,p.eng);try{localStorage.setItem('sc_client_engage',JSON.stringify(_eng));}catch(e){}

    if(typeof p.installDismissed==='boolean')try{localStorage.setItem('sc_install_dismissed',p.installDismissed?'1':'0');}catch(e){}
  }catch(e){ console.error('[client prefs] load failed:',e&&e.message); /* fall back to whatever's cached locally */ }
}
function _engStreakLive(){return _eng.lastDoneDay===_engToday()||_eng.lastDoneDay===_engYesterday();}

function _engProgress(){const s=_engSteps();const total=s.length;const done=s.filter(x=>homecareChecked[x.key]).length;return {total,done,pct:total?Math.round(done/total*100):0};}
function toggleHomecareStep(key,where){
  homecareChecked[key]=!homecareChecked[key];
  _eng.steps=Object.assign({},homecareChecked);_eng.day=_engToday();
  const s=_engSteps();const allDone=s.length>0&&s.every(x=>homecareChecked[x.key]);

  } else saveEng();
  if(where==='home')renderMagicLanding(); else renderHomecare();
}
function _engNudge(){
  const {total,done}=_engProgress();
  if(!total)return '';
  if(done>=total)return _eng.streak>1?`All done today — ${_eng.streak}-day streak 🔥`:'All done for today 🎉';
  const left=total-done;
  if(done===0&&_engStreakLive()&&_eng.streak>0)return `Keep your ${_eng.streak}-day streak going — ${left} step${left>1?'s':''} today`;
  if(done===0)return `${left} step${left>1?'s':''} to do today`;
  return `${left} step${left>1?'s':''} left today`;
}

// Drag-to-compare before/after slider (touch + mouse)
function startSlider(e){
  const wrap=document.getElementById('compare-wrap');if(!wrap)return;
  if(e&&e.cancelable&&e.preventDefault)e.preventDefault();
  sliderDragging=true;
  const rect=wrap.getBoundingClientRect();
  const before=wrap.children[1],divider=wrap.children[2];
  const apply=cx=>{let pct=((cx-rect.left)/rect.width)*100;pct=Math.max(0,Math.min(100,pct));sliderPct=pct;
    if(before&&before.style)before.style.clipPath='inset(0 '+(100-pct)+'% 0 0)';
    if(divider&&divider.style)divider.style.left=pct+'%';};
  const ptX=ev=>(ev.touches&&ev.touches[0])?ev.touches[0].clientX:ev.clientX;
  const mv=ev=>{if(ev&&ev.cancelable&&ev.preventDefault)ev.preventDefault();apply(ptX(ev));};
  const up=()=>{sliderDragging=false;document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up);document.removeEventListener('touchcancel',up);};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);document.addEventListener('touchcancel',up);
  apply(ptX(e));
}

function _a11yEnhance(){try{document.querySelectorAll('[onclick]:not(button):not(a):not(input):not(select):not(textarea):not([role])').forEach(el=>{el.setAttribute('role','button');if(!el.hasAttribute('tabindex'))el.setAttribute('tabindex','0');});}catch(e){}}

// Make click-only elements keyboard-operable after each render (see provider app for rationale).
function _a11yEnhanceClickables(root){
  if(!root||!root.querySelectorAll)return;
  const nodes=root.querySelectorAll('[onclick]');
  for(let i=0;i<nodes.length;i++){
    const el=nodes[i];const tag=el.tagName;
    if(tag==='BUTTON'||tag==='A'||tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')continue;
    if(el.getAttribute('aria-hidden')==='true')continue;
    if(el.closest('button,a'))continue;
    if(!el.hasAttribute('role'))el.setAttribute('role','button');
    if(!el.hasAttribute('tabindex'))el.setAttribute('tabindex','0');
  }
}
// Global Escape-to-dismiss for bottom sheets/overlays (see provider app for rationale).
function _topOverlay(){
  // Overlays live in <body> or inside .shell (most sheets use (.shell||body).appendChild).
  // Scanning only body.children missed .shell sheets, so Escape did nothing for them.
  const shell=document.querySelector('.shell');
  const kids=[];
  if(document.body)for(let i=0;i<document.body.children.length;i++)kids.push(document.body.children[i]);
  if(shell)for(let i=0;i<shell.children.length;i++)kids.push(shell.children[i]);
  let top=null,topZ=-1;
  for(let i=0;i<kids.length;i++){
    const el=kids[i];
    if(el.classList&&el.classList.contains('shell'))continue; // the shell container itself isn't an overlay
    let s;try{s=getComputedStyle(el);}catch(e){continue;}
    if(s.position!=='fixed'||s.display==='none'||s.visibility==='hidden')continue;
    const coversTop=el.offsetTop<=1;const tall=el.offsetHeight>=window.innerHeight*0.6;
    if(!coversTop||!tall)continue;
    const z=parseInt(s.zIndex,10)||0;
    if(z<100)continue;
    if(z>=topZ){topZ=z;top=el;}
  }
  return top;
}
try{document.addEventListener('keydown',function(e){
  if(e.key!=='Escape')return;
  const ov=_topOverlay();
  if(!ov)return;
  e.preventDefault();
  try{ov.dispatchEvent(new MouseEvent('click',{bubbles:true}));}catch(_){}
  if(document.body.contains(ov)){try{ov.remove();}catch(_){}}
},true);}catch(e){}
try{if(typeof MutationObserver!=='undefined'){new MutationObserver(()=>_a11yEnhance()).observe(document.body,{childList:true,subtree:true});_a11yEnhance();}}catch(e){}

function loadNotifPrefs(){
  const defaults={
    enabled:false,
    appointmentReminder:true,
    appointmentDay:true,
    homecareReminder:true,
    summaryReady:true,
    messagereply:true,
    quietStart:'21:00',
    quietEnd:'08:00',
  };
  // Merge saved values OVER the defaults rather than returning the saved object directly —
  // a prefs object written by an older version may be missing newer keys, which would
  // otherwise come back undefined (e.g. an undefined quietStart breaks quiet-hours logic).
  try{const s=localStorage.getItem('notif_prefs');if(s){const saved=JSON.parse(s);if(saved&&typeof saved==='object')return Object.assign(defaults,saved);}}catch(e){}
  return defaults;
}
function saveNotifPrefs(prefs){
  try{localStorage.setItem('notif_prefs',JSON.stringify(prefs));}catch(e){}
  _syncClientPrefsToServer();
}
function toggleNotif(key){
  const p=loadNotifPrefs();
  p[key]=!p[key];
  saveNotifPrefs(p);
  renderNotifSettings();
}
async function enableNotifs(){
  const btn=document.getElementById('enable-notif-btn');
  if(btn){btn.disabled=true;btn.style.opacity='.6';btn.innerHTML='<i class="ti ti-loader-2"></i> Requesting…';}
  const result=await Push.request(); // real Notification.requestPermission()
  const p=loadNotifPrefs();
  if(result==='denied'||result==='blocked'){
    // OS blocked it — keep app-level prefs on so in-app banners still work, but flag the block
    p.enabled=true;p.osBlocked=true;
  }else{
    p.enabled=true;p.osBlocked=false;
  }
  saveNotifPrefs(p);
  renderNotifSettings();
  // welcome ping so the user immediately sees it working
  setTimeout(()=>pushNotify({type:'summaryReady',icon:'ti-bell-ringing',col:'#f0fff5',ic:'#4ec49a',
    title:'Notifications are on 🎉',body:"You'll get reminders, messages, and booking updates here.",force:true}),420);
}

    title:'Appointment reminder',body:`Your ${client.treatment} with ${client.providerFirst} is coming up on ${client.nextDate} at ${client.nextTime}.`,
    force:true,onclick:()=>nav('home')});
}
function disableAllNotifs(){
  const p=loadNotifPrefs();
  p.enabled=false;
  saveNotifPrefs(p);
  renderNotifSettings();
}
function setQuietStart(val){
  const p=loadNotifPrefs();p.quietStart=val;saveNotifPrefs(p);
}
function setQuietEnd(val){

}

function attachClientPhoto(){_pickImages(srcs=>{if(srcs&&srcs.length)sendClientMsg(srcs);});}
function attachClientLink(){const u=prompt('Paste an image link (URL):');if(u&&u.trim())sendClientMsg([u.trim()]);}

function sendClientMsg(imgArg){
  const inp=document.getElementById('cinput');
  let text=(inp&&inp.value.trim())||'';
  const imgs=Array.isArray(imgArg)?imgArg:(imgArg?[imgArg]:[]);
  if(!text&&!imgs.length)return;
  // A chat message has a natural length; an extremely long one is almost always an
  // accidental paste and would bloat local storage / risk a failed sync. Cap it generously.
  const MAX=5000;
  if(text.length>MAX){text=text.slice(0,MAX);if(typeof showToast==='function')showToast('Message shortened to '+MAX+' characters');}
  messages.push({from:'me',text,imgs,time:'Just now'});
  try{_saveClientMessages();}catch(e){}
  try{if(client._real){_clientSubmit('message',{text:text,photos:imgs.length});}}catch(e){}
  if(inp){inp.value='';inp.style.height='auto';}
  renderMessages();
}

// ── PRE-VISIT CHECK-IN (data-driven, per provider) ──
// Each provider defines client.providers[].checkin = {steps:[{title,questions:[...]}]}.
// Question types: boolean (yes/no + optional detail), iconChoice (option grid, optional custom), notes (textarea).
let checkinAnswers={};
let checkinStep=0;

function _ciSteps(){
  // Use the provider's own saved check-in config (what they built in their editor)
  // whenever we have it — both for the connected demo provider AND for real client
  // links (client._real). Previously this only checked .connected, so real clients
  // fell through to the hardcoded default steps and saw drink options the provider
  // had actually removed.
  if(activeProvider().connected||client._real){
    const cfg=loadClientCheckinCfg();

// Photos attached to a File-upload form question, keyed by field index.
let _ffPhotos={};
// Draft persistence for intake forms — clients fill long forms (medical history,
// allergies, meds) on mobile and get interrupted. Without this, navigating away or a
// tab reload wipes everything typed. Answers are keyed by form id + question index and
// mirrored to localStorage so they survive until the form is submitted.
let _ffDraft={};
function _ffDraftStorageKey(){return 'sc_ffdraft_'+((typeof _fillFormId!=='undefined'&&_fillFormId)||'form');}
function _ffLoadDraft(){
  try{const raw=localStorage.getItem(_ffDraftStorageKey());_ffDraft=raw?(JSON.parse(raw)||{}):{};}catch(e){_ffDraft={};}
}
let _ffDraftTimer=null;
function _ffSetDraft(key,val){
  _ffDraft[key]=val;
  clearTimeout(_ffDraftTimer);
  _ffDraftTimer=setTimeout(()=>{try{localStorage.setItem(_ffDraftStorageKey(),JSON.stringify(_ffDraft));}catch(e){}},400);
}
function _ffClearDraft(){

}
function _ffAddPhotos(i){

    if(!srcs||!srcs.length)return;
    if(!_ffPhotos[i])_ffPhotos[i]=[];
    srcs.forEach(function(s){_ffPhotos[i].push(s);});
    _ffRenderPhotos(i);
  });
}
function _ffRemovePhoto(i,idx){
  if(_ffPhotos[i])_ffPhotos[i].splice(idx,1);
  _ffRenderPhotos(i);
}
function _ffRenderPhotos(i){
  const box=document.getElementById('ff-photos-'+i);if(!box)return;
  const list=_ffPhotos[i]||[];
  box.innerHTML=list.map(function(src,idx){
    return `<div style="position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid #e8ddd3;">
      <img src="${_imgSrc(src)}" alt="Attached photo" style="width:100%;height:100%;object-fit:cover;">
      <button type="button" onclick="_ffRemovePhoto(${i},${idx})" aria-label="Remove photo" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>`;
  }).join('');
}
function _submitFillForm(){
  const pf=_pendingForm();if(!pf)return;
  const qs=_orderedFormQs(pf.qs);
  const answers={};const flagged=[];let signed=false;
  let missingRequired=false;let badFormat='';
  // Email/phone fields come through as generic "Short text" (there's no dedicated type),
  // so infer them from the label to validate format. Only validates when a value is
  // present — emptiness is handled by the required check.
  const _looksEmail=lbl=>/e-?mail/i.test(lbl||'');
  const _looksPhone=lbl=>/phone|mobile|cell/i.test(lbl||'');
  const _validEmail=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const _validPhone=v=>{const d=v.replace(/[^0-9]/g,'');return d.length>=7&&d.length<=15;};
  qs.forEach((q,i)=>{
    if(q.type==='Contraindications'){
      const checked=(q.items||[]).map((it,ii)=>({it,el:document.getElementById(`ff-${i}-${ii}`)})).filter(x=>x.el&&x.el.checked).map(x=>x.it);
      answers[q.id]=checked;
      flagged.push(...checked);
    }else if(q.type==='Multiple choice'){
      const checked=(q.options||[]).map((o,oi)=>({o,el:document.getElementById(`ff-${i}-${oi}`)})).filter(x=>x.el&&x.el.checked).map(x=>x.o);
      answers[q.id]=checked;
      if(q.required&&!checked.length)missingRequired=true;
    }else if(q.type==='File upload'||q.type==='Photo upload'){
      const photos=(_ffPhotos[i]||[]).slice();
      answers[q.id]=photos;
      if(q.required&&!photos.length)missingRequired=true;
    }else{
      const el=document.getElementById('ff-'+i);
      const val=el?el.value.trim():'';
      answers[q.id]=val;
      if(q.type==='Signature'&&val)signed=true;
      if(q.required&&!val)missingRequired=true;
      // Format-check email/phone short-text fields when the person entered something.
      if(val&&(q.type==='Short text'||!q.type)){
        if(_looksEmail(q.label)&&!_validEmail(val))badFormat=badFormat||'Please enter a valid email address.';
        else if(_looksPhone(q.label)&&!_validPhone(val))badFormat=badFormat||'Please enter a valid phone number.';
      }
    }
  });
  if(missingRequired){ if(typeof proToast==='function')proToast('Please fill in the required fields'); return; }
  if(badFormat){ if(typeof proToast==='function')proToast(badFormat); return; }
  const dateLabel=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const _finishFormSent=()=>{
    // Remove it from the pending list only once we know it's been sent, so a failed
    // submit doesn't make the form vanish while the provider never received it.
    const p=activeProvider();
    p.pendingForms=(p.pendingForms||[]).filter(x=>x.formId!==pf.formId);
    _ffPhotos={};
    _ffClearDraft();   // typed answers are now sent — drop the saved draft
    if(typeof proToast==='function')proToast('Sent \u2713');
    nav('home');
  };
  if(client._real){
    const btns=document.querySelectorAll('button');
    if(typeof proToast==='function')proToast('Sending\u2026');
    _clientSubmit('form',{formId:pf.formId,title:pf.title,answers,flagged,signed,date:dateLabel})
      .then(function(res){
        if(res&&res.duplicate)return;   // a submit is already in flight — ignore the duplicate tap
        if(res&&res.ok!==false)_finishFormSent();
        else if(typeof proToast==='function')proToast("Couldn't send \u2014 check your connection and tap Submit again");
      });
    return;
  }
  _finishFormSent();
}

// ── Image helpers (downscale uploads to a shareable data URL, or accept a link) ──
function _pickImages(cb){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=()=>{
    const files=Array.from(inp.files||[]);if(!files.length)return;
    const out=[];let done=0;
    files.forEach((f,idx)=>_downscaleImg(f,src=>{out[idx]=src;if(++done===files.length)cb(out.filter(Boolean));}));
  };
  inp.click();
}
function _downscaleImg(file,cb,max=900){
  // Guard against enormous files (e.g. RAW/HEIC) that can crash a mobile tab when read
  // into a base64 data URL. 25MB is generous for a photo; anything bigger is dropped.
  if(file&&file.size&&file.size>25*1024*1024){cb('');return;}
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      try{c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.72));}
      catch(_){cb(e.target.result);}
    };
    // Decode failed — return empty rather than the full-size original (which would
    // defeat downscaling and could bloat storage). Callers drop empty results.
    img.onerror=()=>cb('');
    img.src=e.target.result;
  };
  // File read failed — must still call back, or a batch upload's completion counter
  // never advances and the whole "add photos" flow hangs silently forever.
  r.onerror=()=>cb('');
  r.readAsDataURL(file);
}

function _ciBuildPayload(){
  const groups=[];const flagged=[];let notes='';let photos=[];
  _ciSteps().forEach(st=>{
    const rows=[];
    (st.questions||[]).forEach(q=>{
      if(q.type==='boolean'){
        const yes=checkinAnswers[q.id]==='yes';
        rows.push({label:q.label,value:yes?'Yes':'No changes',detail:yes?(checkinAnswers[q.id+'Detail']||''):'',flagged:yes});
        if(yes)flagged.push((q.flagLabel||q.label||'').replace(/\?$/,''));
      }else if(q.type==='iconChoice'){
        const v=checkinAnswers[q.id];let val='—';
        if(v===-1)val=checkinAnswers[q.id+'Custom']||'Something else';
        else if(typeof v==='number'&&q.options&&q.options[v])val=q.options[v][1]+(q.options[v][2]?' ('+q.options[v][2]+')':'');
        rows.push({label:q.label,value:val,flagged:false});
      }else if(q.type==='levelChoice'){
        const opts=q.options||['Off','Low','Med','High'];
        rows.push({label:q.label,value:checkinAnswers[q.id]||opts[0],flagged:false});
      }else if(q.type==='notes'){
        notes=checkinAnswers[q.id]||'';
        photos=(photos||[]).concat(checkinAnswers[q.id+'Photos']||[]);
      }else if(q.type==='photo'){
        photos=(photos||[]).concat(checkinAnswers[q.id+'Photos']||[]);
      }
    });
    if(rows.length)groups.push({title:st.title,rows});
  });
  return{groups,flagged,notes,photos};
}

function submitCheckin(){
  const prov=activeProvider();
  const pay=_ciBuildPayload();
  // Show the client the SAME flags that get sent to the provider (lower-cased only for
  // the friendly confirmation copy). Deriving both from one source prevents the two
  // lists from drifting apart — which for a check-in could mean the client thinks they
  // flagged something the provider never received.
  const flagged=(pay.flagged||[]).map(f=>String(f).toLowerCase());
  // Connected providers (the live provider app) receive the check-in instantly via the bridge
  if(prov.connected){
    prov.checkinDone=true;
    SlickBridge.post('checkin-submitted',{
      id:'ci'+Date.now()+Math.random().toString(36).slice(2,5),
      providerId:prov.id,clientId:'maya',client:client.name,
      dateLabel:client.nextDate,time:client.nextTime,treatment:client.treatment,
      groups:pay.groups,flagged:pay.flagged,notes:pay.notes,photos:pay.photos,submittedAt:Date.now(),
    });
    S.innerHTML=_checkinSuccessHTML(flagged);
    return;
  }
  // Real client — send for real and confirm it actually reached the server before
  // telling them they're all set. A dropped check-in could hide a contraindication.
  if(client._real){
    S.innerHTML=_sendingHTML('Sending your check-in…');
    _clientSubmit('checkin',{client:client.name,treatment:client.treatment,dateLabel:client.nextDate,time:client.nextTime,groups:pay.groups,flagged:pay.flagged,notes:pay.notes,photos:pay.photos||[]})
      .then(function(res){
        if(res&&res.duplicate)return;
        if(res&&res.ok!==false){ prov.checkinDone=true; S.innerHTML=_checkinSuccessHTML(flagged); }
        else{ S.innerHTML=_submitFailedHTML('submitCheckin()',"Couldn't send your check-in"); }
      });
    return;
  }
  // Demo/local (no real token, not connected) — behave as before
  prov.checkinDone=true;
  S.innerHTML=_checkinSuccessHTML(flagged);
}

// ── CLIENT REBOOK REQUEST ──
let rebookState={date:null,time:null,treatment:client.treatment,note:''};

// Per-day availability (mirrors provider business hours)
const REBOOK_DAYKEYS=['sun','mon','tue','wed','thu','fri','sat'];
function normalizeAvail(a){
  const keys=['mon','tue','wed','thu','fri','sat','sun'];
  const def={};keys.forEach(d=>def[d]={open:d!=='sun',start:'09:00',end:'17:00'});
  if(!a)return def;
  if(a.days&&!a.mon){const out={};keys.forEach(d=>out[d]={open:!!a.days[d],start:a.start||'09:00',end:a.end||'17:00'});return out;}
  const out={};keys.forEach(d=>out[d]=(a[d]&&typeof a[d]==='object')?{open:!!a[d].open,start:a[d].start||'09:00',end:a[d].end||'17:00'}:def[d]);return out;
}
let rebookAvail=null;
function rebookHourlySlots(dayObj){
  if(!dayObj||!dayObj.open)return[];
  const sH=parseInt(dayObj.start,10),eH=parseInt(dayObj.end,10);
  const slots=[];for(let h=sH;h<eH;h++){let hr=h%12;if(hr===0)hr=12;slots.push(`${hr}:00 ${h<12?'AM':'PM'}`);}
  return slots;
}
function rebookTimeBtnHTML(t){
  const on=rebookState.time===t;
  return`<button onclick="rebookState.time='${t}';document.querySelectorAll('.time-btn').forEach(b=>{b.style.background=b.textContent==='${t}'?'var(--accent)':'#fff';b.style.color=b.textContent==='${t}'?'#fff':'#6b5d52';b.style.borderColor=b.textContent==='${t}'?'var(--accent)':'#e8ddd3';})" class="time-btn" style="border:1.5px solid ${on?'var(--accent)':'#e8ddd3'};background:${on?'var(--accent)':'#fff'};color:${on?'#fff':'#6b5d52'};border-radius:8px;padding:9px 4px;font-size:12px;cursor:pointer;font-weight:500;">${t}</button>`;
}
function refreshRebookTimes(){
  const c=document.getElementById('rebook-times');if(!c||!rebookAvail)return;
  let dayObj=null;
  if(rebookState.date){const wd=new Date(rebookState.date+'T12:00:00').getDay();dayObj=rebookAvail[REBOOK_DAYKEYS[wd]];}
  const slots=dayObj?rebookHourlySlots(dayObj):[];
  if(rebookState.time&&!slots.includes(rebookState.time))rebookState.time=null;
  c.innerHTML=slots.length?slots.map(rebookTimeBtnHTML).join(''):`<div style="grid-column:1/-1;text-align:center;font-size:12px;color:#b8a898;padding:12px;">Pick a date above to see available times</div>`;
}

function renderRebook(){
  setNav('home');
  document.getElementById('tt').textContent='Request appointment';
  const rawAvail=(client._real&&client._realAvailability)?client._realAvailability:SlickBridge.getAvailability();
  const avail=normalizeAvail(rawAvail);
  rebookAvail=avail;
  const hasAvail=!!rawAvail;
  const treatments=['Hydrafacial','Chemical Peel','Brightening Facial','Microneedling','Dermaplaning','Consultation'];

  // Generate next 14 available dates honoring provider's open days, starting from
  // today (real clients) or the pinned demo day. Real clients must never be shown a
  // past date to "request".
  const dates=[];
  const _ymd=dt=>dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  const _base=(client._real)?new Date():new Date('2026-07-18T12:00:00');
  const d=new Date(_base.getFullYear(),_base.getMonth(),_base.getDate());
  // Start from tomorrow — a rebook request is for a future visit, not same-day.
  d.setDate(d.getDate()+1);
  let guard=0;
  while(dates.length<14&&guard<120){
    guard++;
    const dk=REBOOK_DAYKEYS[d.getDay()];
    if(avail[dk]&&avail[dk].open){
      dates.push({
        key:_ymd(d),  // local date parts, not toISOString (which is UTC and can shift the day)
        day:d.toLocaleDateString('en-US',{weekday:'short'}),
        date:d.getDate(),
        month:d.toLocaleDateString('en-US',{month:'short'}),
      });
    }

// ── Real image capture, downscaling, and on-device pixel analysis ──
function _downscaleImage(file,maxDim,cb){
  if(file&&file.size&&file.size>25*1024*1024){cb('');return;}
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;const scale=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*scale);h=Math.round(h*scale);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    try{cb(cv.toDataURL('image/jpeg',0.78));}catch(err){cb(e.target.result);}
  };img.onerror=()=>cb('');img.src=e.target.result;};
  r.onerror=()=>cb('');r.readAsDataURL(file);
}
// Real measurements computed from the actual pixels (runs on-device; the hosted vision model layers on top of these)
function _imgMeasures(dataURL){return new Promise(res=>{
  if(!dataURL)return res(null);
  const img=new Image();img.onload=()=>{
    const s=72,cv=document.createElement('canvas');cv.width=s;cv.height=s;const ctx=cv.getContext('2d');
    ctx.drawImage(img,0,0,s,s);let d;try{d=ctx.getImageData(0,0,s,s).data;}catch(e){return res(null);}
    const n=s*s;let sumL=0,sumR=0,sumG=0,sumB=0;const Ls=[];
    for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2],L=0.299*r+0.587*g+0.114*b;sumL+=L;sumR+=r;sumG+=g;sumB+=b;Ls.push(L);}
    const mL=sumL/n,mR=sumR/n,mG=sumG/n,mB=sumB/n;let vL=0;Ls.forEach(L=>vL+=(L-mL)*(L-mL));const sd=Math.sqrt(vL/n);
    res({brightness:mL,redness:mR/(((mG+mB)/2)||1),warmth:mR-mB,evenness:Math.max(0,Math.min(100,100-sd/1.6)),sd:sd,mR:mR,mG:mG,mB:mB});
  };img.onerror=()=>res(null);img.src=dataURL;
});}

// ── PROFILE ──
function _myEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Build a clean, printable document of the client's own signed forms + treatment info.
function _buildMyRecordsHTML(){
  const p=(typeof activeProvider==='function')?activeProvider():(client.providers&&client.providers[0])||{};
  const accent=(p.brand&&p.brand.primary)||'#8a6a3a';
  const studio=_myEsc(p.studio||'SlickChart');
  const prov=_myEsc(p.name||'');
  const now=new Date();
  const dateStr=now.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})+' \u00b7 '+now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  // ---- treatment summary ----
  const sumRows=[];
  const push=(l,v)=>{ if(v!=null&&String(v).trim()) sumRows.push([l,String(v)]); };
  push('Provider', p.name);
  push('Treatment', p.treatment||client.treatment);
  if(p.session!=null) push('Progress', 'Session '+p.session+(p.totalSessions?(' of '+p.totalSessions):''));
  if(p.nextDate) push('Next appointment', p.nextDate+(p.nextTime?(' \u00b7 '+p.nextTime):''));
  const sumHTML=sumRows.map(([l,v])=>`<tr><td class="l">${_myEsc(l)}</td><td class="v">${_myEsc(v)}</td></tr>`).join('');
  // ---- signed forms ----
  const forms=(p.forms||[]).filter(f=>(f.status||'').toLowerCase().indexOf('complet')>=0);
  let formsHTML='';
  if(forms.length){
    formsHTML=forms.map(f=>{
      const qa=[];
      (f.qs||[]).forEach(q=>{if(q.type==='Signature'||q.type==='Contraindications')return;const a=f.answers&&f.answers[q.id];if(a!=null&&String(a).trim())qa.push([q.label,String(a)]);});
      const qaHTML=qa.length?`<table class="qa">${qa.map(([l,v])=>`<tr><td class="l">${_myEsc(l)}</td><td class="v">${_myEsc(v)}</td></tr>`).join('')}</table>`:'';
      const flg=(f.flagged&&f.flagged.length)?`<div class="flag"><div class="flag-h">Noted for your provider</div><ul>${f.flagged.map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`:'';
      const consent=f.consent?`<div class="consent">\u201c${_myEsc(f.consent)}\u201d</div>`:'';
      return `<div class="form"><div class="form-h">${_myEsc(f.title)}</div><div class="muted">${_myEsc(f.date||'')} \u00b7 Signed \u2713</div>${consent}${flg}${qaHTML}</div>`;
    }).join('');
  } else {
    formsHTML='<div class="muted">No signed forms yet. Any forms your provider sends will appear here once you complete them.</div>';
  }
  // ---- aftercare (handy for the client to keep) ----
  let careHTML='';
  if(p.aftercare&&p.aftercare.length){
    careHTML=p.aftercare.map(blk=>`<div class="care"><div class="care-h">${_myEsc(blk.when)}</div><ul>${(blk.items||[]).map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`).join('');
  }
  const avoidHTML=(p.avoid&&p.avoid.length)?`<div class="care"><div class="care-h">Things to avoid</div><ul>${p.avoid.map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`:'';

  return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">`+
  `<title>${_myEsc(client.name)} \u2014 My Records</title>`+
  `<style>`+
    `*{box-sizing:border-box;}`+
    `body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;margin:0;padding:32px 28px;line-height:1.5;font-size:13px;}`+
    `.top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid ${accent};padding-bottom:14px;margin-bottom:6px;}`+
    `.biz{font-size:18px;font-weight:700;}.owner{font-size:12px;color:#666;margin-top:2px;}`+
    `.doc{font-size:11px;color:#888;text-align:right;}.doc b{display:block;font-size:13px;color:#1a1a1a;}`+
    `h1{font-size:22px;margin:16px 0 12px;}`+
    `h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:${accent};border-bottom:1px solid #e5ddd0;padding-bottom:5px;margin:22px 0 10px;}`+
    `table{width:100%;border-collapse:collapse;}`+
    `td.l{width:38%;color:#666;padding:5px 10px 5px 0;vertical-align:top;font-weight:600;}`+
    `td.v{padding:5px 0;vertical-align:top;}tr+tr td{border-top:1px solid #f0ece4;}`+
    `.form{border:1px solid #e5ddd0;border-radius:8px;padding:12px 14px;margin:10px 0;page-break-inside:avoid;}`+
    `.form-h{font-weight:700;font-size:14px;margin-bottom:2px;}.muted{color:#999;font-style:italic;}`+
    `.consent{font-size:12px;color:#555;font-style:italic;margin:8px 0;}`+
    `.qa{margin-top:8px;}table.qa td.l{width:42%;}`+
    `.flag{background:#fff7ec;border:1px solid #f0d8b0;border-radius:8px;padding:10px 12px;margin:8px 0;}`+
    `.flag-h{font-weight:700;color:#a06a00;margin-bottom:4px;}.flag ul{margin:0;padding-left:18px;}.flag li{color:#7a5200;margin:2px 0;}`+
    `.care{border:1px solid #e5ddd0;border-radius:8px;padding:10px 14px;margin:8px 0;page-break-inside:avoid;}`+
    `.care-h{font-weight:700;margin-bottom:4px;}.care ul{margin:0;padding-left:18px;}.care li{margin:2px 0;color:#444;}`+
    `.foot{margin-top:28px;border-top:1px solid #e5ddd0;padding-top:10px;font-size:10px;color:#aaa;text-align:center;}`+
    `@media print{body{padding:0 6px;}h2{page-break-after:avoid;}}`+
  `</style></head><body>`+
    `<div class="top"><div><div class="biz">${studio}</div>${prov?`<div class="owner">${prov}</div>`:''}</div>`+
      `<div class="doc"><b>My Records</b>Generated ${_myEsc(dateStr)}</div></div>`+
    `<h1>${_myEsc(client.name)}</h1>`+
    `<h2>Treatment summary</h2><table>${sumHTML||'<tr><td class="v muted">No treatment info yet.</td></tr>'}</table>`+
    `<h2>My signed forms</h2>${formsHTML}`+
    ((careHTML||avoidHTML)?`<h2>Aftercare</h2>${avoidHTML}${careHTML}`:'')+
    `<div class="foot">Your personal copy \u00b7 ${studio} \u00b7 Generated by SlickChart on ${_myEsc(dateStr)}</div>`+
  `</body></html>`;
}
function _printMyRecords(){
  const html=_buildMyRecordsHTML(); if(!html)return;
  const f=document.createElement('iframe');
  f.setAttribute('aria-hidden','true');
  f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;';
  document.body.appendChild(f);
  try{
    const doc=f.contentWindow.document;
    doc.open();doc.write(html);doc.close();
    setTimeout(()=>{try{f.contentWindow.focus();f.contentWindow.print();}catch(e){}setTimeout(()=>{try{f.remove();}catch(e){}},2000);},350);
  }catch(e){try{f.remove();}catch(_){}if(typeof showToast==='function')showToast('Could not open print \u2014 try Download instead');}
}
function _downloadMyRecords(){
  const html=_buildMyRecordsHTML(); if(!html)return;
  try{
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=(client.name||'my').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'')+'-records.html';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{try{URL.revokeObjectURL(url);a.remove();}catch(e){}},1500);
    if(typeof showToast==='function')showToast('Downloaded \u2713');
  }catch(e){ if(typeof showToast==='function')showToast('Could not download \u2014 try Print instead'); }
}
function exportMyRecords(){
  const ov=document.createElement('div'); ov.id='myrec-sheet';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:440px;padding:16px 16px 26px;box-shadow:0 -4px 24px rgba(0,0,0,.15);">`+
    `<div style="width:36px;height:4px;background:#e0d5c8;border-radius:2px;margin:0 auto 14px;"></div>`+

function _getClientToken(){
  try{
    const m=location.pathname.match(/\/client\/([^\/?]+)/);
    if(m&&m[1])return decodeURIComponent(m[1]);
    return new URLSearchParams(location.search).get('c')||'';
  }catch(e){ return ''; }
}
var _clientSubmitInFlight={};
function _clientSubmit(kind,payload,_retried){
  try{
    var tok=client._token; if(!tok)return Promise.resolve(null);
    // Block a double-tap on the same action while one is already in flight — otherwise a
    // slow/retrying request lets an impatient client submit a duplicate check-in, form,
    // or booking. The retry re-enters with _retried=true and must bypass this guard.
    if(!_retried){
      if(_clientSubmitInFlight[kind])return Promise.resolve({ok:false,error:'inflight',duplicate:true});
      _clientSubmitInFlight[kind]=true;
    }
    var _clear=function(v){if(!_retried)_clientSubmitInFlight[kind]=false;return v;};
    return fetch('/api/client-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({t:tok,kind:kind,payload:payload||{}})})
      .then(function(r){
        // A non-OK HTTP status means it did NOT reach the provider — treat as failure so
        // callers on critical paths (check-in, booking, forms) don't show a false "sent".
        if(!r.ok){
          if(!_retried)return new Promise(function(res){setTimeout(res,1200);}).then(function(){return _clientSubmit(kind,payload,true);}).then(_clear);
          return {ok:false,error:'server'};
        }
        return r.json().then(function(j){return (j&&typeof j.ok!=='undefined')?j:{ok:true};}).catch(function(){return {ok:true};}).then(_clear);
      })
      .catch(function(){
        // Network error — retry once before giving up, since these are the client's
        // most important actions and a single blip shouldn't silently drop them.
        if(!_retried)return new Promise(function(res){setTimeout(res,1200);}).then(function(){return _clientSubmit(kind,payload,true);}).then(_clear);
        return {ok:false,error:'network'};
      });
  }catch(e){ if(!_retried)_clientSubmitInFlight[kind]=false; return Promise.resolve({ok:false,error:'network'}); }
}

}

  p.homecare=(Array.isArray(d.aftercare)?d.aftercare:[]).map(function(s){return {key:s,icon:'\u2728',time:'',tip:'',done:false};});
  p.products=Array.isArray(d.products)?d.products:[];
  p.summaries=Array.isArray(d.summaries)?d.summaries:[];
  // no fabricated data in real mode
  p.avoid=[];p.aftercare=[];p.progress=[];p.observations=[];p.thread=[];p.homecareNote='';p.seriesLabel='';
  p.session=1;p.totalSessions=1;p.studioAddress='';p.studioPhone='';p.connected=false;p.unread=0;
  var nv=String(prof.nextVisit||'').split('\u00b7');
  p.nextDate=(nv[0]||'').trim();p.nextTime=(nv[1]||'').trim();
  var iso; try{ if(prof.nextVisit){ var dd=new Date(String(prof.nextVisit).replace('\u00b7','')+' '+(new Date().getFullYear())); if(!isNaN(dd))iso=dd.toISOString(); } }catch(e){}
  p.apptISO=iso||new Date(Date.now()+14*86400000).toISOString();
  p.nextDateISO='';p.nextTimeISO='';p.durationMins=60;
  client._forms=Array.isArray(d.forms)?d.forms:[];

}

}
function _clientLinkNetworkError(){
  // A fetch rejection means we couldn't reach the server at all (offline / flaky network) —
  // NOT that the link is bad. Telling the client to "ask your provider to resend" would be
  // wrong and send them down a dead end, so show a connection message with a retry instead.
  var S=document.getElementById('S');
  if(S)S.innerHTML='<div style="padding:64px 26px;text-align:center;color:#9a8a7e;"><div style="font-size:30px;margin-bottom:12px;">\u{1F4F6}</div><div style="font-size:16px;font-weight:600;color:#8b6b4a;margin-bottom:7px;">Can\u2019t connect right now</div><div style="font-size:13px;line-height:1.6;max-width:280px;margin:0 auto 16px;">Check your internet connection and try again \u2014 your link is fine.</div><button onclick="_retryClientLoad()" style="background:var(--accent,#4ec49a);border:none;color:#06110c;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Try again</button></div>';
  var nv=document.querySelector('.nav'); if(nv)nv.style.display='none';
}
function _retryClientLoad(){
  var tok=(client&&client._token)?client._token:'';
  if(!tok){try{location.reload();}catch(e){}return;}
  try{var S=document.getElementById('S');if(S)S.innerHTML='<div style="padding:64px 26px;text-align:center;color:#9a8a7e;"><div class="spin" style="margin:0 auto;"></div></div>';}catch(e){}
  try{_bootRealClient(tok);}catch(e){try{location.reload();}catch(_){}}
}
// ── Lightweight polling: keep a real client's appointment, summaries, forms, and
// messages fresh while the app stays open, without disrupting what they're doing. ──
let _realPollTimer=null, _lastDataFingerprint='';
// A compact signature of the fields worth re-rendering for. If it's unchanged we skip
// the re-render entirely, so there's no flicker on an idle screen.
function _clientDataFingerprint(j){
  try{
    const d=(j&&j.client&&j.client.data)||{};const prof=d.profile||{};
    return JSON.stringify([
      prof.nextVisit||'',prof.treatment||'',
      (Array.isArray(d.summaries)?d.summaries.length:0),
      (Array.isArray(d.summaries)&&d.summaries[0]&&d.summaries[0].note)||'',
      (Array.isArray(d.pendingForms)?d.pendingForms.map(f=>f.formId).join(','):''),
      (Array.isArray(d.pendingGuides)?d.pendingGuides.length:0),
      (d.brand&&d.brand.logoDataUrl?'logo':''),(d.brand&&d.brand.primary)||''
    ]);
  }catch(e){return '';}
}
// Screens where a surprise re-render would interrupt the client mid-task. We skip
// re-rendering while they're here (data still updates quietly in the background).
function _isBusyScreen(){
  const n=(typeof currentScreen!=='undefined'?currentScreen:'');
  return n==='fill-form'||n==='checkin'||n==='rebook'||n==='virtual-submit'||n==='messages';
}
function _pollRealClient(){
  if(!client._real||!client._token)return;
  if(document.hidden)return; // don't poll a backgrounded tab
  fetch('/api/client-data?t='+encodeURIComponent(client._token),{cache:'no-store'})
    .then(function(r){return r.json().then(function(j){return {status:r.status,j:j};});})
    .then(function(res){
      const j=res.j;
      // Access was revoked or the token became invalid while the app was open. Distinguish
      // this from a transient blip: only act on an explicit server rejection (a 401/403, or
      // an ok:false carrying a revoked/invalid/expired error), never on a network failure.
      const revoked=(res.status===401||res.status===403)||
        (j&&j.ok===false&&/revok|invalid|expire|not.?found|removed/i.test(String(j.error||'')));
      if(revoked){
        _stopRealClientPolling();
        client._real=false;
        _clientLinkError(j&&j.error);
        return;
      }
      if(!(j&&j.ok&&j.client))return; // transient/empty — keep the current view, try again next tick
      const fp=_clientDataFingerprint(j);
      if(fp!==_lastDataFingerprint){
        _lastDataFingerprint=fp;
        _applyRealClientData(j);
        try{applyActiveProvider();}catch(e){}
        // only refresh the view if they're not mid-task and are on a passive screen
        if(!_isBusyScreen()&&document.getElementById('page-heading')){
          const n=(typeof currentScreen!=='undefined'?currentScreen:'home');
          try{if(n==='home')renderHome();else if(typeof nav==='function')nav(n||'home');}catch(e){}
        }
      }
      // messages refresh independently (they append, and show a notification)
      try{if(!_isBusyScreen()||currentScreen==='messages')_fetchRealMessages(false);}catch(e){}
    })
    .catch(function(){});
}
function _stopRealClientPolling(){if(_realPollTimer){clearInterval(_realPollTimer);_realPollTimer=null;}}
function _startRealClientPolling(){
  if(_realPollTimer)return;
  _realPollTimer=setInterval(_pollRealClient,30000); // every 30s
  // catch up promptly when the client returns to the tab
  try{document.addEventListener('visibilitychange',function(){if(!document.hidden)_pollRealClient();});}catch(e){}
}
// ── Real message history (both directions), synced from the server ──
let _msgSeenIds=[];
function _loadMsgSeenIds(){try{_msgSeenIds=JSON.parse(localStorage.getItem('sc_seen_msg_ids')||'[]');}catch(e){_msgSeenIds=[];}}
function _markMsgSeen(id){if(_msgSeenIds.indexOf(id)<0){_msgSeenIds.push(id);if(_msgSeenIds.length>500)_msgSeenIds.splice(0,_msgSeenIds.length-500);try{localStorage.setItem('sc_seen_msg_ids',JSON.stringify(_msgSeenIds));}catch(e){}}}
// Mark many message ids seen with a single localStorage write instead of one per
// message — matters on first load of a long thread, or a burst after being offline.
function _markMsgsSeen(ids){
  if(!ids||!ids.length)return;
  const have=new Set(_msgSeenIds);let changed=false;
  ids.forEach(function(id){if(!have.has(id)){_msgSeenIds.push(id);have.add(id);changed=true;}});
  if(!changed)return;
  if(_msgSeenIds.length>500)_msgSeenIds.splice(0,_msgSeenIds.length-500);
  try{localStorage.setItem('sc_seen_msg_ids',JSON.stringify(_msgSeenIds));}catch(e){}
}
function _fmtMsgTime(ts){
  try{
    const d=new Date(ts);const now=new Date();
    if(d.toDateString()===now.toDateString())return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }catch(e){return 'Just now';}
}
async function _fetchRealMessages(initial){
  if(!client._real||!client._token)return;
  try{
    const r=await fetch('/api/client-messages?t='+encodeURIComponent(client._token));
    const j=await r.json();
    if(!(j&&j.ok&&Array.isArray(j.messages)))return;
    const jess=client.providers.find(function(p){return p.id==='jess';})||client.providers[0];
    if(initial){
      jess.thread=j.messages.map(function(m){return {from:m.from==='provider'?'provider':'me',text:m.text,time:_fmtMsgTime(m.ts)};});
      _markMsgsSeen(j.messages.map(function(m){return m.id;}));
      if(client.activeProviderId===jess.id)messages=jess.thread;
      try{_saveClientMessages();}catch(e){}
      if(document.getElementById('chat-body'))renderMessages();
    }else{
      const newOnes=j.messages.filter(function(m){return m.from==='provider'&&_msgSeenIds.indexOf(m.id)<0;});
      if(!newOnes.length)return;
      const viewing=client.activeProviderId===jess.id&&document.getElementById('chat-body');
      newOnes.forEach(function(m){jess.thread.push({from:'provider',text:m.text,time:_fmtMsgTime(m.ts)});});
      _markMsgsSeen(newOnes.map(function(m){return m.id;}));
      if(!viewing)jess.unread=(jess.unread||0)+newOnes.length;
      else messages=jess.thread;
      try{_saveClientMessages();}catch(e){}
      if(viewing)renderMessages();
      else if(document.getElementById('home-screen')&&typeof renderHome==='function')renderHome();
    }
  }catch(e){}
}
setInterval(function(){try{_fetchRealMessages(false);}catch(e){}},20000);
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.addEventListener('click', function() { nav(el.getAttribute('data-nav')); });
  });
  updateClientBadge();
  var _ctok=_getClientToken();
  if(_ctok){ _bootRealClient(_ctok); return; }
  // Provider previewing the client app (opened with ?preview=1 from provider Settings/Home).
  try{
    if(new URLSearchParams(location.search).get('preview')==='1'){
      var pb=document.createElement('div');
      pb.style.cssText='position:fixed;top:0;left:0;right:0;z-index:100001;background:#1a1308;color:#caa86a;border-bottom:1px solid #3a2a10;font-size:12px;font-weight:600;text-align:center;padding:6px 12px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;';
      pb.innerHTML='\u2728 Preview \u2014 this is a sample of what your clients see';
      document.body.appendChild(pb);
      try{document.body.style.paddingTop='27px';}catch(e){}
    }
  }catch(e){}
  try{document.title='SlickChart — '+client.name;}catch(e){}
  // connected provider reflects any brand Jessica saved in the provider app
  try{const jp=client.providers.find(p=>p.id==='jess');const sb=loadClientBrand();if(jp&&sb)jp.brand=sb;}catch(e){}
  try{loadVirtualConsults();}catch(e){}
  try{loadInvite();}catch(e){}
  try{loadEng();}catch(e){}
  applyActiveProvider();
  nav('home');
});
</script>

/* SlickChart — friendly "Add to Home Screen" helper (self-contained) */
(function(){
