/* ════════════════════════════════════════════════════════════════
   SLICKBRIDGE — cross-app channel (provider tab ⇆ client tab)
   Mirror of the client bridge. Same keys, same origin.
   ════════════════════════════════════════════════════════════════ */
const SlickBridge=(function(){
  const K_BOOKINGS='sc_bookings';
  const K_AVAIL='sc_availability';
  const K_BUS='sc_bus';
  const handlers={};
  let bc=null;
  try{bc=new BroadcastChannel('slickchart');}catch(e){bc=null;}
  function read(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
  function write(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}
  function emit(type,payload){(handlers[type]||[]).forEach(fn=>{try{fn(payload);}catch(e){console.warn(e);}});}
  let _seen=null;
  try{const cur=read(K_BUS,null);if(cur&&cur.id)_seen=cur.id;}catch(e){}
  function _ingest(m){if(!m||!m.id||m.id===_seen)return;_seen=m.id;emit(m.type,m.payload);}
  function post(type,payload){
    const msg={type,payload,t:Date.now(),id:'m'+Math.random().toString(36).slice(2)};
    _seen=msg.id;
    write(K_BUS,msg);
    if(bc){try{bc.postMessage(msg);}catch(e){}}
    emit(type,payload);
  }
  function on(type,fn){(handlers[type]=handlers[type]||[]).push(fn);}
  window.addEventListener('storage',e=>{if(e.key===K_BUS&&e.newValue){try{_ingest(JSON.parse(e.newValue));}catch(_){}}});
  if(bc)bc.onmessage=e=>{_ingest(e.data);};
  // storage events + BroadcastChannel don't fire reliably between locally-opened files, so also poll the shared bus (deduped by id)
  setInterval(()=>{try{_ingest(read(K_BUS,null));}catch(e){}},700);
  return{
    post,on,
    getBookings:()=>read(K_BOOKINGS,[]),
    setBookings:(arr)=>write(K_BOOKINGS,arr),
    upsertBooking(b){const all=read(K_BOOKINGS,[]);const i=all.findIndex(x=>x.id===b.id);if(i>=0)all[i]=b;else all.unshift(b);write(K_BOOKINGS,all);return b;},
    getAvailability:()=>read(K_AVAIL,null),
    setAvailability:(a)=>write(K_AVAIL,a),
  };
})();

  }catch(e){}
}

let clientHomecare={};

function getClientHomecare(id){
  if(clientHomecare[id]) return clientHomecare[id];
  const isHairBarber=(selectedProfessions.includes('hair')||selectedProfessions.includes('barber'))&&!selectedProfessions.includes('esty');
  const isBarberOnly=selectedProfessions.includes('barber')&&!selectedProfessions.includes('esty')&&!selectedProfessions.includes('hair');
  const isBrowOnlyHC=selectedProfessions.includes('brow')&&!selectedProfessions.includes('esty')&&!selectedProfessions.includes('hair')&&!selectedProfessions.includes('barber');
  const defaults=isBrowOnlyHC?defaultBrowHomecare:isBarberOnly?defaultBarberHomecare:isHairBarber?defaultHairHomecare:defaultEstyHomecare;
  clientHomecare[id]=[...(defaults[id]||defaults.maya)];
  return clientHomecare[id];
}

function addHomecareTag(id,tag,ctx){
  const tags=getClientHomecare(id);
  if(tag&&!tags.includes(tag)){tags.push(tag);persistWorkspace();_pushRoutine(id);_rerenderHomecare(id,ctx);}
}
function removeHomecareTag(id,idx,ctx){
  getClientHomecare(id).splice(idx,1);
  persistWorkspace();
  _pushRoutine(id);
  _rerenderHomecare(id,ctx);
}
function _rerenderHomecare(id,ctx){
  if(ctx==='profile')renderClient(id);else renderSessionSummary(id);
}
function _pushRoutine(id){
  // the connected client (Maya) gets routine changes live — no summary needed
  if(id==='maya'){try{SlickBridge.post('routine-update',{providerId:'jess',clientId:'maya',routine:getClientHomecare(id).slice()});}catch(e){}}
}
function _addRoutineFromProfile(id){
  const el=document.getElementById('routine-add-'+id);
  const v=el?el.value.trim():'';
  if(v)addHomecareTag(id,v,'profile');
}

const Cloud={
  enabled:false,
  token:(function(){try{return localStorage.getItem('sc_token')||'';}catch(e){return '';}})(),
  _origSet:null,_queue:{},_timer:null,
  async status(){try{const r=await fetch('/api/cloud-status');const j=await r.json();this.enabled=!!(j&&j.enabled);}catch(e){this.enabled=false;}return this.enabled;},
  async login(email,pw){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});let j={};try{j=await r.json();}catch(e){}if(!r.ok)throw new Error((j&&j.error)||'Login failed');this.token=j.token;try{localStorage.setItem('sc_token',this.token);if(j.email)localStorage.setItem('sc_login_email',j.email);}catch(e){}return j;},

  logout(){this.token='';try{localStorage.removeItem('sc_token');}catch(e){}},
  async pull(){if(!this.token)return -1;let r;try{r=await fetch('/api/store',{headers:{'Authorization':'Bearer '+this.token}});}catch(e){return -1;}if(r.status===401){this.logout();return -1;}let j={};try{j=await r.json();}catch(e){}const data=(j&&j.data)||{};const set=this._origSet||localStorage.setItem.bind(localStorage);const keys=Object.keys(data);keys.forEach(k=>{try{set(k,data[k]);}catch(e){}});return keys.length;},
  pushAllLocal(){const items={};try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(_syncable(k))items[k]=localStorage.getItem(k);}}catch(e){}if(this.token&&Object.keys(items).length)return fetch('/api/store',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+this.token},body:JSON.stringify({items})}).catch(()=>{});},

};

const _LANGS=[['en','English'],['es','Espa\u00f1ol'],['fr','Fran\u00e7ais'],['ja','\u65e5\u672c\u8a9e']];
function _detectLang(){
  try{const saved=localStorage.getItem('sc_lang');if(saved&&I18N[saved])return saved;}catch(e){}
  try{const n=((typeof navigator!=='undefined'&&(navigator.language||(navigator.languages&&navigator.languages[0])))||'en').slice(0,2).toLowerCase();if(I18N[n])return n;}catch(e){}
  return 'en';
}
let _lang=_detectLang();
function t(k,vars){let str=(I18N[_lang]&&I18N[_lang][k])||I18N.en[k]||k;if(vars)Object.keys(vars).forEach(v=>{str=str.replace('{'+v+'}',vars[v]);});return str;}
function _langOptions(){return _LANGS.map(([c,l])=>`<option value="${c}"${_lang===c?' selected':''}>${l}</option>`).join('');}
function _setLang(l){if(!I18N[l])return;_lang=l;try{localStorage.setItem('sc_lang',l);}catch(e){}
  if(document.getElementById('login-screen')){renderLogin();return;}
  try{const cur=(typeof _navCur!=='undefined'&&_navCur&&_navCur.screen)||'account';nav(cur,(typeof _navCur!=='undefined'&&_navCur)?_navCur.data:undefined);}catch(e){}
}
let _loginMode='login';let _resetToken='';let _resetSentTo='';
function _setLoginMode(m){_loginMode=m;renderLogin();}
function _prefillEmail(){try{return localStorage.getItem('sc_login_email')||'';}catch(e){return '';}}
function _handleAuthParams(){
  try{
    const p=new URLSearchParams(location.search);
    const v=p.get('verify'), r=p.get('reset');
    if(v){Cloud.verifyEmail(v).then(ok=>{if(typeof proToast==='function')proToast(ok?'Email verified \u2713':'That verification link has expired');});try{const u=new URL(location.href);u.searchParams.delete('verify');history.replaceState({},'',u);}catch(e){}}
    if(r){_resetToken=r;_loginMode='newpw';try{const u=new URL(location.href);u.searchParams.delete('reset');history.replaceState({},'',u);}catch(e){}renderLogin();return true;}
    const sq=p.get('sq');
    if(sq){const reason=p.get('reason');setTimeout(()=>{if(typeof proToast==='function')proToast(sq==='connected'?'Square connected \u2713':'Square connection failed'+(reason?': '+reason:''));},500);try{const u=new URL(location.href);u.searchParams.delete('sq');u.searchParams.delete('reason');history.replaceState({},'',u);}catch(e){}}
  }catch(e){}
  return false;
}

  } else {

      ${signup?`<label class="fl-lbl" for="login-name">${t('name')}</label><input id="login-name" autocomplete="name" placeholder="${t('name_ph')}" style="${ic}">`:''}
      <label class="fl-lbl" for="login-email">${t('email')}</label>

      ${signup?`<div style="font-size:11px;color:#777;margin-bottom:6px;">${t('min8')}</div>`:`<div style="text-align:right;margin-bottom:6px;"><button onclick="_setLoginMode('reset')" style="background:none;border:none;color:#888;cursor:pointer;font-family:inherit;font-size:12px;">${t('forgot')}</button></div>`}

function _loginVal(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function doLogin(){
  const email=_loginVal('login-email');const pw=(document.getElementById('login-pw')||{}).value||'';
  const er=document.getElementById('login-err');if(er)er.textContent='';
  Cloud.login(email,pw).then(async()=>{
    try{const n=await Cloud.pull();if(n===0)await Cloud.pushAllLocal();_reloadAll();}catch(e){}
    const ov=document.getElementById('login-screen');if(ov)ov.remove();nav('home');
  }).catch(e=>{const er=document.getElementById('login-err');if(er)er.textContent=(e&&e.message)||'Login failed';});
}
function doSignup(){
  const email=_loginVal('login-email');const pw=(document.getElementById('login-pw')||{}).value||'';const name=_loginVal('login-name');
  const optIn=!!((document.getElementById('login-optin')||{}).checked);
  const er=document.getElementById('login-err');if(er)er.textContent='';
  Cloud.signup(email,pw,name,optIn).then(async()=>{
    try{await Cloud.pushAllLocal();}catch(e){}
    try{if(name&&typeof bizInfo!=='undefined'){if(!bizInfo.ownerName||bizInfo.ownerName==='Jessica Lee, LE')bizInfo.ownerName=name;if(typeof saveBizInfo==='function')saveBizInfo();if(typeof _syncProviderAvatar==='function')_syncProviderAvatar();}}catch(e){}
    const ov=document.getElementById('login-screen');if(ov)ov.remove();nav('home');
  }).catch(e=>{const er=document.getElementById('login-err');if(er)er.textContent=(e&&e.message)||'Sign up failed';});
}
function doRequestReset(){
  const email=_loginVal('login-email');const er=document.getElementById('login-err');if(er)er.textContent='';
  if(!email){if(er)er.textContent='Enter your email.';return;}
  Cloud.requestReset(email).then(()=>{_resetSentTo=email;_loginMode='sent';renderLogin();});
}
function doResetPw(){
  const pw=(document.getElementById('login-pw')||{}).value||'';const er=document.getElementById('login-err');if(er)er.textContent='';
  if(pw.length<8){if(er)er.textContent=t('min8');return;}
  Cloud.resetPw(_resetToken,pw).then(()=>{_resetToken='';_loginMode='login';renderLogin();const e2=document.getElementById('login-err');if(e2){e2.style.color='#4ec49a';e2.textContent=t('pw_updated');}}).catch(e=>{const er=document.getElementById('login-err');if(er)er.textContent=(e&&e.message)||'Reset failed';});
}
function _doLogout(){try{Cloud.logout();}catch(e){}try{localStorage.removeItem('sc_token');}catch(e){}_loginMode='login';try{if(typeof caches!=='undefined'&&caches.keys)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});}catch(e){}try{location.reload();}catch(e){}setTimeout(()=>{try{renderLogin();}catch(e){}},60);}
function cloudLogout(){if(typeof confirmModal==='function'){confirmModal({title:'Sign out?',body:'Log out of SlickChart on this device? Your data stays saved in the cloud.',action:'Sign out'},_doLogout);}else{_doLogout();}}
function applyProfessionConfig(){
  const profs=getActiveProfessions();
  const hasHair=profs.some(p=>p.id==='hair');
  const hasBarber=profs.some(p=>p.id==='barber');
  const hasEsty=profs.some(p=>p.id==='esty');
  const hasBrow=profs.some(p=>p.id==='brow');
  const browOnly=hasBrow&&!hasEsty&&!hasHair&&!hasBarber;
  const hairBarberOnly=(hasHair||hasBarber)&&!hasEsty&&!hasBrow;

  if(hasHair){Object.assign(noteTemplates,hairNoteTemplates);activeNoteTemplate='colorRecord';}
  if(hasBarber){Object.assign(noteTemplates,barberNoteTemplates);if(!hasHair)activeNoteTemplate='cutRecord';}
  if(hasBrow){Object.assign(noteTemplates,browNoteTemplates);if(browOnly)activeNoteTemplate='browRecord';}
  if(hasEsty||(!hasHair&&!hasBarber&&!hasBrow)){activeNoteTemplate='soap';}

  if(hairBarberOnly&&hasHair) Object.assign(checkinCfg,hairCheckinCfg);
  else if(hairBarberOnly&&hasBarber) Object.assign(checkinCfg,barberCheckinCfg);
  else if(browOnly) Object.assign(checkinCfg,browCheckinCfg);

  if(hairBarberOnly&&hasHair){protocols.length=0;hairProtocols.forEach(p=>protocols.push(p));}
  else if(hairBarberOnly&&hasBarber){protocols.length=0;barberProtocols.forEach(p=>protocols.push(p));}
  else if(browOnly){protocols.length=0;browProtocols.forEach(p=>protocols.push(p));}

  if(hairBarberOnly&&hasHair){affiliateLinks.length=0;hairAffiliateLinks.forEach(a=>affiliateLinks.push(a));}
  else if(hairBarberOnly&&hasBarber){affiliateLinks.length=0;barberAffiliateLinks.forEach(a=>affiliateLinks.push(a));}
  else if(browOnly){affiliateLinks.length=0;browAffiliateLinks.forEach(a=>affiliateLinks.push(a));}

  // Swap client demo data
  if(browOnly){
    Object.keys(browClientData).forEach(id=>{
      if(CL[id])Object.assign(CL[id],browClientData[id]);
    });
    if(CL.maya)CL.maya.touchUpDate='Jul 22, 2026';
    if(CL.sophie)CL.sophie.touchUpDate='Aug 5, 2026';
    if(CL.priya)CL.priya.touchUpDate=null; // wax client — no PMU touch-up needed
  } else if(hairBarberOnly&&hasHair){
    if(CL.maya){CL.maya.treatment='Balayage + Gloss';CL.maya.skin='Fine · Color-treated';CL.maya.concerns='Brassiness, dry ends';CL.maya.allergies='Ammonia-based color';}
    if(CL.sophie){CL.sophie.treatment='Keratin Treatment';CL.sophie.skin='Thick · Wavy';CL.sophie.concerns='Frizz, humidity damage';CL.sophie.allergies='None known';}
    if(CL.priya){CL.priya.treatment='Haircut + Blowout';CL.priya.skin='Curly · High porosity';CL.priya.concerns='Volume, curl definition';CL.priya.allergies='None known';}
  } else if(hairBarberOnly&&hasBarber){
    if(CL.maya){CL.maya.treatment='Fade + Lineup';CL.maya.skin='Normal scalp';CL.maya.concerns='Clean fade, sharp lineup';CL.maya.allergies='None known';}
    if(CL.sophie){CL.sophie.treatment='Beard Trim + Shape';CL.sophie.skin='Sensitive skin';CL.sophie.concerns='Ingrown hairs, dry beard';CL.sophie.allergies='Fragranced products';}
    if(CL.priya){CL.priya.treatment='Classic Cut';CL.priya.skin='Normal scalp';CL.priya.concerns='Taper, natural finish';CL.priya.allergies='None known';}
  } else {
    if(CL.maya){CL.maya.treatment='Hydrafacial';CL.maya.skin='Combination · Sensitive';CL.maya.concerns='Hyperpigmentation, dullness';CL.maya.allergies='Fragrance, retinol';}
    if(CL.sophie){CL.sophie.treatment='Chemical Peel';CL.sophie.skin='Dry · Sensitive';CL.sophie.concerns='Acne scarring, redness';CL.sophie.allergies='Salicylic acid';}
    if(CL.priya){CL.priya.treatment='LED Therapy';CL.priya.skin='Oily';CL.priya.concerns='Enlarged pores, breakouts';CL.priya.allergies='None known';}
  }
  if(typeof rebuildResources==='function')rebuildResources();
}

function _normBirthday(s){
  if(!s)return ''; s=String(s).trim();
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/); if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/(\d{2})-(\d{2})$/); if(m)return '0000-'+m[1]+'-'+m[2];
  m=s.match(/^(\d{1,2})[\/](\d{1,2})[\/](\d{2,4})$/); if(m)return (m[3].length===2?'20'+m[3]:m[3])+'-'+String(m[1]).padStart(2,'0')+'-'+String(m[2]).padStart(2,'0');
  const d=new Date(s); if(!isNaN(d))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return '';
}
function _bdayMonthDay(b){const n=_normBirthday(b);if(!n)return null;const p=n.split('-');const m=parseInt(p[1],10),d=parseInt(p[2],10);if(!m||!d)return null;return {m,d};}

function _fileEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Build a clean, printable standalone HTML document of a client's whole file.
function _buildClientFileHTML(id){
  const c=CL[id]; if(!c) return '';
  const biz=(typeof bizInfo!=='undefined'&&bizInfo)?bizInfo:{};
  const bizName=_fileEsc(biz.name||'SlickChart');
  const owner=_fileEsc(biz.ownerName||'');
  const now=new Date();
  const dateStr=now.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})+' \u00b7 '+now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  // ---- profile ----
  const rows=[];
  const push=(l,v)=>{ if(v!=null&&String(v).trim()&&String(v).trim()!=='\u2014') rows.push([l,String(v)]); };
  push('Treatment', c.treatment);
  (typeof _vitalsConfig==='function'?_vitalsConfig():[]).forEach(f=>push(f.label, c[f.key]));
  if(c.sessions!=null) push('Sessions', c.sessions + (c.seriesTotal?(' of '+c.seriesTotal):''));
  push('Touch-up due', c.touchUpDate);
  const profileHTML = rows.map(([l,v])=>`<tr><td class="l">${_fileEsc(l)}</td><td class="v">${_fileEsc(v)}</td></tr>`).join('');
  // ---- flagged contraindications ----
  let flaggedHTML='';
  if(c.flaggedContra){
    flaggedHTML=`<div class="flag"><div class="flag-h">\u26a0 Flagged on intake \u2014 review before treatment</div>`+
      `<div class="sub">Marked on \u201c${_fileEsc(c.flaggedContra.form)}\u201d (${_fileEsc(c.flaggedContra.date)}):</div>`+
      `<ul>${c.flaggedContra.items.map(it=>`<li>${_fileEsc(it)}</li>`).join('')}</ul></div>`;
  }
  // ---- forms on file ----
  let formsHTML='';
  const sfs=(c.submittedForms||[]);
  if(sfs.length){
    formsHTML=sfs.map(sf=>{

// Print via a hidden iframe (reliable on mobile Safari, no popup blocker).
function _printClientFile(id){
  const html=_buildClientFileHTML(id); if(!html)return;
  const f=document.createElement('iframe');
  f.setAttribute('aria-hidden','true');
  f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;';
  document.body.appendChild(f);
  try{
    const doc=f.contentWindow.document;
    doc.open();doc.write(html);doc.close();
    setTimeout(()=>{try{f.contentWindow.focus();f.contentWindow.print();}catch(e){}setTimeout(()=>{try{f.remove();}catch(e){}},2000);},350);
  }catch(e){try{f.remove();}catch(_){}if(typeof proToast==='function')proToast('Could not open print \u2014 try Download instead');}
}
// Download the file as a standalone .html the provider can open, print, or keep.
function _downloadClientFile(id){
  const c=CL[id]; if(!c)return;
  const html=_buildClientFileHTML(id); if(!html)return;
  try{
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=(c.name||'client').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'')+'-file.html';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{try{URL.revokeObjectURL(url);a.remove();}catch(e){}},1500);
    if(typeof proToast==='function')proToast('File downloaded \u2713');
  }catch(e){ if(typeof proToast==='function')proToast('Could not download \u2014 try Print instead'); }
}

function _suggestedFormsFor(c){
  if(!c||typeof formTmpls==='undefined')return [];
  const t=String(c.treatment||'').toLowerCase();
  const have=new Set([...((c.submittedForms||[]).map(s=>s.title)),...((c.signedForms||[])||[])]);
  const out=[];
  const add=k=>{const f=formTmpls[k];if(f&&f.name&&out.indexOf(k)<0&&!have.has(f.name))out.push(k);};
  if(/peel/.test(t))add('peel');
  if(/micro|needl/.test(t))add('micro');
  if(/dermaplan/.test(t))add('derma');
  if(/lash lift/.test(t))add('lash-lift');
  if(/lash.*tint|tint.*lash/.test(t))add('lash-tint');
  if(/lash|extension set|lash fill/.test(t)){add('lash');add('lash-intake');add('consent-lash');}
  if(/lamination|\blam\b/.test(t))add('brow-lam');
  if(/microblad|pmu|powder brow|ombre|combo brow|nano/.test(t))add('brow-pmu');
  if(/brow.*tint|tint.*brow|henna/.test(t))add('brow-tint');
  if(/wax|brazilian|bikini/.test(t))add('wax-consent');
  if(/color|balayage|highlight|gloss|toner|bleach|foil/.test(t))add('hair-color');
  if(/perm|relax|keratin|smoothing|chemical straighten/.test(t)){add('hair-chemical');add('barber-chemical');}
  if(/extension/.test(t))add('hair-extension');
  if(/razor|straight shave|hot.?towel/.test(t))add('barber-razor');
  if(/massage|deep tissue|swedish|sports|prenatal massage/.test(t))add('massage-consent');
  if(/acrylic|\bgel\b|dip|full set|enhancement|nail/.test(t))add('nail-consent');
  if(/makeup|bridal|glam|mua/.test(t))add('makeup-screen');
  if(/gut|digest|sensitiv|allerg|intoleran/.test(t))add('nutrition-sensitivity');
  if(/goal|weight|coaching|habit|meal plan|macro/.test(t))add('nutrition-goals');
  if(/cavitation|ultrasonic|radiofreq|\brf\b|skin tighten|sculpt/.test(t))add('contour-cavitation');
  if(/lymphatic|drainage/.test(t))add('contour-lymphatic');
  // if there's no intake or consent on file at all, suggest the profession's intake + consent
  const hasIntakeOrConsent=[...have].some(n=>/intake|consent/i.test(n));
  if(!hasIntakeOrConsent){
    const ik=(typeof _ncIntakeFormId==='function')?_ncIntakeFormId():'intake';
    const ck=(typeof _ncConsentId==='function')?_ncConsentId():'consent-esty';
    if(ik)add(ik);if(ck)add(ck);
  }
  return out.slice(0,3);
}

// ── AI helper: routes through the serverless proxy (/api/ai) so the browser
//    never holds a key. Throws if AI isn't configured, so callers can fall back. ──
async function _aiComplete(messages,maxTokens,model){
  const headers={'Content-Type':'application/json'};
  try{const tok=(typeof Cloud!=='undefined'&&Cloud&&Cloud.token)||(localStorage.getItem&&localStorage.getItem('sc_token'))||'';if(tok)headers['Authorization']='Bearer '+tok;}catch(e){}
  const res=await fetch('/api/ai',{method:'POST',headers,body:JSON.stringify({messages,max_tokens:maxTokens||1000,model:model||'claude-sonnet-4-6'})});
  if(!res.ok)throw new Error('ai-http-'+res.status);
  const data=await res.json().catch(()=>({}));
  if(!data||data.enabled===false)throw new Error('ai-disabled');
  if(data.error)throw new Error(data.error);
  return (data.content||[]).map(b=>b.text||'').join('');
}

function _vitalForQuestion(label){
  const l=(label||'').toLowerCase();
  if(/allerg|sensitiv/.test(l)) return 'allergies';
  if(/pregnan|nursing|breastfeed/.test(l)) return 'pregnancy';
  if(/medication|prescription|currently taking|on any med|taking any med/.test(l)) return 'medications';
  if(/medical (history|condition)|health condition|chronic|underlying condition|skin\s+condition/.test(l)) return 'conditions';
  if(/fitzpatrick|skin tone|undertone/.test(l)) return 'fitz';
  if(/(skin|hair|lash|nail|brow)\s*(type|texture)|natural\s+(hair|lash|brow)|skin\s*type\s*&?\s*tone/.test(l)) return 'skin';
  if(/concern|goal|occasion|look|areas you want|cut style|preferred\s+(cut|style|finish|look)|work on|enhancement/.test(l)) return 'concerns';
  return null;
}
function _applyIntakeVitals(chart,formId,getAns){

    let a=getAns(q); if(a==null) return; a=String(a).trim(); if(!a) return;

// AI: rewrite the provider's session notes into a warm, plain-language note the client reads.
// Provider can still tap Edit afterwards to tweak it.
async function aiClientFriendly(id,btn){
  if(!aiEnabled){if(typeof proToast==='function')proToast('AI features are off — turn them on in Settings → AI features');return;}
  const el=document.getElementById('summary-note');
  const raw=((el&&el.innerText)||'').trim();
  if(!raw){if(typeof proToast==='function')proToast('Add some session notes first, then rewrite');return;}
  const c=CL[id]||{};const first=(c.name||'').split(' ')[0]||'your client';
  const old=btn.innerHTML;btn.disabled=true;btn.style.opacity='.6';btn.innerHTML='<i class="ti ti-loader-2"></i> Rewriting…';
  try{
    const prompt=`You are helping a ${typeof _profName==='function'?_profName():'skincare provider'} write the short note their client reads in a post-appointment summary. Rewrite the notes below into a warm, encouraging, plain-language message written directly to the client (address them as "you"). Remove clinical jargon and abbreviations, keep it accurate to the notes, and keep it to 2-4 short sentences. Do not invent treatments or outcomes that are not in the notes. Return ONLY the rewritten note — no preamble and no quotation marks.\n\nClient first name: ${first}\nTreatment: ${c.treatment||''}\n\nNotes:\n${raw}`;
    const out=((await _aiComplete([{role:'user',content:prompt}],400))||'').trim().replace(/^["']+|["']+$/g,'');
    if(!out)throw new Error('empty');
    summaryNoteDraft[id]=out;
    if(typeof persistWorkspace==='function')persistWorkspace();
    if(typeof proToast==='function')proToast('Rewritten for your client — edit if you like');
    renderSessionSummary(id);
  }catch(e){
    btn.disabled=false;btn.style.opacity='1';btn.innerHTML=old;
    if(typeof proToast==='function')proToast('Could not reach AI just now — try again, or edit manually');
  }
}

function _photoStamp(ts){const d=new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function _ensureCamInput(){let inp=document.getElementById('global-cam-input');if(!inp){inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');inp.id='global-cam-input';inp.style.display='none';(document.querySelector('.shell')||document.body).appendChild(inp);}return inp;}
// Opens the device camera; saves an auto date-stamped photo, then re-renders via `after`
function takePhoto(clientId,phase,after){
  const inp=_ensureCamInput();inp.value='';inp.multiple=false;
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0];const ts=Date.now();
    const save=url=>{
      if(!capturedPhotos[clientId])capturedPhotos[clientId]=[];
      capturedPhotos[clientId].push({url:url||'',ts,phase:phase||'',angle:(typeof activeAngle!=='undefined'&&activeAngle!=='Inspiration')?activeAngle:'Front'});
      proToast((phase?phase.charAt(0).toUpperCase()+phase.slice(1)+' photo':'Photo')+' captured · '+_photoStamp(ts));
      if(after)after();
    };
    if(f){const r=new FileReader();r.onload=e=>save(e.target.result);r.onerror=()=>save('');r.readAsDataURL(f);}else save('');
  };
  inp.click();
}
function _capturedFor(clientId,phase){return (capturedPhotos[clientId]||[]).filter(p=>!phase||p.phase===phase);}
// Thumbnail with a baked-in date + time stamp and optional before/after badge

let _pendingPhotos=[],_uploadAngle='Front';
function _uploadAngles(){
  const isHairBarber=(selectedProfessions.includes('hair')||selectedProfessions.includes('barber'))&&!selectedProfessions.includes('esty');
  const isBrowOnly=selectedProfessions.includes('brow')&&!selectedProfessions.includes('esty')&&!selectedProfessions.includes('hair')&&!selectedProfessions.includes('barber');
  return isBrowOnly?['Front','Arch L','Arch R','Close-up']:isHairBarber?['Front','Side','Back','Texture']:['Front','Left','Right','Close-up'];
}
function handlePhotoSelect(input){
  const files=Array.from(input.files).slice(0,6);
  if(!files.length)return;
  const thumbs=document.getElementById('photo-thumbs');
  const preview=document.getElementById('photo-preview-row');
  const saveBtn=document.getElementById('upload-save-btn');
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      _pendingPhotos.push({url:e.target.result,ts:Date.now()});
      if(thumbs){
        const div=document.createElement('div');
        div.style.cssText='width:72px;height:90px;border-radius:9px;overflow:hidden;flex-shrink:0;position:relative;';
        const d=new Date();
        div.innerHTML=`<img src="${e.target.result}" alt="" style="width:100%;height:100%;object-fit:cover;"><div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:6px 4px 3px;"><div style="font-size:8px;color:#fff;font-weight:600;">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div></div>`;
        thumbs.appendChild(div);
      }
    };
    reader.readAsDataURL(file);
  });
  if(preview)preview.style.display='block';
  if(saveBtn){saveBtn.disabled=false;saveBtn.style.opacity='1';}
}

function savePhotos(){
  const cid=uploadModalClientId;
  // commit each selected/captured photo with an auto date-stamp + chosen angle
  if(cid&&_pendingPhotos.length){
    if(!capturedPhotos[cid])capturedPhotos[cid]=[];
    _pendingPhotos.forEach(p=>capturedPhotos[cid].push({url:p.url,ts:p.ts||Date.now(),phase:'',angle:_uploadAngle}));
  }
  _pendingPhotos=[];_uploadAngle='Front';
  document.getElementById('photo-upload-modal')?.remove();

// Maps real pixel measurements (from the actual submitted photo) into profession-aware analysis cards.
// The hosted vision model will enrich these; the values below are measured on-device, not mocked.
function _metricsFromMeasures(kind,m){
  const clamp=v=>Math.round(Math.max(0,Math.min(100,v)));
  const lum=clamp(m.brightness/2.55),even=clamp(m.evenness);
  const warm=m.warmth>20?'Warm':m.warmth>6?'Neutral-warm':m.warmth<-4?'Cool':'Neutral';
  const red=m.redness>1.13?'Elevated':m.redness>1.05?'Mild':'Low';
  const level=Math.max(1,Math.min(10,Math.round(1+(m.brightness/255)*9)));
  if(kind==='hair')return[
    ['Measured level','Level '+level,'Estimated from the overall lightness of the current photo.','var(--accent)','var(--accent-tint)'],
    ['Tone',warm+(m.warmth>20?' (gold)':''),m.warmth>14?'Warm reflect present — plan a cool/ash toner if lifting.':'Neutral-to-cool base detected.','#5ba3e8','#0d1e33'],
    ['Colour evenness',even+'/100',even<70?'Banding / regrowth contrast detected end-to-end.':'Fairly even tone through the lengths.','#4ec49a','#0a2019'],
    ['Brightness',lum+'%','Relative luminance of the photo (lighting affects this).','#a891ec','#1e1633'],
  ];
  if(kind==='brow')return[
    ['Area tone',warm,'Undertone around the brow area from the photo.','#5ba3e8','#0d1e33'],
    ['Definition',even+'/100',even<70?'Gaps / uneven density detected through the shape.':'Fairly even density.','var(--accent)','var(--accent-tint)'],
    ['Reactivity',red,'Redness proxy — patch test before tint / lamination.','#4ec49a','#0a2019'],
    ['Brightness',lum+'%','Relative luminance — affects shade matching.','#a891ec','#1e1633'],
  ];
  if(kind==='lash')return[
    ['Lighting',lum+'%','Relative luminance of the submitted photo.','#5ba3e8','#0d1e33'],
    ['Lash-line evenness',even+'/100',even<70?'Sparse / gappy areas detected.':'Fairly even lash line.','var(--accent)','var(--accent-tint)'],
    ['Undertone',warm,'For tint shade matching.','#4ec49a','#0a2019'],
    ['Reactivity',red,'Eye-area sensitivity proxy — confirm no irritation.','#a891ec','#1e1633'],
  ];
  return[
    ['Luminosity',lum+'%',lum<45?'Reads a little dull — hydration + gentle exfoliation.':'Healthy light reflection.','#5ba3e8','#0d1e33'],
    ['Redness',red,m.redness>1.1?'Elevated red channel — check sensitivity / barrier.':'Redness within normal range.','#4ec49a','#0a2019'],
    ['Tone evenness',even+'/100',even<70?'Uneven tone / pigmentation detected.':'Fairly even tone.','var(--accent)','var(--accent-tint)'],
    ['Undertone',warm,'From the average colour of the photo.','#a891ec','#1e1633'],
  ];
}

// ── Vision analysis hook ──────────────────────────────────────────────────
// In the hosted app, set window.SLICKCHART_VISION_ENDPOINT to your server route. The
// server proxies to the vision model (e.g. Claude vision) and keeps the API key server-side.
//   Request  (POST application/json): { kind:'skin'|'hair'|'brow'|'lash',
//                                        goals?:string, images:[{label, dataUrl}] }
//   Response (200 application/json):  { metrics:[[label,value,note,color,bgColor], …],  // 3–5 cards
//                                        terminology?:[[clientSays, proTerm], …],
//                                        summary?:string }
// Until the endpoint is set, analysis falls back to on-device pixel measurements.
// Downscale a photo and return it as an Anthropic image content block (keeps the
// request small enough for the serverless limit and cheaper on vision tokens).
function _imgToBlock(dataURL,maxDim){return new Promise(res=>{
  try{
    if(!dataURL){return res(null);}
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;const m=maxDim||1024;
      if(w>m||h>m){if(w>=h){h=Math.round(h*m/w);w=m;}else{w=Math.round(w*m/h);h=m;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
      let out;try{out=cv.toDataURL('image/jpeg',0.82);}catch(e){return res(null);}
      res({type:'image',source:{type:'base64',media_type:'image/jpeg',data:(out.split(',')[1]||'')}});
    };
    img.onerror=()=>res(null);img.src=dataURL;
  }catch(e){res(null);}
});}
// Analyze submitted consult photos with the built-in AI (Claude vision) via /api/ai.
async function _aiVisionAnalyze(images,kind,goals){
  const list=(images||[]).slice(0,4);const blocks=[];
  for(const im of list){const b=await _imgToBlock(im&&im.src,1024);if(b){blocks.push({type:'text',text:((im&&im.label)||'Photo')+':'});blocks.push(b);}}
  if(!blocks.length)return null;
  const kindWord=kind==='hair'?'hair & style':kind==='brow'?'brow':kind==='lash'?'lash':'skin';
  const prof=(typeof _profName==='function'?_profName():'esthetics')||'esthetics';
  blocks.push({type:'text',text:`You are assisting a licensed ${prof} professional preparing for a client's virtual consultation. From the client's photos, give brief, cosmetic, strictly NON-diagnostic ${kindWord} observations to help the provider prepare — never diagnose medical conditions, diseases, or name any illness.${goals?(' The client stated goal: '+goals+'.'):''} Respond with ONLY valid JSON, no preamble or markdown, exactly: {"metrics":[{"label":"2-3 word aspect","value":"short value","detail":"one specific sentence"}],"terminology":[{"phrase":"a phrase the client might use","meaning":"professional meaning"}],"summary":"2-3 sentence prep summary for the provider"}. Give 3-4 metrics. Base everything only on what is visible; if unsure, say so.`});
  let out;try{out=await _aiComplete([{role:'user',content:blocks}],1200);}catch(e){return null;}
  let obj;try{obj=JSON.parse(String(out||'').replace(/```json/gi,'').replace(/```/g,'').trim());}catch(e){return null;}
  if(!obj||!Array.isArray(obj.metrics)||!obj.metrics.length)return null;
  const pal=[['#5ba3e8','#0d1e33'],['var(--accent)','var(--accent-tint)'],['#4ec49a','#0a2019'],['#a891ec','#1e1633']];
  const metrics=obj.metrics.slice(0,4).map((mm,i)=>[String(mm.label||''),String(mm.value||''),String(mm.detail||''),pal[i%4][0],pal[i%4][1]]);
  const terminology=Array.isArray(obj.terminology)?obj.terminology.map(t=>[String(t.phrase||''),String(t.meaning||'')]).filter(x=>x[0]):null;
  return {metrics,terminology:terminology&&terminology.length?terminology:null,summary:String(obj.summary||''),source:'ai'};
}
async function analyzeVirtualConsult(images,kind,goals){
  const endpoint=(typeof window!=='undefined'&&window.SLICKCHART_VISION_ENDPOINT)||null;
  if(endpoint&&images&&images.length){
    try{
      const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind,goals:goals||'',images:images.map(i=>({label:i.label,dataUrl:i.src}))})});

function _imgMeasures(dataURL){return new Promise(res=>{
  try{
  if(!dataURL){return res(null);}
  const img=new Image();img.onload=()=>{
    const s=72,cv=document.createElement('canvas');cv.width=s;cv.height=s;const ctx=cv.getContext('2d');
    ctx.drawImage(img,0,0,s,s);let d;try{d=ctx.getImageData(0,0,s,s).data;}catch(e){return res(null);}
    const n=s*s;let sL=0,sR=0,sG=0,sB=0;const Ls=[];
    for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2],L=0.299*r+0.587*g+0.114*b;sL+=L;sR+=r;sG+=g;sB+=b;Ls.push(L);}
    const mL=sL/n,mR=sR/n,mG=sG/n,mB=sB/n;let vL=0;Ls.forEach(L=>vL+=(L-mL)*(L-mL));const sd=Math.sqrt(vL/n);
    res({brightness:mL,redness:mR/(((mG+mB)/2)||1),warmth:mR-mB,evenness:Math.max(0,Math.min(100,100-sd/1.6)),sd});
  };img.onerror=()=>res(null);img.src=dataURL;
  }catch(e){res(null);}
});}

function toggleFormGuide(fid,gid){
  const arr=formGuides[fid]||(formGuides[fid]=[]);

function filterFormGuides(q){
  q=(q||'').trim().toLowerCase();let total=0;

  const nr=document.getElementById('fg-noresults');if(nr)nr.style.display=(q&&total===0)?'':'none';
}
function persistForms(){
  // survive a reload during testing (real product would sync to a backend)
  try{localStorage.setItem('sc_forms',JSON.stringify({tmpls:formTmpls,guides:formGuides,custom:customForms}));}catch(e){}
}
function loadForms(){
  try{
    const raw=localStorage.getItem('sc_forms');if(!raw)return;
    const d=JSON.parse(raw)||{};
    if(d.tmpls)Object.assign(formTmpls,d.tmpls);
    if(d.guides&&typeof d.guides==='object'){Object.keys(formGuides).forEach(k=>delete formGuides[k]);Object.assign(formGuides,d.guides);}
    if(Array.isArray(d.custom)){customForms.length=0;d.custom.forEach(c=>customForms.push(c));
      customFormSeq=Math.max(0,...d.custom.map(c=>parseInt(String(c.id||'').replace('custom',''),10)||0));}
  }catch(e){}
}
function persistWorkspace(){
  // recommended products, per-product reasons, custom products, in-office flags, and the recommended routine
  try{
    const inOffice={};affiliateLinks.forEach(a=>{inOffice[a.id]=!!a.inOffice;});
    const codes={};affiliateLinks.forEach(a=>{if(a.siteCode||a.urlCode||a.amazonCode)codes[a.id]={siteCode:a.siteCode||'',urlCode:a.urlCode||'',amazonCode:a.amazonCode||''};});
    localStorage.setItem('sc_workspace',JSON.stringify({
      clientRecs,recReasons,clientHomecare,
      customProducts:affiliateLinks.filter(a=>a.custom),
      inOffice,codes
    }));
  }catch(e){}
}
function loadWorkspace(){
  try{
    const raw=localStorage.getItem('sc_workspace');if(!raw)return;
    const d=JSON.parse(raw)||{};
    if(d.clientRecs)clientRecs=d.clientRecs;
    if(d.recReasons)recReasons=d.recReasons;
    if(d.clientHomecare)clientHomecare=d.clientHomecare;
    if(Array.isArray(d.customProducts))d.customProducts.forEach(p=>{if(!affiliateLinks.some(a=>a.id===p.id))affiliateLinks.push(p);});
    if(d.inOffice)affiliateLinks.forEach(a=>{if(a.id in d.inOffice)a.inOffice=d.inOffice[a.id];});
    if(d.codes)affiliateLinks.forEach(a=>{if(a.id in d.codes){const c=d.codes[a.id];if(typeof c==='string'){a.urlCode=c;}else{a.siteCode=c.siteCode||'';a.urlCode=c.urlCode||'';a.amazonCode=c.amazonCode||'';}}});
  }catch(e){}
}

(function bundlePhotoRelease(){

      {id:'pr-share',label:'I consent to photos being shared on social media and portfolio',type:'Yes / No',required:true}

      const t=formTmpls[k];

      if(t.qs.some(q=>q.id==='pr-taken'||q.id==='pr-share'))return; // never double-add

function _changeQType(sel){
  const row=sel.closest&&sel.closest('.qrow');if(!row)return;
  const id=row.getAttribute('data-qid')||('q'+(nextQIdLocal++));
  const label=(row.querySelector('.q-label')&&row.querySelector('.q-label').value)||'';
  const required=!!(row.querySelector('.q-req')&&row.querySelector('.q-req').checked);
  const q={id,label,type:sel.value,required};
  try{const o=JSON.parse(row.getAttribute('data-options')||'[]');if(o.length)q.options=o;}catch(e){}
  const ti=row.querySelector('.q-items');
  if(ti){const arr=(ti.value||'').split('\n').map(s=>s.trim()).filter(Boolean);if(arr.length)q.items=arr;}
  else{try{const it=JSON.parse(row.getAttribute('data-items')||'[]');if(it.length)q.items=it;}catch(e){}}
  const tmp=document.createElement('div');tmp.innerHTML=_qRowHTML(q);
  const nr=tmp.firstElementChild;
  if(nr&&row.parentNode)row.parentNode.replaceChild(nr,row);
}
function addFormQ(type){
  const list=document.getElementById('qlist');if(!list)return;
  const d=document.createElement('div');
  d.innerHTML=_qRowHTML({id:'q'+(nextQIdLocal++),label:'',type:type||'Short text',required:false});
  const row=d.firstElementChild||d.firstChild;
  list.appendChild(row);
  const inp=row.querySelector&&row.querySelector('.q-label');if(inp&&inp.focus)inp.focus();
}
function _readFormBuilder(tid){
  const nameEl=document.getElementById('form-name-input');
  const name=(nameEl&&nameEl.value||'').trim()||'Untitled form';
  const rows=[...document.querySelectorAll('#qlist .qrow')];
  const qs=rows.map(row=>{
    const label=(row.querySelector('.q-label')&&row.querySelector('.q-label').value||'').trim();
    if(!label)return null;
    const type=(row.querySelector('.q-type')&&row.querySelector('.q-type').value)||'Short text';
    const required=!!(row.querySelector('.q-req')&&row.querySelector('.q-req').checked);
    const q={id:row.getAttribute('data-qid')||('q'+(nextQIdLocal++)),label,type,required};
    if(type==='Multiple choice'||type==='Single select'){try{const o=JSON.parse(row.getAttribute('data-options')||'[]');if(o.length)q.options=o;}catch(e){}}
    if(type==='Contraindications'){const ti=row.querySelector('.q-items');if(ti){const arr=(ti.value||'').split('\n').map(s=>s.trim()).filter(Boolean);if(arr.length)q.items=arr;}else{try{const it=JSON.parse(row.getAttribute('data-items')||'[]');if(it.length)q.items=it;}catch(e){}}}
    return q;
  }).filter(Boolean);
  return {name,qs};
}
function saveFormBuilder(tid,thenPreview){
  const {name,qs}=_readFormBuilder(tid);
  let id=tid;
  if(tid==='new'){
    id='custom'+(++customFormSeq);
    customForms.push({id,name});
  }
  formTmpls[id]={name,qs};
  persistForms();
  if(thenPreview){nav('form-preview',id);return;}
  proToast('Form saved');
  nav('forms');
}

  const move=e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;_signPadInk=true;if(e.cancelable)e.preventDefault();};

// Format a near-future time label like "Jun 30 · 3:45 PM" (used for demo appointments)
function _soonVisitLabel(minsAhead){
  const d=new Date(Date.now()+(minsAhead||0)*60000);
  const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  let h=d.getHours();const ap=h>=12?'PM':'AM';h=h%12||12;const mm=(d.getMinutes()<10?'0':'')+d.getMinutes();
  return mon+' '+d.getDate()+' · '+h+':'+mm+' '+ap;
}
// Parse a nextVisit string into hours-from-now (null if unscheduled/unparseable)
function _hoursUntilVisit(c){
  const s=String((c&&c.nextVisit)||'');
  if(!s||/not scheduled/i.test(s))return null;
  const m=s.match(/([A-Za-z]{3,})\s+(\d{1,2}).*?(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if(!m)return null;
  const mons={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const mo=mons[m[1].slice(0,3).toLowerCase()];if(mo==null)return null;
  let h=parseInt(m[3],10);const ap=m[5].toUpperCase();if(ap==='PM'&&h<12)h+=12;if(ap==='AM'&&h===12)h=0;
  const now=new Date();const day=parseInt(m[2],10),min=parseInt(m[4],10);
  let d=new Date(now.getFullYear(),mo,day,h,min,0);
  if((d-now)/86400000 < -60)d=new Date(now.getFullYear()+1,mo,day,h,min,0);
  return (d-now)/3600000;
}

// Swipe-to-delete for automation cards (touch + mouse). Slides the card left to
// reveal the DELETE button behind it.
function initSwipe(card,i){
  if(!card||card._swipeInit)return;card._swipeInit=true;
  const W=80;
  let startX=0,startY=0,dx=0,dragging=false,opened=false,decided=false,horiz=false;
  const setX=x=>{card.style.transform='translateX('+x+'px)';};
  const open=()=>{opened=true;card.style.transition='transform .2s';card.style.transform='translateX(-'+W+'px)';};
  const close=()=>{opened=false;card.style.transition='transform .2s';card.style.transform='translateX(0px)';};
  const closeOthers=()=>{try{document.querySelectorAll('.swipe-card').forEach(el=>{if(el!==card){el.style.transition='transform .2s';el.style.transform='translateX(0px)';if(el._setClosed)el._setClosed();}});}catch(e){}};
  card._setClosed=()=>{opened=false;};
  const onStart=(x,y)=>{startX=x;startY=y;dx=opened?-W:0;dragging=true;decided=false;horiz=false;card.style.transition='none';};
  const onMove=(x,y)=>{
    if(!dragging)return;
    const mx=x-startX,my=y-startY;
    if(!decided){if(Math.abs(mx)>6||Math.abs(my)>6){decided=true;horiz=Math.abs(mx)>Math.abs(my);}else return;}
    if(!horiz){dragging=false;card.style.transition='transform .2s';setX(opened?-W:0);return;}
    let nx=(opened?-W:0)+mx;if(nx>0)nx=0;if(nx<-W-20)nx=-W-20;dx=nx;setX(nx);
  };
  const onEnd=()=>{
    if(!dragging)return;dragging=false;
    if(!horiz){card.style.transition='transform .2s';return;}
    if(dx<-W/2){closeOthers();open();}else{close();}
  };
  card.addEventListener('touchstart',e=>{if(e.touches&&e.touches[0])onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{if(e.touches&&e.touches[0])onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchend',onEnd);card.addEventListener('touchcancel',onEnd);
  card.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);const mm=ev=>onMove(ev.clientX,ev.clientY);const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
}

let customResources=[];   // provider-added guides (persisted)
let resources=[];         // active library — rebuilt from selected professions + custom
function rebuildResources(){
  const out=[],idx={};
  const profs=(typeof selectedProfessions!=='undefined'&&selectedProfessions.length)?selectedProfessions:['esty'];
  profs.forEach(p=>{(guideTemplatesByProf[p]||[]).forEach(g=>{if(!(g.id in idx)){idx[g.id]=out.length;out.push(Object.assign({},g));}});});
  customResources.forEach(g=>{
    if(g.id in idx){out[idx[g.id]]=Object.assign({},out[idx[g.id]],g);}        // edited template overrides original
    else if(/^g-custom-/.test(g.id)){idx[g.id]=out.length;out.push(Object.assign({},g));}  // provider-created guide
  });
  resources.length=0;out.forEach(g=>resources.push(g));
}

function _routineProfKey(){

function notifCard(n,bare){
  return`<div onclick="markRead('${n.id}');${n.action==='client'?`nav('client','${n.data}')`:n.action==='chat'?`nav('chat','${n.data}')`:n.action==='checkin'?`nav('checkin-detail','${n.data}')`:n.action==='vault'?`nav('vault')`:n.action==='inventory'?`nav('inventory')`:n.action==='requests'?`nav('requests')`:n.action==='home'?`nav('home')`:''}" style="background:#1a1a1a;border:1px solid ${n.read?'#2a2a2a':'var(--accent-tint2)'};border-radius:12px;${bare?'':'margin:0 16px 8px;'}overflow:hidden;cursor:pointer;${n.read?'':'background:#1e1a10;'}">
    <div style="padding:12px 14px;display:flex;align-items:flex-start;gap:10px;">
      <div style="position:relative;flex-shrink:0;">
        <div style="width:40px;height:40px;border-radius:10px;background:${n.col};display:flex;align-items:center;justify-content:center;">
          <i class="ti ${n.icon}" aria-hidden="true" style="font-size:18px;color:${n.ic};"></i>

      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:${n.read?400:600};color:#e0e0e0;margin-bottom:3px;">${n.title}</div>

      </div>
    </div>
  </div>`;
}
function notifRow(n){
  return`<div style="position:relative;overflow:hidden;margin:0 16px 8px;border-radius:12px;">
    <div class="swipe-card">${notifCard(n,true)}</div>
    <div class="swipe-reveal" style="background:#0f2a1a;border-radius:0 12px 12px 0;" onclick="event.stopPropagation();clearNotif('${n.id}')" aria-label="Clear notification">
      <i class="ti ti-check" aria-hidden="true" style="color:#4ec49a;"></i><span style="color:#4ec49a;">DONE</span>

}
function clearNotif(id){const i=notifFeed.findIndex(n=>n.id===id);if(i>=0)notifFeed.splice(i,1);updateBadge();renderNotifFeed();}
function markRead(id){
  const n=notifFeed.find(x=>x.id===id);
  if(n)n.read=true;
  updateBadge();
}
function updateBadge(){
  const badge=document.getElementById('notif-badge');
  const count=unreadCount();
  if(badge){badge.textContent=count;badge.style.display=count>0?'flex':'none';}
}

function loadBrandColors(){
  try{const s=localStorage.getItem('sc_brand_colors');if(s)return JSON.parse(s);}catch(e){}
  return{primary:'#C8A882',secondary:'#2C5F8A'};
}
let brandColors=loadBrandColors();
function saveBrandColors(){try{localStorage.setItem('sc_brand_colors',JSON.stringify(brandColors));}catch(e){}}

// Derive readable ink + dark tints from any accent, then drive the whole app
function _ink(hex){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return((r*299+g*587+b*114)/1000)>=140?'#181410':'#ffffff';}
function _mixDark(hex,f){const h=hex.replace('#','');const m=(c)=>Math.round(parseInt(c,16)*f).toString(16).padStart(2,'0');return`#${m(h.slice(0,2))}${m(h.slice(2,4))}${m(h.slice(4,6))}`;}
function applyTheme(){
  const p=brandColors.primary,s=brandColors.secondary,root=document.documentElement;
  root.style.setProperty('--accent',p);
  root.style.setProperty('--accent-2',s);
  root.style.setProperty('--accent-ink',_ink(p));
  root.style.setProperty('--accent-tint',_mixDark(p,0.21));
  root.style.setProperty('--accent-tint2',_mixDark(p,0.30));
  root.style.setProperty('--accent-a08',_hexA(p,0.03));
  root.style.setProperty('--accent-a15',_hexA(p,0.08));
  root.style.setProperty('--accent-a20',_hexA(p,0.125));
  root.style.setProperty('--accent-a44',_hexA(p,0.27));
  // share brand with the client app so client-facing screens match
  try{SlickBridge.post('brand-update',{primary:p,secondary:s});}catch(e){}
}

const DAY_DEFS=[['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']];
function normalizeAvail(a){
  const keys=DAY_DEFS.map(d=>d[0]);
  const def={};keys.forEach(d=>def[d]={open:d!=='sun',start:'09:00',end:'17:00'});
  if(!a)return def;
  if(a.days&&!a.mon){ // legacy {days:{mon:bool},start,end} → per-day
    const out={};keys.forEach(d=>out[d]={open:!!a.days[d],start:a.start||'09:00',end:a.end||'17:00'});return out;
  }
  const out={};keys.forEach(d=>out[d]=(a[d]&&typeof a[d]==='object')?{open:!!a[d].open,start:a[d].start||'09:00',end:a[d].end||'17:00'}:def[d]);return out;
}
function halfHourOptions(){
  const out=[];
  for(let h=0;h<24;h++){for(const m of[0,30]){
    const v=String(h).padStart(2,'0')+':'+(m===0?'00':'30');
    let hr=h%12;if(hr===0)hr=12;
    out.push({v,l:`${hr}:${m===0?'00':'30'} ${h<12?'AM':'PM'}`});
  }}
  return out;
}

function _applyImportedProducts(){try{(_importedProducts||[]).forEach(pr=>{if(!affiliateLinks.some(a=>(a.name||'').toLowerCase()===(pr.name||'').toLowerCase()))affiliateLinks.push(pr);});}catch(e){}}
function _parseCSV(text){
  const rows=[];let i=0,field='',row=[],inQ=false;text=String(text||'').replace(/\r\n?/g,'\n');
  while(i<text.length){const ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){field+='"';i++;}else{inQ=false;}}else{field+=ch;}}
    else{if(ch==='"'){inQ=true;}else if(ch===','){row.push(field);field='';}else if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';}else{field+=ch;}}
    i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.length&&r.some(c=>String(c).trim()!==''));
}
function _mapClientRows(rows){
  if(rows.length<2)return [];
  const H=rows[0].map(h=>String(h).trim().toLowerCase());
  const find=re=>H.findIndex(h=>re.test(h));
  const iFirst=find(/first|given/), iLast=find(/last|family|surname/);
  const iName=H.findIndex(h=>h.includes('name')&&!/first|last|given|family|user|file/.test(h));
  const iEmail=find(/e-?mail/), iPhone=find(/phone|mobile|cell/), iBday=find(/birth|dob/), iNotes=find(/note|concern|comment/);
  const out=[];
  for(let r=1;r<rows.length;r++){const c=rows[r];
    let name='';
    if(iFirst>=0||iLast>=0)name=[(c[iFirst]||''),(c[iLast]||'')].join(' ').trim();
    if(!name&&iName>=0)name=String(c[iName]||'').trim();

// ── Google / Apple Calendar sync via iCalendar (ICS) ──
function _icsStamp(dateStr,timeStr){
  let base=/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr))?dateStr:(String(dateStr)+' '+new Date().getFullYear());
  let d=new Date(base+' '+(timeStr||'9:00 AM'));
  if(isNaN(d))d=new Date(String(dateStr)+' '+(timeStr||'9:00 AM'));
  if(isNaN(d))return null;
  const p=n=>String(n).padStart(2,'0');
  return {d,stamp:d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'T'+p(d.getHours())+p(d.getMinutes())+'00'};
}
function _rebuildCalendarFeed(){

    src.forEach((a,i)=>{const st=_icsStamp(a.date,a.time);if(!st)return;const e=new Date(st.d.getTime()+3600000);const es=e.getFullYear()+p(e.getMonth()+1)+p(e.getDate())+'T'+p(e.getHours())+p(e.getMinutes())+'00';events.push({uid:'sc-'+(a.date||'')+'-'+i+'@slickchart',title:(a.tx?a.tx+' \u2014 ':'')+(a.client||'Appointment'),start:st.stamp,end:es,notes:''});});

// ── Reports (accountant-ready): income summary, sales tax, reconciliation, transaction detail ──
let _reportKey='this-month';
function _reportRange(key){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();const iso=d=>d.toISOString().slice(0,10);
  if(key==='this-month')return {from:iso(new Date(y,m,1)),to:iso(new Date(y,m+1,0)),label:'This month'};
  if(key==='last-month')return {from:iso(new Date(y,m-1,1)),to:iso(new Date(y,m,0)),label:'Last month'};
  if(key==='this-quarter'){const q=Math.floor(m/3);return {from:iso(new Date(y,q*3,1)),to:iso(new Date(y,q*3+3,0)),label:'This quarter'};}
  if(key==='this-year')return {from:iso(new Date(y,0,1)),to:iso(new Date(y,11,31)),label:'This year'};
  if(key==='last-year')return {from:iso(new Date(y-1,0,1)),to:iso(new Date(y-1,11,31)),label:'Last year'};
  return {from:'0000-01-01',to:'9999-12-31',label:'All time'};
}
function _reportData(from,to){
  const inRange=p=>{const d=(p.date||'').slice(0,10);return d>=from&&d<=to;};
  const paid=_payments.filter(p=>p.status==='paid'&&inRange(p));
  const outstanding=_payments.filter(p=>(p.status==='unpaid'||p.status==='partial')&&inRange(p));
  let services=0,retail=0,other=0,tax=0,total=0;const byMethod={};
  paid.forEach(p=>{
    const amt=parseFloat(p.amount)||0;const t=parseFloat(p.taxAmount)||0;tax+=t;total+=amt;const net=amt-t;
    byMethod[p.method||'Other']=(byMethod[p.method||'Other']||0)+amt;
    if(p.items&&p.items.length){
      const lineSum=p.items.reduce((a,it)=>a+((+it.price||0)*(it.qty||1)),0)||1;
      p.items.forEach(it=>{const lt=(+it.price||0)*(it.qty||1);const share=net*(lt/lineSum);if(it.kind==='product')retail+=share;else if(it.kind==='service')services+=share;else other+=share;});
    } else { const cat=p.category||''; if(cat==='Retail')retail+=net;else if(cat==='Service')services+=net;else other+=net; }
  });
  const ar=outstanding.reduce((a,p)=>a+(parseFloat(p.amount)||0),0);const revenue=services+retail+other;
  return {from,to,paid,outstanding,services,retail,other,tax,total,revenue,ar,count:paid.length,byMethod,avg:paid.length?total/paid.length:0};
}

async function _biSend(){
  const el=document.getElementById('bi-client');const cid=_biClient||(el&&el.value)||'';const c=CL[cid];
  if(!c)return _coErr('Pick a client first.');
  const items=_coValidItems();

  _coBusy('Creating and sending invoice\u2026');
  try{
    const body={name:c.name,email:c.email,requestTip:_coTip,lineItems:items.map(it=>({name:it.name,price:it.price,quantity:it.qty||1,variationId:it.variationId||undefined,taxable:it.taxable!==false}))};
    const d=await _sqFetch('/api/square/invoice',{method:'POST',body});
    const _rec=_addPayment({clientId:cid,clientName:c.name,amount:(d.total!=null?d.total:_coTotal())||0,taxAmount:(d.tax||_coTaxAmt()||0),method:'Square',status:'unpaid',date:_todayISO(),note:'Invoice \u00b7 '+items.length+' items',source:'square',squareInvoiceId:d.invoiceId,publicUrl:d.url,items:items.map(it=>({name:it.name,price:it.price,qty:it.qty||1,variationId:it.variationId||null,kind:it.kind||'service'}))});

  }catch(e){_coErr(e.message||'Could not send the invoice.',_coRecon(e));}
}

async function _paySyncSquare(){
  if(typeof proToast==='function')proToast('Syncing from Square\u2026');

    const d=await _sqFetch('/api/square/invoices');
    (d.invoices||[]).forEach(sv=>{
      const e=_payments.find(p=>p.squareInvoiceId===sv.id);
      const st=(sv.status==='paid')?'paid':(sv.status==='partial'?'partial':(sv.status==='canceled'||sv.status==='refunded')?sv.status:'unpaid');
      if(e){e.status=st;if(sv.total!=null)e.amount=sv.total;if(sv.publicUrl)e.publicUrl=sv.publicUrl;}

    });

    if(typeof _navCur!=='undefined'&&_navCur&&_navCur.screen==='payments')renderPayments();
    if(typeof proToast==='function')proToast('Synced from Square \u2713');

}

function loadSquareCatalog(){try{const r=localStorage.getItem('sc_square_catalog');if(r){const d=JSON.parse(r)||{};squareCatalog={retail:d.retail||[],services:d.services||[],syncedAt:d.syncedAt||0};}}catch(e){}}
function saveSquareCatalog(){try{localStorage.setItem('sc_square_catalog',JSON.stringify(squareCatalog));}catch(e){}}
// The provider's Square Online shop URL (default "Buy" destination for their products)
function _shopUrl(){return String((typeof bizInfo!=='undefined'&&bizInfo.shopUrl)||'').trim().replace(/^https?:\/\//i,'').replace(/\/+$/,'');}
function _saveShopUrl(v){
  if(typeof bizInfo==='undefined')return;
  bizInfo.shopUrl=String(v||'').trim().replace(/^https?:\/\//i,'').replace(/\/+$/,'');
  try{localStorage.setItem('sc_bizinfo',JSON.stringify(bizInfo));}catch(e){}
  const shop=bizInfo.shopUrl;
  affiliateLinks.forEach(a=>{if(a.source==='square'&&shop&&!a.site)a.site=shop;});
  if(typeof persistWorkspace==='function')persistWorkspace();
  if(typeof proToast==='function')proToast(shop?'Shop URL saved — set as default Buy':'Shop URL cleared');
}
// Merge synced Square retail products into the shared product library so they show up
// everywhere products are picked (client recs, routines, aftercare, client summary).
// Non-destructive: refreshes Square catalog data but preserves any purchase links you add.
function _mergeSquareRetail(){
  try{
    const shop=_shopUrl();
    (squareCatalog.retail||[]).forEach(p=>{
      const id='sq_'+String(p.id).toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,14);
      const priceLabel=(p.price!=null)?('$'+(Math.round(p.price*100)/100)):'';
      const brand=[p.category||'',priceLabel].filter(Boolean).join(' · ')||'Your product';
      const existing=affiliateLinks.find(a=>a.id===id);
      if(existing){
        existing.name=p.name;existing.price=p.price;existing.brand=brand;existing.source='square';existing.squareId=p.id;
        if(p.image)existing.image=p.image;
        if(shop&&!existing.site)existing.site=shop;   // default Buy = your Square shop
      }else{
        affiliateLinks.push({id,name:p.name,brand,icon:'🛍️',image:p.image||'',site:shop||'',url:'',amazon:'',active:true,inOffice:true,source:'square',price:p.price,squareId:p.id});
      }
    });
  }catch(e){}
}
function _sqKey(force){
  let k=sessionStorage.getItem('sc_sqkey')||'';
  if(force||!k){
    k=window.prompt('Enter your SlickChart access key\n(the APP_SHARED_SECRET you set in Vercel):',k||'');
    if(k){sessionStorage.setItem('sc_sqkey',k);}
  }
  return k||'';
}
async function _sqFetch(path,opts){
  opts=opts||{};
  const headers={};
  const tok=(typeof Cloud!=='undefined'&&Cloud&&Cloud.token)||'';
  if(tok)headers['Authorization']='Bearer '+tok;                 // identifies the provider → uses THEIR Square
  let key='';try{key=sessionStorage.getItem('sc_sqkey')||'';}catch(e){}
  if(key)headers['x-slickchart-key']=key;                        // optional legacy shared-key fallback
  const init={method:opts.method||'GET',headers};
  if(opts.body!==undefined){headers['Content-Type']='application/json';init.body=JSON.stringify(opts.body);}
  let resp;
  try{
    resp=await fetch(path,init);
  }catch(netErr){
    const e=new Error("Couldn't reach the Square sync service. This works once the app is deployed to Vercel (it won't work from a file opened directly on your computer).");
    e.code='network';throw e;
  }
  let data={};try{data=await resp.json();}catch(_){}
  if(resp.status===401){const e=new Error(data.error||'Square isn\u2019t connected yet.');e.code=(data&&data.code==='nosquare')?'nosquare':'auth';throw e;}
  if(!resp.ok){const e=new Error(data.error||('Request failed ('+resp.status+')'));throw e;}
  return data;
}
async function _sqConnect(){
  const tok=(typeof Cloud!=='undefined'&&Cloud&&Cloud.token)||'';
  if(!tok){proToast('Please log in first');return;}
  try{
    const r=await fetch('/api/square/connect',{headers:{'Authorization':'Bearer '+tok}});
    const j=await r.json();
    if(!r.ok||!j.url){proToast((j&&j.error)||'Could not start Square connection');return;}
    location.href=j.url;
  }catch(e){proToast('Could not reach Square');}
}
async function _sqDisconnect(){
  const tok=(typeof Cloud!=='undefined'&&Cloud&&Cloud.token)||'';
  try{await fetch('/api/square/connection',{method:'DELETE',headers:tok?{'Authorization':'Bearer '+tok}:{}});}catch(e){}
  proToast('Square disconnected');
  if(typeof nav==='function')nav('square-guide');
}
async function _sqConnState(){
  const tok=(typeof Cloud!=='undefined'&&Cloud&&Cloud.token)||'';
  try{const r=await fetch('/api/square/connection',{headers:tok?{'Authorization':'Bearer '+tok}:{}});return await r.json();}catch(e){return null;}
}

}

function _sqMakeClient(c){
  const parts=(c.name||'').trim().split(/\s+/);
  const initials=((parts[0]||'?')[0]+((parts[1]||'')[0]||'')).toUpperCase();
  return {name:c.name||'(no name)',initials,bg:'#2e1c10',tc:'var(--accent)',
    skin:'—',concerns:'—',allergies:'None on file',fitz:'—',
    lastVisit:'—',nextVisit:'Not scheduled',treatment:'New client',sessions:0,seriesTotal:0,
    email:c.email||'',phone:c.phone||'',birthday:_normBirthday(c.birthday),squareId:c.id,source:'square'};
}
function _sqImportOne(i){
  const c=(window._sqCust||[])[i];if(!c)return;
  const id='sq_'+String(c.id||i).slice(0,10).toLowerCase().replace(/[^a-z0-9]/g,'');
  const btn=document.getElementById('sqimp-'+i);
  if(CL[id]){if(btn){btn.textContent='Imported';btn.style.color='#4ec49a';btn.style.borderColor='#1c4030';}return;}
  CL[id]=_sqMakeClient(c);
  if(typeof saveClients==='function')saveClients();
  if(btn){btn.textContent='Imported ✓';btn.style.color='#4ec49a';btn.style.borderColor='#1c4030';btn.disabled=true;}

function _sqImportAll(){
  const list=window._sqCust||[];let n=0;
  list.forEach((c,i)=>{const id='sq_'+String(c.id||i).slice(0,10).toLowerCase().replace(/[^a-z0-9]/g,'');if(!CL[id]){CL[id]=_sqMakeClient(c);n++;}const btn=document.getElementById('sqimp-'+i);if(btn){btn.textContent='Imported ✓';btn.style.color='#4ec49a';btn.style.borderColor='#1c4030';btn.disabled=true;}});

  proToast(n?`Imported ${n} client${n===1?'':'s'}`:'All already imported');
}

// ── Image helpers (downscale uploads to a shareable data URL, or accept a link) ──
function _pickImages(cb){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=()=>{
    const files=Array.from(inp.files||[]);if(!files.length)return;
    const out=[];let done=0;
    files.forEach((f,idx)=>_downscaleImg(f,src=>{out[idx]=src;if(++done===files.length)cb(out.filter(Boolean));}));
  };
  inp.click();
}
function _downscaleImg(file,cb,max=900){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      try{c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.72));}
      catch(_){cb(e.target.result);}
    };
    img.onerror=()=>cb(e.target.result);
    img.src=e.target.result;
  };
  r.onerror=()=>{};
  r.readAsDataURL(file);
}

function confirmBooking(id){
  const all=SlickBridge.getBookings();const b=all.find(x=>x.id===id);if(!b)return;
  b.status='confirmed';b.decidedAt=Date.now();SlickBridge.setBookings(all);
  addConfirmedAppt(b);
  SlickBridge.post('booking-confirmed',b);
  pushBookingNotif({icon:'ti-calendar-check',title:'Appointment confirmed',body:`${b.client} · ${b.treatment} · ${fmtBookingDate(b)} at ${b.time}`});
  suggestOpenFor=null;
  renderRequests();
}
function declineBooking(id){
  const all=SlickBridge.getBookings();const b=all.find(x=>x.id===id);if(!b)return;
  b.status='declined';b.decidedAt=Date.now();SlickBridge.setBookings(all);
  SlickBridge.post('booking-declined',{...b,reason:'That time just filled up — please pick another slot and I\'ll get you in.'});
  pushBookingNotif({icon:'ti-calendar-x',col:'#2a0f0f',ic:'#e87070',title:'Request declined',body:`You let ${b.client} know that slot wasn't available.`});
  suggestOpenFor=null;

// Create a REAL appointment in Square. Loads the seller's live services + team

    _sqBookOpts=opts;const body=document.getElementById('sqbook-body');if(!body)return;
    if(!opts.services||!opts.services.length){
      body.style.textAlign='left';body.style.padding='0';
      body.innerHTML=`<div style="color:#e0e0e0;font-size:13px;line-height:1.5;margin-bottom:14px;">No bookable services found in your Square Appointments. Add services in Square (and mark them bookable), or add this appointment locally for now.</div><button class="btng" style="width:100%;" onclick="openLocalQuickAdd()">Add appointment locally</button>`;return;
    }
    const tms=opts.teamMembers||[];
    const svcOpts=opts.services.map((s,i)=>`<option value="${i}">${s.name}${s.durationMinutes?(' · '+s.durationMinutes+' min'):''}${s.price!=null?(' · $'+s.price):''}</option>`).join('');
    const today=new Date().toISOString().slice(0,10);
    body.style.textAlign='left';body.style.padding='0';
    body.innerHTML=`
      <span class="fl-lbl">Client name</span><input class="fi" id="sqb-name" placeholder="Client name" value="${(prefill.client||'').replace(/"/g,'&quot;')}" style="margin-bottom:10px;">

      <span class="fl-lbl">Service</span><select class="fi" id="sqb-svc" style="margin-bottom:10px;">${svcOpts}</select>
      ${tms.length>1?`<span class="fl-lbl">With</span><select class="fi" id="sqb-tm" style="margin-bottom:10px;">${tms.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select>`:''}
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <div style="flex:1;"><span class="fl-lbl">Date</span><input type="date" class="fi" id="sqb-date" value="${prefill.date||today}" style="color-scheme:dark;"></div>
        <div style="flex:1;"><span class="fl-lbl">Time</span><input type="time" class="fi" id="sqb-time" value="${prefill.time||'10:00'}" style="color-scheme:dark;"></div>
      </div>
      <div id="sqb-err" style="display:none;color:#e87070;font-size:12px;margin-bottom:10px;line-height:1.5;"></div>
      <button class="btnp" id="sqb-go" style="border-radius:10px;" onclick="_sqDoBook()"><i class="ti ti-calendar-plus"></i> Book in Square</button>
      <button onclick="openLocalQuickAdd()" style="width:100%;margin-top:9px;background:none;border:none;font-size:13px;color:#888;cursor:pointer;font-family:inherit;">Add locally instead</button>`;
  }).catch(e=>{
    const body=document.getElementById('sqbook-body');if(body){body.style.textAlign='left';body.style.padding='0';body.innerHTML=`<div style="color:#e87070;font-size:13px;margin-bottom:14px;line-height:1.5;">${e.message||'Could not load Square services.'}</div><button class="btng" style="width:100%;" onclick="openLocalQuickAdd()">Add appointment locally</button>`;}
  });

function _sqDoBook(){
  const val=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const name=(val('sqb-name')||'').trim(),email=(val('sqb-email')||'').trim();
  const svc=_sqBookOpts&&_sqBookOpts.services[parseInt(val('sqb-svc')||'0',10)];
  const date=val('sqb-date'),time=val('sqb-time');
  const tmEl=document.getElementById('sqb-tm');const tms=(_sqBookOpts&&_sqBookOpts.teamMembers)||[];
  const teamMemberId=tmEl?tmEl.value:((svc&&svc.teamMemberIds&&svc.teamMemberIds[0])||(tms[0]&&tms[0].id)||'');
  const err=document.getElementById('sqb-err');const showErr=msg=>{if(err){err.style.display='block';err.textContent=msg;}};
  if(err)err.style.display='none';
  if(!name)return showErr('Enter a client name.');
  if(!svc)return showErr('Pick a service.');
  if(!teamMemberId)return showErr('No bookable team member found in Square — add one in Square Appointments first.');
  if(!date||!time)return showErr('Pick a date and time.');
  let startAt;try{const d=new Date(date+'T'+time+':00');if(isNaN(d))throw 0;startAt=d.toISOString();}catch(e){return showErr('That date or time looks invalid.');}
  const btn=document.getElementById('sqb-go');if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> Booking…';}
  _sqFetch('/api/square/book',{method:'POST',body:{serviceVariationId:svc.variationId,serviceVariationVersion:svc.variationVersion,durationMinutes:svc.durationMinutes,startAt:startAt,teamMemberId:teamMemberId,customerName:name,customerEmail:email}}).then(()=>{
    const m=document.getElementById('qa-modal');if(m)m.remove();
    if(typeof proToast==='function')proToast('Booked in Square ✓');
    _loadSquareAppts(true);
    if(_navCur&&_navCur.screen==='calendar')renderCalendar();
  }).catch(e=>{if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-calendar-plus"></i> Book in Square';}showErr(e.message||'Could not create the booking in Square.');});
}

  const palette=[['#1e1633','#a891ec'],['#0a2019','#4ec49a'],['#0d1e33','#5ba3e8'],['#2a0f1a','#e87070'],['#2e1c10','var(--accent)']];
  const col=palette[Object.keys(CL).length%palette.length];
  const fid=_ncIntakeFormId();
  CL[id]={name,initials,bg:col[0],tc:col[1],
    phone:newClientData['nc-phone']||'',email:newClientData['nc-email']||'',
    skin:'—',concerns:'—',
    allergies:'None noted',fitz:'—',
    lastVisit:'—',nextVisit:'Not scheduled',treatment:'New client',sessions:0,seriesTotal:0,touchUpDate:'—',
    conditions:'',notes:newClientData['nc-notes']||''};
  // fill vitals from the intake answers (same mapping the client-completed form uses)
  if(fid)_applyIntakeVitals(CL[id],fid,q=>newClientData['nc-iq-'+(q.id!=null?q.id:'')]);
  // if this profession's form doesn't ask about conditions, fall back to the Notes field
  if((!CL[id].conditions||!String(CL[id].conditions).trim())&&newClientData['nc-conditions'])CL[id].conditions=newClientData['nc-conditions'];
  try{if(typeof saveClients==='function')saveClients();}catch(e){}
  const cid=_ncConsentId();const mode=_ncDeliver;const first=name.split(' ')[0];
  newClientStep=0;newClientData={};_ncDeliver='app';
  if(mode==='device'){proToast(first+' added');renderSignOnDevice(cid,id);return;}
  if(mode==='link'){proToast(first+' added');nav('clients');shareFormLink(cid,id);return;}
  if(mode==='invite'){proToast(first+' added');nav('clients');inviteClientToApp(id);return;}
  proToast(first+' added'+(mode==='app'?' · consent sent':''));
  nav('clients');
}

  const specificTime=isDate?document.getElementById('auto-specific-time')?.value:'';
  const repeatEvery=isDate?document.getElementById('auto-repeat')?.value:'';

  const pg=(guideTemplatesByProf[prof]||[]).find(g=>g.cat==='Aftercare');
  if(pg)return {title,tips:pg.tips.slice()};
  return {title,tips:['Keep the area clean and avoid touching it','Avoid heat, sun, and heavy sweat for 24–48 hours','Skip harsh actives or exfoliants for a few days','Stay hydrated and apply SPF daily','Reach out if you notice anything unusual']};
}
async function aiDraftTips(btn,prefix){
  if(!aiEnabled){if(typeof proToast==='function')proToast('AI features are off — turn them on in Settings → AI features');return;}
  const titleEl=document.getElementById(prefix+'-title');
  const tipsEl=document.getElementById(prefix+'-tips');
  const title=(titleEl&&titleEl.value||'').trim();
  if(!title){if(typeof proToast==='function')proToast('Add a title first, then draft');return;}
  const old=btn.innerHTML;btn.disabled=true;btn.style.opacity='.6';btn.innerHTML='<i class="ti ti-loader-2"></i> Drafting…';
  const cat=(_newResType&&_newResType.cat)||'Aftercare';
  const prompt=`You are helping a ${_profName()} write a client-facing ${cat} guide titled "${title}". Respond with ONLY valid JSON, no preamble or markdown: {"title":"a clean refined title","tips":["5-7 short, specific, second-person care tips"]}. Each tip under 14 words. No numbering.`;
  const res=await _aiJSON(prompt,()=>_localTips(title));
  if(res){if(res.title&&titleEl&&!titleEl.value.trim())titleEl.value=res.title;if(tipsEl&&res.tips&&res.tips.length)tipsEl.value=res.tips.join('\n');if(typeof proToast==='function')proToast('Draft ready — edit as you like');}
  btn.disabled=false;btn.style.opacity='1';btn.innerHTML=old;
}
async function aiSuggestForm(tid,btn){
  if(!aiEnabled){if(typeof proToast==='function')proToast('AI features are off — turn them on in Settings → AI features');return;}
  const draft=_readFormBuilder(tid);
  if(!draft.name||draft.name==='Untitled form'){if(typeof proToast==='function')proToast('Name the form first');return;}
  const old=btn.innerHTML;btn.disabled=true;btn.style.opacity='.6';btn.innerHTML='<i class="ti ti-loader-2"></i> Thinking…';
  const prompt=`You are helping a ${_profName()} build a client consent form called "${draft.name}". Respond with ONLY valid JSON, no preamble or markdown: {"contraindications":["5-7 short client-facing conditions that mean the client should not proceed or must disclose first, each under 12 words"],"consent":"one short first-person consent sentence the client signs"}.`;
  const res=await _aiJSON(prompt,()=>_localContra(draft.name));
  if(res){
    let qs=draft.qs.filter(q=>q.type!=='Contraindications');
    const ci={id:'ci'+Date.now(),type:'Contraindications',label:'Contraindications — review before signing',required:true,items:res.contraindications||res.items||[]};
    let sigIdx=qs.findIndex(q=>q.type==='Signature');
    if(sigIdx<0){qs.push(ci);qs.push({id:'sig'+Date.now(),type:'Signature',label:res.consent||'I consent to treatment',required:true});}
    else{qs.splice(sigIdx,0,ci);if(res.consent)qs[sigIdx+1].label=res.consent;}
    const list=document.getElementById('qlist');if(list)list.innerHTML=qs.map(q=>_qRowHTML(q)).join('');
    if(typeof proToast==='function')proToast('Added contraindications + consent — review & save');
  }
  btn.disabled=false;btn.style.opacity='1';btn.innerHTML=old;
}
function saveResource(){
  const title=(document.getElementById('res-title')?.value||'').trim();
  if(!title){if(typeof proToast==='function')proToast('Give your guide a title');return;}
  const url=(document.getElementById('res-url')?.value||'').trim().replace(/^https?:\/\//i,'');
  const tips=(document.getElementById('res-tips')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const g={id:'g-custom-'+Date.now(),icon:_newResType.icon||'📄',title,cat:_newResType.cat||'Aftercare',url,shared:0,tips};
  customResources.push(g);
  persistCustomResources();
  rebuildResources();
  if(typeof proToast==='function')proToast('Guide added to your library');
  nav('learn');
}

function renderAddVendor(editIdx){
  setNav('pro');
  const editing=(editIdx!=null&&vendors[editIdx]);
  const v=editing?vendors[editIdx]:{};
  document.getElementById('tt').textContent=editing?'Edit vendor':'Add vendor';
  const cats=['Skincare','SPF','Clinical','Supplies','Equipment','Other'];
  const val=x=>String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const clean=x=>(x&&x!=='\u2014')?x:'';
  const arg=editing?editIdx:'null';
  S.innerHTML=`
  <div style="padding:12px 16px 0;display:flex;align-items:center;justify-content:flex-end;">
    <button onclick="saveVendor(${arg})" style="background:var(--accent);color:var(--accent-ink);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;">Save</button>
  </div>
  <div style="padding:14px 16px 0;">
    <span class="fl-lbl">Brand name</span><input class="fi" id="vn-name" aria-label="Brand name" placeholder="e.g. iS Clinical" value="${val(v.name)}" style="margin-bottom:12px;">
    <span class="fl-lbl">Category</span>
    <select class="fi" id="vn-cat" style="margin-bottom:12px;">${cats.map(c=>`<option${v.cat===c?' selected':''}>${c}</option>`).join('')}</select>
    <span class="fl-lbl">Sales rep name</span><input class="fi" id="vn-rep" aria-label="Sales rep name" placeholder="Rep's full name" value="${val(clean(v.rep))}" style="margin-bottom:12px;">
    <span class="fl-lbl">Rep phone</span><input class="fi" id="vn-phone" aria-label="Rep phone" placeholder="(415) 000-0000" value="${val(clean(v.phone))}" style="margin-bottom:12px;">
    <span class="fl-lbl">Rep email</span><input class="fi" id="vn-email" placeholder="rep@brand.com" value="${val(clean(v.email))}" style="margin-bottom:12px;">
    <span class="fl-lbl">Professional portal URL</span><input class="fi" id="vn-portal" aria-label="Professional portal URL" placeholder="pro.brand.com" value="${val(clean(v.portal))}" style="margin-bottom:12px;">
    <span class="fl-lbl">Notes</span>
    <textarea class="fi" id="vn-notes" style="height:72px;resize:none;margin-bottom:16px;" placeholder="Min order amounts, shipping notes, account details...">${val(v.notes)}</textarea>
    <button class="btnp" style="border-radius:8px;margin-bottom:20px;" onclick="saveVendor(${arg})"><i class="ti ti-check"></i> ${editing?'Save changes':'Add vendor'}</button>
  </div>`;
}
function saveVendor(editIdx){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const name=g('vn-name')||'New Vendor';
  const cat=g('vn-cat')||'Skincare';
  const rep=g('vn-rep')||'\u2014';
  const phone=g('vn-phone')||'\u2014';
  const email=g('vn-email')||'\u2014';
  const portal=g('vn-portal')||'\u2014';
  const notes=g('vn-notes')||'';
  const initials=name.split(' ').map(w=>w[0]).filter(Boolean).join('').slice(0,2).toUpperCase();
  if(editIdx!=null&&vendors[editIdx]){
    const v=vendors[editIdx];v.name=name;v.init=initials;v.cat=cat;v.rep=rep;v.phone=phone;v.email=email;v.portal=portal;v.notes=notes;
    proToast('Vendor updated \u2713');nav('vendor-detail',editIdx);
  }else{
    vendors.push({name,init:initials,bg:'#1a1a1a',tc:'#e0e0e0',cat,rep,phone,email,portal,notes});
    nav('vendors');
  }
}
function deleteVendor(i){const v=vendors[i];if(!v)return;confirmModal({title:'Delete vendor',body:'Remove '+(v.name||'this vendor')+' from your directory? This cannot be undone.',action:'Delete'},"()=>{vendors.splice("+i+",1);nav('vendors')}");}
