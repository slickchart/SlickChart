function _buildMyRecordsHTML(){
  const p=(typeof activeProvider==='function')?activeProvider():(client.providers&&client.providers[0])||{};
  const accent=(function(c){c=String((p.brand&&p.brand.primary)||'').trim();if(c&&c[0]!=='#')c='#'+c;return /^#[0-9a-fA-F]{6}$/.test(c)?c:'#8a6a3a';})();
  const studio=_myEsc(p.studio||'SlickChart');
  const prov=_myEsc(p.name||'');
  const now=new Date();
  const dateStr=now.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})+' \u00b7 '+now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  // ---- treatment summary ----
  const sumRows=[];
  const push=(l,v)=>{ if(v!=null&&String(v).trim()) sumRows.push([l,String(v)]); };
  push('Provider', p.name);
  push('Treatment', p.treatment||client.treatment);
  if(p.session!=null) push('Progress', 'Session '+p.session+(p.totalSessions?(' of '+p.totalSessions):''));
  if(p.nextDate) push('Next appointment', p.nextDate+(p.nextTime?(' \u00b7 '+p.nextTime):''));
  const sumHTML=sumRows.map(([l,v])=>`<tr><td class="l">${_myEsc(l)}</td><td class="v">${_myEsc(v)}</td></tr>`).join('');
  // ---- signed forms ----
  const forms=(p.forms||[]).filter(f=>(f.status||'').toLowerCase().indexOf('complet')>=0);
  let formsHTML='';
  if(forms.length){
    formsHTML=forms.map(f=>{
      const qa=[];
      (f.qs||[]).forEach(q=>{if(q.type==='Signature'||q.type==='Contraindications')return;const a=f.answers&&f.answers[q.id];if(a!=null&&String(a).trim())qa.push([q.label,String(a)]);});
      const qaHTML=qa.length?`<table class="qa">${qa.map(([l,v])=>`<tr><td class="l">${_myEsc(l)}</td><td class="v">${_myEsc(v)}</td></tr>`).join('')}</table>`:'';
      const flg=(f.flagged&&f.flagged.length)?`<div class="flag"><div class="flag-h">Noted for your provider</div><ul>${f.flagged.map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`:'';
      const consent=f.consent?`<div class="consent">\u201c${_myEsc(f.consent)}\u201d</div>`:'';
      return `<div class="form"><div class="form-h">${_myEsc(f.title)}</div><div class="muted">${_myEsc(f.date||'')} \u00b7 Signed \u2713</div>${consent}${flg}${qaHTML}</div>`;
    }).join('');
  } else {
    formsHTML='<div class="muted">No signed forms yet. Any forms your provider sends will appear here once you complete them.</div>';
  }
  // ---- aftercare (handy for the client to keep) ----
  let careHTML='';
  if(p.aftercare&&p.aftercare.length){
    careHTML=p.aftercare.map(blk=>`<div class="care"><div class="care-h">${_myEsc(blk.when)}</div><ul>${(blk.items||[]).map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`).join('');
  }
  const avoidHTML=(p.avoid&&p.avoid.length)?`<div class="care"><div class="care-h">Things to avoid</div><ul>${p.avoid.map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`:'';

  return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">`+
  `<title>${_myEsc(client.name)} \u2014 My Records</title>`+
  `<style>`+
    `*{box-sizing:border-box;}`+
    `body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;margin:0;padding:32px 28px;line-height:1.5;font-size:13px;}`+
    `.top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid ${accent};padding-bottom:14px;margin-bottom:6px;}`+
    `.biz{font-size:18px;font-weight:700;}.owner{font-size:12px;color:#666;margin-top:2px;}`+
    `.doc{font-size:11px;color:#888;text-align:right;}.doc b{display:block;font-size:13px;color:#1a1a1a;}`+
    `h1{font-size:22px;margin:16px 0 12px;}`+
    `h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:${accent};border-bottom:1px solid #e5ddd0;padding-bottom:5px;margin:22px 0 10px;}`+
    `table{width:100%;border-collapse:collapse;}`+
    `td.l{width:38%;color:#666;padding:5px 10px 5px 0;vertical-align:top;font-weight:600;}`+
    `td.v{padding:5px 0;vertical-align:top;}tr+tr td{border-top:1px solid #f0ece4;}`+
    `.form{border:1px solid #e5ddd0;border-radius:8px;padding:12px 14px;margin:10px 0;page-break-inside:avoid;}`+
    `.form-h{font-weight:700;font-size:14px;margin-bottom:2px;}.muted{color:#999;font-style:italic;}`+
    `.consent{font-size:12px;color:#555;font-style:italic;margin:8px 0;}`+
    `.qa{margin-top:8px;}table.qa td.l{width:42%;}`+
    `.flag{background:#fff7ec;border:1px solid #f0d8b0;border-radius:8px;padding:10px 12px;margin:8px 0;}`+
    `.flag-h{font-weight:700;color:#a06a00;margin-bottom:4px;}.flag ul{margin:0;padding-left:18px;}.flag li{color:#7a5200;margin:2px 0;}`+
    `.care{border:1px solid #e5ddd0;border-radius:8px;padding:10px 14px;margin:8px 0;page-break-inside:avoid;}`+
    `.care-h{font-weight:700;margin-bottom:4px;}.care ul{margin:0;padding-left:18px;}.care li{margin:2px 0;color:#444;}`+
    `.foot{margin-top:28px;border-top:1px solid #e5ddd0;padding-top:10px;font-size:10px;color:#aaa;text-align:center;}`+
    `@media print{body{padding:0 6px;}h2{page-break-after:avoid;}}`+
  `</style></head><body>`+
    `<div class="top"><div><div class="biz">${studio}</div>${prov?`<div class="owner">${prov}</div>`:''}</div>`+
      `<div class="doc"><b>My Records</b>Generated ${_myEsc(dateStr)}</div></div>`+
    `<h1>${_myEsc(client.name)}</h1>`+
    `<h2>Treatment summary</h2><table>${sumHTML||'<tr><td class="v muted">No treatment info yet.</td></tr>'}</table>`+
    `<h2>My signed forms</h2>${formsHTML}`+
    ((careHTML||avoidHTML)?`<h2>Aftercare</h2>${avoidHTML}${careHTML}`:'')+
    `<div class="foot">Your personal copy \u00b7 ${studio} \u00b7 Generated by SlickChart on ${_myEsc(dateStr)}</div>`+
  `</body></html>`;
}
function _printMyRecords(){
  const html=_buildMyRecordsHTML(); if(!html)return;
  const f=document.createElement('iframe');
  f.setAttribute('aria-hidden','true');
  f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;';
  document.body.appendChild(f);
  try{
    const doc=f.contentWindow.document;
    doc.open();doc.write(html);doc.close();
    setTimeout(()=>{try{f.contentWindow.focus();f.contentWindow.print();}catch(e){}setTimeout(()=>{try{f.remove();}catch(e){}},2000);},350);
  }catch(e){try{f.remove();}catch(_){}if(typeof showToast==='function')showToast('Could not open print \u2014 try Download instead',false);}
}
function _downloadMyRecords(){
  const html=_buildMyRecordsHTML(); if(!html)return;
  try{
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=(client.name||'my').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'')+'-records.html';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{try{URL.revokeObjectURL(url);a.remove();}catch(e){}},1500);
    if(typeof showToast==='function')showToast('Downloaded \u2713');
  }catch(e){ if(typeof showToast==='function')showToast('Could not download \u2014 try Print instead',false); }
}
function exportMyRecords(){
  const ov=document.createElement('div'); ov.id='myrec-sheet';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:440px;padding:16px 16px 26px;box-shadow:0 -4px 24px rgba(0,0,0,.15);">`+
    `<div style="width:36px;height:4px;background:#e0d5c8;border-radius:2px;margin:0 auto 14px;"></div>`+
    `<div style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:3px;">Download my records</div>`+
    `<div style="font-size:12px;color:#8a7d70;margin-bottom:16px;line-height:1.5;">A clean copy of your signed forms and treatment info \u2014 ready to print or save.</div>`+
    `<button onclick="this.closest('#myrec-sheet').remove();_printMyRecords()" style="width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px;"><i class="ti ti-printer" style="font-size:17px;"></i> Print / Save as PDF</button>`+
    `<button onclick="this.closest('#myrec-sheet').remove();_downloadMyRecords()" style="width:100%;background:#f5f0ea;color:#1a1a1a;border:1px solid #e8ddd3;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;"><i class="ti ti-download" style="font-size:17px;"></i> Download as file</button>`+
  `</div>`;
  document.body.appendChild(ov);
}

  const isLong=key==='concerns'||key==='allergies';
  m.innerHTML=`

    <div style="width:36px;height:4px;background:#e8ddd3;border-radius:2px;margin:0 auto 16px;"></div>
    <div style="font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:14px;">Edit ${label}</div>
    ${isLong
      ? `<textarea id="edit-input" class="fi" aria-label="${label}" style="height:80px;resize:none;line-height:1.6;margin-bottom:14px;">${currentVal}</textarea>`
      : `<input id="edit-input" class="fi" aria-label="${label}" value="${currentVal}" style="margin-bottom:14px;">`}
    <div style="display:flex;gap:8px;">
      <button onclick="document.getElementById('edit-field-modal').remove()" style="flex:1;background:#faf7f4;border:1.5px solid #e8ddd3;border-radius:10px;padding:12px;font-size:14px;color:#6b5d52;cursor:pointer;font-weight:600;">Cancel</button>

    </div>

  document.querySelector('.shell').appendChild(m);
  setTimeout(()=>document.getElementById('edit-input')?.focus(),100);
}

function saveField(key){
  const val=document.getElementById('edit-input')?.value?.trim();
  if(!val){document.getElementById('edit-field-modal')?.remove();return;}
  // Contact fields (email/phone) are the provider's on-file record for this client, so a
  // change has to actually reach the provider, the old code toasted "Profile updated" but
  // saved nothing for these two. Validate, save locally so it sticks on reload, then sync
  // to the provider and only confirm on success.
  if(key==='email'||key==='phone'){
    if(key==='email'&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){showToast('That email doesn’t look right, please check it',false);return;}
    if(key==='phone'&&(val.replace(/\D/g,'').length<7)){showToast('That phone number doesn’t look right, please check it',false);return;}
    client[key]=val;
    const el0=document.getElementById('val-'+key);if(el0){el0.textContent=val;el0.style.color='#1a1a1a';}

function _getClientToken(){
  try{
    const m=location.pathname.match(/\/client\/([^\/?]+)/);
    if(m&&m[1])return decodeURIComponent(m[1]);
    const q=new URLSearchParams(location.search).get('c');
    if(q)return q;
    // Home-screen / PWA launches open the manifest start_url ("/client") with NO token in the URL,
    // so this used to fall through to the sample/demo client. Recover the token we saved the first
    // time they opened their real link, so an installed shortcut always loads THEIR space.
    try{const st=localStorage.getItem('sc_client_token');if(st)return st;}catch(e){}
    return '';
  }catch(e){ return ''; }
}
var _clientSubmitInFlight={};
function _clientSubmit(kind,payload,_retried){
  try{
    var tok=client._token; if(!tok)return Promise.resolve(null);
    payload=payload||{};
    // Idempotency key: minted once and carried through the retry (same payload object) so a
    // submission that committed server-side but lost its response isn't written a second time.
    if(!payload._idem){try{payload._idem=(self.crypto&&crypto.randomUUID)?crypto.randomUUID():(Date.now().toString(36)+Math.random().toString(36).slice(2));}catch(e){payload._idem=Date.now().toString(36)+Math.random().toString(36).slice(2);}}
    // Block a double-tap on the same action while one is already in flight, otherwise a
    // slow/retrying request lets an impatient client submit a duplicate check-in, form,
    // or booking. The retry re-enters with _retried=true and must bypass this guard.
    if(!_retried){
      if(_clientSubmitInFlight[kind])return Promise.resolve({ok:false,error:'inflight',duplicate:true});
      _clientSubmitInFlight[kind]=true;
    }
    var _clear=function(v){if(!_retried)_clientSubmitInFlight[kind]=false;return v;};
    return fetch('/api/client-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({t:tok,kind:kind,payload:payload||{}})})
      .then(function(r){
        // A non-OK HTTP status means it did NOT reach the provider, treat as failure so
        // callers on critical paths (check-in, booking, forms) don't show a false "sent".
        if(!r.ok){
          if(!_retried)return new Promise(function(res){setTimeout(res,1200);}).then(function(){return _clientSubmit(kind,payload,true);}).then(_clear);
          return {ok:false,error:'server'};
        }
        return r.json().then(function(j){return (j&&typeof j.ok!=='undefined')?j:{ok:true};}).catch(function(){return {ok:true};}).then(_clear);
      })
      .catch(function(){
        // Network error, retry once before giving up, since these are the client's
        // most important actions and a single blip shouldn't silently drop them.
        if(!_retried)return new Promise(function(res){setTimeout(res,1200);}).then(function(){return _clientSubmit(kind,payload,true);}).then(_clear);
        return {ok:false,error:'network'};
      });
  }catch(e){ if(!_retried)_clientSubmitInFlight[kind]=false; return Promise.resolve({ok:false,error:'network'}); }
}

  // When there's no real appointment, leave apptISO empty so the UI shows "Not scheduled"

  var iso='';

// ── Lightweight polling: keep a real client's appointment, summaries, forms, and
// messages fresh while the app stays open, without disrupting what they're doing. ──
let _realPollTimer=null, _lastDataFingerprint='';
// A compact signature of the fields worth re-rendering for. If it's unchanged we skip
// the re-render entirely, so there's no flicker on an idle screen.
// A cheap stamp of the brand logo that changes whenever the logo does (length + head/tail of the
// data URL), without stuffing the whole base64 image into the fingerprint.
function _brandStamp(brand){
  const l=(brand&&brand.logoDataUrl)||'';
  if(!l)return '';
  return l.length+':'+l.slice(0,16)+l.slice(-24);
}
function _clientDataFingerprint(j){
  try{
    const d=(j&&j.client&&j.client.data)||{};const prof=d.profile||{};
    return JSON.stringify([
      prof.nextVisit||'',prof.treatment||'',
      (Array.isArray(d.summaries)?d.summaries.length:0),
      (Array.isArray(d.summaries)&&d.summaries[0]&&d.summaries[0].note)||'',
      (Array.isArray(d.pendingForms)?d.pendingForms.map(f=>f.formId).join(','):''),
      (Array.isArray(d.pendingGuides)?d.pendingGuides.length:0),
      // Detect an actual logo/brand CHANGE, not just presence, otherwise swapping one logo for
      // another (both non-empty) left this token identical and the poll never applied the new logo.
      _brandStamp(d.brand),(d.brand&&d.brand.primary)||'',(d.brand&&d.brand.secondary)||'',
      (Array.isArray(d.products)?d.products.length:0),(Array.isArray(d.catalog)?d.catalog.length:0)
    ]);
  }catch(e){return '';}
}
// Screens where a surprise re-render would interrupt the client mid-task. We skip
// re-rendering while they're here (data still updates quietly in the background).
function _isBusyScreen(){
  const n=(typeof currentScreen!=='undefined'?currentScreen:'');
  return n==='fill-form'||n==='checkin'||n==='rebook'||n==='virtual-submit'||n==='messages';
}
function _pollRealClient(){
  if(!client._real||!client._token)return;
  if(document.hidden)return; // don't poll a backgrounded tab
  fetch('/api/client-data?t='+encodeURIComponent(client._token),{cache:'no-store'})
    .then(function(r){return r.json().then(function(j){return {status:r.status,j:j};});})
    .then(function(res){
      const j=res.j;
      // Access was revoked or the token became invalid while the app was open. Distinguish
      // this from a transient blip: only act on an explicit server rejection (a 401/403, or
      // an ok:false carrying a revoked/invalid/expired error), never on a network failure.
      const revoked=(res.status===401||res.status===403)||
        (j&&j.ok===false&&/revok|invalid|expire|not.?found|removed/i.test(String(j.error||'')));
      if(revoked){
        _stopRealClientPolling();
        client._real=false;
        _clientLinkError(j&&j.error);
        return;
      }
      if(!(j&&j.ok&&j.client))return; // transient/empty, keep the current view, try again next tick
      // Brand/logo can change independently of everything else. Apply a new logo (or color) the
      // moment it arrives, directly, so a provider swapping their logo shows up on the client
      // without depending on any other field of the data blob changing too.
      try{
        const nb=(j.client.data&&j.client.data.brand)||null;
        const cur=(typeof activeProvider==='function'&&activeProvider()&&activeProvider().brand)||{};
        if(nb&&((nb.logoDataUrl||'')!==(cur.logoDataUrl||'')||(nb.primary||'')!==(cur.primary||'')||(nb.secondary||'')!==(cur.secondary||''))){
          const p=activeProvider(); if(p){ p.brand=nb; applyClientTheme(p.brand); if(!_isBusyScreen()&&document.getElementById('page-heading')&&(typeof currentScreen==='undefined'||currentScreen==='home'))renderHome(); }
        }
      }catch(e){}
      const fp=_clientDataFingerprint(j);
      if(fp!==_lastDataFingerprint){
        _lastDataFingerprint=fp;
        _applyRealClientData(j);
        try{applyActiveProvider();}catch(e){}
        // only refresh the view if they're not mid-task and are on a passive screen
        if(!_isBusyScreen()&&document.getElementById('page-heading')){
          const n=(typeof currentScreen!=='undefined'?currentScreen:'home');
          try{if(n==='home')renderHome();else if(typeof nav==='function')nav(n||'home');}catch(e){}
        }
      }
      // messages are polled by their own dedicated 20s timer (see setInterval below), not fetched
      // here too, to avoid a duplicate /api/client-messages request on every 30s data poll.
    })
    .catch(function(){});
}
function _stopRealClientPolling(){if(_realPollTimer){clearInterval(_realPollTimer);_realPollTimer=null;}}
function _startRealClientPolling(){
  if(_realPollTimer)return;
  _realPollTimer=setInterval(_pollRealClient,30000); // every 30s
  // catch up promptly when the client returns to the tab
  try{document.addEventListener('visibilitychange',function(){if(!document.hidden)_pollRealClient();});}catch(e){}
}
// ── Real message history (both directions), synced from the server ──
let _msgSeenIds=[];
function _loadMsgSeenIds(){try{_msgSeenIds=JSON.parse(localStorage.getItem('sc_seen_msg_ids')||'[]');}catch(e){_msgSeenIds=[];}}
function _markMsgSeen(id){if(_msgSeenIds.indexOf(id)<0){_msgSeenIds.push(id);if(_msgSeenIds.length>500)_msgSeenIds.splice(0,_msgSeenIds.length-500);try{localStorage.setItem('sc_seen_msg_ids',JSON.stringify(_msgSeenIds));}catch(e){}}}
// Mark many message ids seen with a single localStorage write instead of one per
// message, matters on first load of a long thread, or a burst after being offline.
function _markMsgsSeen(ids){
  if(!ids||!ids.length)return;
  const have=new Set(_msgSeenIds);let changed=false;
  ids.forEach(function(id){if(!have.has(id)){_msgSeenIds.push(id);have.add(id);changed=true;}});
  if(!changed)return;
  if(_msgSeenIds.length>500)_msgSeenIds.splice(0,_msgSeenIds.length-500);
  try{localStorage.setItem('sc_seen_msg_ids',JSON.stringify(_msgSeenIds));}catch(e){}
}
function _fmtMsgTime(ts){
  try{
    const d=new Date(ts);const now=new Date();
    if(d.toDateString()===now.toDateString())return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }catch(e){return 'Just now';}
}
async function _fetchRealMessages(initial){
  if(!client._real||!client._token)return;
  try{
    const r=await fetch('/api/client-messages?t='+encodeURIComponent(client._token));
    const j=await r.json();
    if(!(j&&j.ok&&Array.isArray(j.messages)))return;
    const jess=client.providers.find(function(p){return p.id==='jess';})||client.providers[0];
    if(initial){
      jess.thread=j.messages.map(function(m){return {from:m.from==='provider'?'provider':'me',text:m.text,imgs:Array.isArray(m.photos)?m.photos:[],time:_fmtMsgTime(m.ts)};});
      _markMsgsSeen(j.messages.map(function(m){return m.id;}));
      if(client.activeProviderId===jess.id)messages=jess.thread;
      try{_saveClientMessages();}catch(e){}
      if(document.getElementById('chat-body'))renderMessages();
    }else{
      const newOnes=j.messages.filter(function(m){return m.from==='provider'&&_msgSeenIds.indexOf(m.id)<0;});
      if(!newOnes.length)return;
      const viewing=client.activeProviderId===jess.id&&document.getElementById('chat-body');
      newOnes.forEach(function(m){jess.thread.push({from:'provider',text:m.text,imgs:Array.isArray(m.photos)?m.photos:[],time:_fmtMsgTime(m.ts)});});
      _markMsgsSeen(newOnes.map(function(m){return m.id;}));

        jess.unread=(jess.unread||0)+newOnes.length;
        // The client isn't looking at the thread, so actually surface the new message(s)
        // this is what the "New message" toggle promises. pushNotify records it in the
        // notification center and, respecting that toggle + quiet hours, fires a banner
        // (or a real system notification when the tab's backgrounded and permission's granted).
        try{

          const who=client.providerFirst||'your provider';
          if(typeof pushNotify==='function')pushNotify({type:'messagereply',icon:'ti-message-circle',col:'#f0f5ff',ic:'#5ba3e8',
            title:newOnes.length>1?(newOnes.length+' new messages from '+who):('New message from '+who),
            body:preview,onclick:function(){client.activeProviderId=jess.id;if(typeof applyActiveProvider==='function')applyActiveProvider();nav('messages');}});
        }catch(e){}
      }
      else messages=jess.thread;
      try{_saveClientMessages();}catch(e){}
      if(viewing)renderMessages();
      else if(currentScreen==='home'&&typeof renderHome==='function')renderHome();
    }
  }catch(e){}
}

// ── Keep a focused input above the on-screen keyboard (see provider app for rationale) ──
(function(){
  function _isTextField(el){
    if(!el||!el.tagName)return false;
    var tag=el.tagName.toLowerCase();
    if(tag==='textarea')return true;
    if(tag!=='input')return false;
    var ty=(el.getAttribute('type')||'text').toLowerCase();
    return ['text','search','email','tel','url','number','password',''].indexOf(ty)>=0;
  }
  function _revealFocused(el){
    if(!el||!el.getBoundingClientRect)return;
    var vv=window.visualViewport;
    var visibleBottom=vv?(vv.offsetTop+vv.height):window.innerHeight;
    var r=el.getBoundingClientRect();
    if(r.bottom>visibleBottom-24||r.top<0){
      try{el.scrollIntoView({block:'center',behavior:'smooth'});}
      catch(e){try{el.scrollIntoView(false);}catch(_){}}
    }
  }
  document.addEventListener('focusin',function(e){
    var el=e.target;
    if(!_isTextField(el))return;
    setTimeout(function(){_revealFocused(el);},120);
    setTimeout(function(){if(document.activeElement===el)_revealFocused(el);},380);
  });
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',function(){
      var el=document.activeElement;
      if(_isTextField(el))_revealFocused(el);
    });
  }
})();
