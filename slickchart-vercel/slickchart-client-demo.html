// ── PROFILE ──
function _myEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Build a clean, printable document of the client's own signed forms + treatment info.
function _buildMyRecordsHTML(){
  const p=(typeof activeProvider==='function')?activeProvider():(client.providers&&client.providers[0])||{};
  const accent=(function(c){c=String((p.brand&&p.brand.primary)||'').trim();if(c&&c[0]!=='#')c='#'+c;return /^#[0-9a-fA-F]{6}$/.test(c)?c:'#8a6a3a';})();
  const studio=_myEsc(p.studio||'SlickChart');
  const prov=_myEsc(p.name||'');
  const now=new Date();
  const dateStr=now.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})+' \u00b7 '+now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  // ---- treatment summary ----
  const sumRows=[];
  const push=(l,v)=>{ if(v!=null&&String(v).trim()) sumRows.push([l,String(v)]); };
  push('Provider', p.name);
  push('Treatment', p.treatment||client.treatment);
  if(p.session!=null) push('Progress', 'Session '+p.session+(p.totalSessions?(' of '+p.totalSessions):''));
  if(p.nextDate) push('Next appointment', p.nextDate+(p.nextTime?(' \u00b7 '+p.nextTime):''));
  const sumHTML=sumRows.map(([l,v])=>`<tr><td class="l">${_myEsc(l)}</td><td class="v">${_myEsc(v)}</td></tr>`).join('');
  // ---- signed forms ----
  // Real clients' forms arrive in client._forms ({title,status:'signed'|'submitted',date}); p.forms is
  // demo-only. The old code read p.forms and filtered on 'complet', so a real client's records were
  // always empty. Prefer the real list and accept signed/submitted/completed.
  const _srcForms=(Array.isArray(client._forms)&&client._forms.length)?client._forms:(p.forms||[]);
  const forms=_srcForms.filter(f=>{const s=(f.status||'').toLowerCase();return !s||/complet|sign|submit/.test(s);});
  let formsHTML='';
  if(forms.length){
    formsHTML=forms.map(f=>{
      const qa=[];
      (f.qs||[]).forEach(q=>{if(q.type==='Signature'||q.type==='Contraindications')return;const a=f.answers&&f.answers[q.id];if(a!=null&&String(a).trim())qa.push([q.label,String(a)]);});
      const qaHTML=qa.length?`<table class="qa">${qa.map(([l,v])=>`<tr><td class="l">${_myEsc(l)}</td><td class="v">${_myEsc(v)}</td></tr>`).join('')}</table>`:'';
      const flg=(f.flagged&&f.flagged.length)?`<div class="flag"><div class="flag-h">Noted for your provider</div><ul>${f.flagged.map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`:'';
      const consent=f.consent?`<div class="consent">\u201c${_myEsc(f.consent)}\u201d</div>`:'';
      return `<div class="form"><div class="form-h">${_myEsc(f.title)}</div><div class="muted">${_myEsc(f.date||'')} \u00b7 Signed \u2713</div>${consent}${flg}${qaHTML}</div>`;
    }).join('');
  } else {
    formsHTML='<div class="muted">No signed forms yet. Any forms your provider sends will appear here once you complete them.</div>';
  }
  // ---- aftercare (handy for the client to keep) ----
  let careHTML='';
  if(p.aftercare&&p.aftercare.length){
    careHTML=p.aftercare.map(blk=>`<div class="care"><div class="care-h">${_myEsc(blk.when)}</div><ul>${(blk.items||[]).map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`).join('');
  } else if(Array.isArray(p.homecare)&&p.homecare.length){
    // Real clients: the provider's recommended routine lives in p.homecare (aftercare[] is demo-only).
    careHTML=`<div class="care"><div class="care-h">Your homecare routine</div><ul>${p.homecare.map(s=>`<li>${_myEsc((s&&(s.key||s.step||s.label))||String(s))}</li>`).join('')}</ul></div>`;
  }
  const avoidHTML=(p.avoid&&p.avoid.length)?`<div class="care"><div class="care-h">Things to avoid</div><ul>${p.avoid.map(it=>`<li>${_myEsc(it)}</li>`).join('')}</ul></div>`:'';

  return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">`+
  `<title>${_myEsc(client.name)} \u2014 My Records</title>`+
  `<style>`+
    `*{box-sizing:border-box;}`+
    `body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--c-ink);margin:0;padding:32px 28px;line-height:1.5;font-size:13px;}`+
    `.top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid ${accent};padding-bottom:14px;margin-bottom:6px;}`+
    `.biz{font-size:18px;font-weight:700;}.owner{font-size:12px;color:#666;margin-top:2px;}`+
    `.doc{font-size:11px;color:#888;text-align:right;}.doc b{display:block;font-size:13px;color:var(--c-ink);}`+
    `h1{font-size:22px;margin:16px 0 12px;}`+
    `h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:${accent};border-bottom:1px solid #e5ddd0;padding-bottom:5px;margin:22px 0 10px;}`+
    `table{width:100%;border-collapse:collapse;}`+
    `td.l{width:38%;color:#666;padding:5px 10px 5px 0;vertical-align:top;font-weight:600;}`+
    `td.v{padding:5px 0;vertical-align:top;}tr+tr td{border-top:1px solid #f0ece4;}`+
    `.form{border:1px solid #e5ddd0;border-radius:8px;padding:12px 14px;margin:10px 0;page-break-inside:avoid;}`+
    `.form-h{font-weight:700;font-size:14px;margin-bottom:2px;}.muted{color:#999;font-style:italic;}`+
    `.consent{font-size:12px;color:#555;font-style:italic;margin:8px 0;}`+
    `.qa{margin-top:8px;}table.qa td.l{width:42%;}`+
    `.flag{background:var(--c-surf3);border:1px solid #f0d8b0;border-radius:8px;padding:10px 12px;margin:8px 0;}`+
    `.flag-h{font-weight:700;color:#a06a00;margin-bottom:4px;}.flag ul{margin:0;padding-left:18px;}.flag li{color:#7a5200;margin:2px 0;}`+
    `.care{border:1px solid #e5ddd0;border-radius:8px;padding:10px 14px;margin:8px 0;page-break-inside:avoid;}`+
    `.care-h{font-weight:700;margin-bottom:4px;}.care ul{margin:0;padding-left:18px;}.care li{margin:2px 0;color:#444;}`+
    `.foot{margin-top:28px;border-top:1px solid #e5ddd0;padding-top:10px;font-size:10px;color:#aaa;text-align:center;}`+
    `@media print{body{padding:0 6px;}h2{page-break-after:avoid;}}`+
  `</style></head><body>`+
    `<div class="top"><div><div class="biz">${studio}</div>${prov?`<div class="owner">${prov}</div>`:''}</div>`+
      `<div class="doc"><b>My Records</b>Generated ${_myEsc(dateStr)}</div></div>`+
    `<h1>${_myEsc(client.name)}</h1>`+
    `<h2>Treatment summary</h2><table>${sumHTML||'<tr><td class="v muted">No treatment info yet.</td></tr>'}</table>`+
    `<h2>My signed forms</h2>${formsHTML}`+
    ((careHTML||avoidHTML)?`<h2>Aftercare</h2>${avoidHTML}${careHTML}`:'')+
    `<div class="foot">Your personal copy \u00b7 ${studio} \u00b7 Generated by SlickChart on ${_myEsc(dateStr)}</div>`+
  `</body></html>`;
}
function _printMyRecords(){
  const html=_buildMyRecordsHTML(); if(!html)return;
  const f=document.createElement('iframe');
  f.setAttribute('aria-hidden','true');
  f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;';
  document.body.appendChild(f);
  try{
    const doc=f.contentWindow.document;
    doc.open();doc.write(html);doc.close();
    setTimeout(()=>{try{f.contentWindow.focus();f.contentWindow.print();}catch(e){}setTimeout(()=>{try{f.remove();}catch(e){}},2000);},350);
  }catch(e){try{f.remove();}catch(_){}if(typeof showToast==='function')showToast('Could not open print \u2014 try Download instead',false);}
}
function _downloadMyRecords(){
  const html=_buildMyRecordsHTML(); if(!html)return;
  try{
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=(client.name||'my').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'')+'-records.html';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{try{URL.revokeObjectURL(url);a.remove();}catch(e){}},1500);
    if(typeof showToast==='function')showToast('Downloaded \u2713');
  }catch(e){ if(typeof showToast==='function')showToast('Could not download \u2014 try Print instead',false); }
}
function exportMyRecords(){
  const ov=document.createElement('div'); ov.id='myrec-sheet';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div style="background:var(--c-card);border-radius:18px 18px 0 0;width:100%;max-width:440px;padding:16px 16px 26px;box-shadow:0 -4px 24px rgba(0,0,0,.15);">`+
    `<div style="width:36px;height:4px;background:var(--c-surf3);border-radius:2px;margin:0 auto 14px;"></div>`+
    `<div style="font-size:16px;font-weight:700;color:var(--c-ink);margin-bottom:3px;">Download my records</div>`+

function saveField(key){
  const val=document.getElementById('edit-input')?.value?.trim();
  if(!val){document.getElementById('edit-field-modal')?.remove();return;}
  // Contact fields (email/phone) are the provider's on-file record for this client, so a
  // change has to actually reach the provider, the old code toasted "Profile updated" but
  // saved nothing for these two. Validate, save locally so it sticks on reload, then sync
  // to the provider and only confirm on success.
  if(key==='email'||key==='phone'){
    if(key==='email'&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){showToast('That email doesn’t look right, please check it',false);return;}
    if(key==='phone'&&(val.replace(/\D/g,'').length<7)){showToast('That phone number doesn’t look right, please check it',false);return;}
    client[key]=val;
    const el0=document.getElementById('val-'+key);if(el0){el0.textContent=val;el0.style.color='var(--c-ink)';}
    document.getElementById('edit-field-modal')?.remove();
    try{_saveClientContact();}catch(e){}
    if(client._real){
      _clientSubmit('contact',{email:client.email||'',phone:client.phone||'',_lock:'field'})
        .then(res=>{showToast(res&&res.ok?'Sent to '+(client.providerFirst||'your provider'):(res&&res.duplicate?'':'Saved here, couldn’t reach your provider, will retry'));})
        .catch(()=>showToast('Saved here, couldn’t reach your provider',false));
    }else{showToast('Profile updated');}
    return;
  }
  if(key==='skin')client.skin=val;
  else if(key==='concerns')client.concerns=val;
  else if(key==='fitz')client.fitz=val;
  const el=document.getElementById('val-'+key);
  if(el)el.textContent=val;
  document.getElementById('edit-field-modal')?.remove();
  showToast('Profile updated');
}
function _saveClientContact(){try{localStorage.setItem('sc_client_contact',JSON.stringify({email:client.email||'',phone:client.phone||''}));}catch(e){}try{if(typeof _syncClientPrefsToServer==='function')_syncClientPrefsToServer();}catch(e){}}
function _loadClientContact(prof){
  var pend;try{pend=JSON.parse(localStorage.getItem('sc_client_contact')||'null');}catch(e){pend=null;}
  if(!pend)return;
  // Drop a pending field once the provider's synced value has caught up to it, so a later
  // provider-side change isn't hidden forever by a stale local edit.
  if(pend.email&&prof&&prof.email===pend.email)pend.email='';
  if(pend.phone&&prof&&prof.phone===pend.phone)pend.phone='';
  if(pend.email)client.email=pend.email;
  if(pend.phone)client.phone=pend.phone;
  if(!pend.email&&!pend.phone){try{localStorage.removeItem('sc_client_contact');}catch(e){}}
  else{try{localStorage.setItem('sc_client_contact',JSON.stringify(pend));}catch(e){}}
}

function fmtNiceDate(iso){
  try{const d=new Date(iso+'T12:00:00');if(isNaN(d.getTime()))return iso||'';return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return iso||'';}
}

// Listen for the provider's responses to booking requests
SlickBridge.on('booking-confirmed',b=>{
  if(b.clientId&&b.clientId!=='maya')return;
  // Update the client's "next appointment" to the confirmed slot
  client.nextDate=fmtNiceDate(b.date);
  client.nextTime=b.time;
  client.treatment=b.treatment||client.treatment;
  // Refresh the Home countdown ring immediately — it used to update nextDate/nextTime but never rebuild
  // APPT, so the "next appointment" ring stayed stale (or "—") until a manual reload.
  try{
    var _t=(b.time||'').trim();
    var dd=new Date((b.date||'')+' '+_t);
    if(isNaN(dd))dd=new Date(fmtNiceDate(b.date)+' '+new Date().getFullYear()+' '+_t);
    if(!isNaN(dd)&&dd.getFullYear()>=2000){APPT=dd;try{var _ap=activeProvider();if(_ap)_ap.apptISO=dd.toISOString();}catch(e){}}
  }catch(e){}
  try{if(typeof recomputeCountdown==='function')recomputeCountdown();}catch(e){}
  try{if(typeof currentScreen!=='undefined'&&currentScreen==='home'&&typeof renderHome==='function')renderHome();}catch(e){}
  pushNotify({type:'appointmentReminder',icon:'ti-calendar-check',col:'#f0fff5',ic:'#4ec49a',
    title:'Appointment confirmed ✅',
    body:`${client.providerFirst} confirmed your ${b.treatment} on ${_ordinalize(fmtNiceDate(b.date))} at ${b.time}.`,
    onclick:()=>nav('home')});
  updateRebookStatusPill('<i class="ti ti-circle-check" style="font-size:15px;"></i> Confirmed! Added to your appointments.','#f0fff5','#c0e8d0','#2a6a4a');
});
SlickBridge.on('booking-suggested',b=>{

let _msgSeenIds=[];
function _loadMsgSeenIds(){try{_msgSeenIds=JSON.parse(localStorage.getItem('sc_seen_msg_ids')||'[]');}catch(e){_msgSeenIds=[];}}
function _markMsgSeen(id){if(_msgSeenIds.indexOf(id)<0){_msgSeenIds.push(id);if(_msgSeenIds.length>500)_msgSeenIds.splice(0,_msgSeenIds.length-500);try{localStorage.setItem('sc_seen_msg_ids',JSON.stringify(_msgSeenIds));}catch(e){}}}

// message, matters on first load of a long thread, or a burst after being offline.
function _markMsgsSeen(ids){
  if(!ids||!ids.length)return;

  ids.forEach(function(id){if(!have.has(id)){_msgSeenIds.push(id);have.add(id);changed=true;}});
  if(!changed)return;

}

}
async function _fetchRealMessages(initial){

      const _serverMine=new Set(jess.thread.filter(function(m){return m.from==='me';}).map(_msgSig));

      // closed — previously the initial fetch blanket-marked everything seen and never set unread, so
      // a message that came in overnight showed no badge and no notification.

          const who=client.providerFirst||'your provider';
          if(typeof pushNotify==='function')pushNotify({type:'messagereply',icon:'ti-message-circle',col:'#f0f5ff',ic:'#5ba3e8',
            title:_freshProv.length>1?(_freshProv.length+' new messages from '+who):('New message from '+who),
            body:preview,onclick:function(){client.activeProviderId=jess.id;if(typeof applyActiveProvider==='function')applyActiveProvider();nav('messages');}});
        }catch(e){}

    }else{

        // notification center and, respecting that toggle + quiet hours, fires a banner

        try{

          const who=client.providerFirst||'your provider';

            body:preview,onclick:function(){client.activeProviderId=jess.id;if(typeof applyActiveProvider==='function')applyActiveProvider();nav('messages');}});

  }catch(e){}
}

(function(){

    }
  }
  document.addEventListener('focusin',function(e){
    var el=e.target;
    if(!_isTextField(el))return;

  });
