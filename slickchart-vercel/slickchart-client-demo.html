<style>
*{box-sizing:border-box;margin:0;padding:0;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
:root{
  /* premium dimensionality: surfaces carry a subtle top-lit gradient instead of a flat fill */
  --c-card:linear-gradient(180deg,#ffffff 0%,#f5faf8 100%);
  --c-surf:linear-gradient(180deg,#f7fbf9 0%,#eef5f2 100%);
  /* neutral tokens so the whole app can flip light <-> dark from one attribute */
  --c-bg:#eef4f2; --c-bg2:#e4f1ec; --c-surf2:#eef5f2; --c-surf3:#faf8f5;
  --c-ink:#1a1a1a; --c-mut:#54645e; --c-mut2:#7c918a; --c-line:#dbe8e2;
  --logo-tile:#ffffff; --logo-tile-line:#e2ece8;   /* brand-sheet "on light" lotus tile */
  /* semantic banner backgrounds — pale on light, deep-tinted on dark (icons/text keep the hue) */
  --c-warn-bg:#fff3e0; --c-alert-bg:#fff4f2; --c-ai-bg:#f3eefc; --c-info-bg:#f0f5ff; --c-ok-bg:#eef8f1;
  --wm-grad:linear-gradient(120deg,#0f7f9c 0%,#149a8b 52%,#1f9a5e 100%);
  --accent:#0F8A7E;--accent-2:#1E7FB0;--accent-ink:#eafffb;
  /* Darker gold for accent-colored TEXT/icons on the light theme — #0F8A7E as text on white is only
     2.24:1 (fails WCAG). This reaches 4.84:1 on white while reading as the same warm gold. Fills,
     rings, and accent-bg buttons keep --accent. */
  --accent-ink-lt:#0d6f66;
  --accent-tint:#123a35;--accent-tint2:#1f4a42;
  --accent-lt:#e4f2ee;--accent-lt2:#d8efe8;
  --accent-a20:rgba(21,138,128,.125);--accent-a30:rgba(21,138,128,.19);
}
/* Dark theme: same tokens, marine-opal dark values. Applied when a client picks Dark (or Auto
   resolves to dark). Brand-color tints (--accent-lt etc.) are re-derived per theme in JS. */
:root[data-theme="dark"]{
  --c-card:linear-gradient(180deg,#153029 0%,#0e1f1d 100%);
  --c-surf:linear-gradient(180deg,#12241f 0%,#0d1c19 100%);
  --c-bg:#06100f; --c-bg2:#10241f; --c-surf2:#163029; --c-surf3:#12231f;
  --c-ink:#eaf6f4; --c-mut:#a2beb9; --c-mut2:#8aa39c; --c-line:#22443d;
  --c-warn-bg:#2b2410; --c-alert-bg:#2c1717; --c-ai-bg:#191338; --c-info-bg:#0d1e33; --c-ok-bg:#0f2a1e;
  --logo-tile:#071214; --logo-tile-line:#183430;   /* brand-sheet "on dark" lotus tile */
  --wm-grad:linear-gradient(120deg,#2fb6e0 0%,#22c7c9 34%,#37d59a 68%,#8fe6a8 100%);
  --accent-ink-lt:#5fd9c0;
}
.brandc{background:var(--wm-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(120% 70% at 50% -8%, var(--c-bg2) 0%, var(--c-bg) 56%) fixed, var(--c-bg);display:flex;justify-content:center;padding:24px 0 48px;min-height:100vh;}
/* Fixed, viewport-capped height (not min-height) so the content area scrolls INSIDE the phone frame
   and the bottom nav stays anchored, instead of the whole frame growing tall with a long page. On
   real mobile the media query below overrides this with 100dvh. */
.shell{width:390px;background:var(--c-card);border-radius:24px;border:1px solid var(--c-line);overflow:hidden;height:812px;max-height:calc(100vh - 72px);display:flex;flex-direction:column;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.5);}
@media (max-width:480px){
  html,body{height:100%;}
  body{padding:0;min-height:100%;background:var(--c-card);overflow:hidden;}
  .shell{width:100%;max-width:100%;height:100vh;height:100dvh;min-height:0;border-radius:0;border:none;box-shadow:none;}
}
/* No fake phone status bar. In a standalone (installed) PWA the real OS status bar overlays the
   top, so the topbar pads by the safe-area inset to sit just below it; in a normal browser tab the
   inset is 0 and it reads as an ordinary header. */
.topbar{background:var(--c-card);padding:calc(10px + env(safe-area-inset-top,0px)) 16px 13px;border-bottom:1px solid var(--c-line);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{width:30px;height:30px;background:var(--logo-tile);border:1px solid var(--logo-tile-line);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-sizing:border-box;padding:3px;}
.logo i{font-size:15px;color:var(--accent);}
.logo img{width:100%;height:100%;object-fit:contain;display:block;}
#tt{font-size:17px;font-weight:500;color:var(--c-ink);flex:1;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-lt2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent-ink-lt);cursor:pointer;border:1.5px solid #e8d5c0;}
main.scr{flex:1;min-height:0;overflow-y:auto;padding-bottom:16px;}
main.scr::-webkit-scrollbar{display:none;}
/* In-flow flex child (not position:absolute) so it always sits flush at the bottom of the shell
   regardless of viewport quirks, and clears the phone's home indicator via the safe-area inset. */
nav.nav{flex-shrink:0;background:var(--c-card);border-top:1px solid var(--c-line);display:flex;padding:6px 0 calc(12px + env(safe-area-inset-bottom,0px));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px 0;border:none;background:none;min-height:44px;justify-content:center;}
.ni i{font-size:18px;color:var(--c-mut);}
.ni span{font-size:10px;color:var(--c-mut);font-weight:500;}
.ni.active i,.ni.active span{color:var(--accent-ink-lt);}
.ni:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
.card{background:var(--c-card);border:1px solid var(--c-line);border-radius:14px;margin:0 16px 10px;padding:16px;cursor:pointer;}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.sh{padding:14px 16px 7px;}
.swipe-card{transition:transform .2s;touch-action:pan-y;position:relative;z-index:1;}
.swipe-reveal{position:absolute;right:0;top:0;bottom:0;width:80px;z-index:0;background:var(--c-ok-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border-radius:0 13px 13px 0;}
.swipe-reveal i{font-size:18px;color:#2e9e6b;}
.swipe-reveal span{font-size:10px;color:#2e9e6b;font-weight:700;letter-spacing:.04em;}
.sh h2{font-size:11px;font-weight:600;color:var(--c-mut);text-transform:capitalize;letter-spacing:.06em;}
.btnp{background:var(--accent);color:var(--accent-ink);border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
.btnp:focus-visible{outline:2px solid #9a7d5e;outline-offset:2px;}
.btng{background:var(--c-card);border:1.5px solid var(--c-line);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--c-mut);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.btng:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.back{background:none;border:none;cursor:pointer;color:var(--accent-ink-lt);font-size:14px;font-weight:500;display:flex;align-items:center;gap:4px;padding:0;min-height:44px;}
.back:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
.pill-row{display:flex;gap:6px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;}
.pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;border:1.5px solid var(--c-line);color:var(--c-mut);background:var(--c-card);cursor:pointer;white-space:nowrap;font-weight:500;}
.pill.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent-ink-lt);}
.pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
/* font-size must be >=16px: iOS Safari auto-zooms the viewport when a focused field is smaller,
   which was the "screen zooms in" when tapping into a field. Many fields set a smaller inline
   font-size, and only !important beats an inline style, nothing here needs controls above 16px. */
input,textarea,select{font-size:16px!important;}
/* Loader icons must actually spin — a frozen ti-loader-2 reads as "the app hung" during file fetch
   / booking. Global rule so every loader button animates without per-screen keyframes. */
@keyframes sc-spin{to{transform:rotate(360deg);}}
.ti-loader-2{display:inline-block;animation:sc-spin .7s linear infinite;}
.fi{width:100%;background:var(--c-surf);border:1.5px solid var(--c-line);border-radius:10px;padding:10px 12px;font-size:16px;color:var(--c-ink);font-family:inherit;}
.fi:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent-ink-lt);}
.tag{font-size:12px;padding:5px 12px;border-radius:20px;background:var(--accent-lt);color:var(--c-mut);border:none;font-weight:500;display:inline-block;}
.divider{height:1px;background:var(--c-surf2);margin:0 16px;}
/* Progress bar */
.prog-track{height:6px;background:var(--c-surf2);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#e0b88a);}
/* Countdown ring */
.ring-wrap{position:relative;width:80px;height:80px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-wrap .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
/* Message bubbles */
.bub-them{background:var(--c-surf2);color:var(--c-ink);border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;font-size:13px;line-height:1.6;align-self:flex-start;overflow-wrap:break-word;}
.bub-me{background:var(--accent);color:var(--accent-ink);border-radius:16px;border-bottom-right-radius:4px;padding:10px 14px;font-size:13px;line-height:1.6;align-self:flex-end;overflow-wrap:break-word;}
/* Check circle */
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--c-line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.check-circle.done{background:var(--accent);border-color:var(--accent-ink-lt);}
.check-circle.done i{color:var(--accent-ink);}
/* Stat card */
.stat{background:var(--c-surf);border-radius:12px;padding:12px 14px;flex:1;}
/* Skin score arc */
.score-arc{position:relative;width:120px;height:64px;overflow:hidden;}
.score-arc svg{position:absolute;top:0;left:0;}
@media print{
  .sb,.topbar,.nav,#client-notif-bell,.no-print{display:none !important;}
  .shell{box-shadow:none !important;border:none !important;border-radius:0 !important;width:100% !important;max-width:100% !important;height:auto !important;overflow:visible !important;}
  #S{overflow:visible !important;height:auto !important;}
  body{background:var(--c-card) !important;}
}
#sc-demo-banner{position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(90deg,#2a231b,#1a1208);border-bottom:1px solid #3c3227;color:#f3ecdf;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:12px;padding:9px 14px;flex-wrap:wrap;text-align:center;}#sc-demo-banner b{color:#C8A882;}#sc-demo-banner button{background:none;border:1px solid #6b5d45;color:#C8A882;border-radius:20px;padding:4px 12px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;}#sc-demo-banner button:hover{border-color:#C8A882;}html,body{height:100%;margin:0;}.shell{height:100vh !important;max-height:100vh !important;min-height:0 !important;}
</style>

<script>
/* DEMO ISOLATION: this public demo shares its origin with the real app, so without this it would
   read (and "Reset" would wipe) a logged-in provider's REAL data from localStorage. Replace storage
   with an in-memory store and flag demo mode so the app skips login/Cloud and shows sample data. */
(function(){try{
  window.__SC_DEMO__=true;
  var mem=Object.create(null);
  var shim={
    getItem:function(k){k=String(k);return (k in mem)?mem[k]:null;},
    setItem:function(k,v){mem[String(k)]=String(v);},
    removeItem:function(k){delete mem[String(k)];},
    clear:function(){mem=Object.create(null);},
    key:function(i){return Object.keys(mem)[i]||null;}
  };
  try{Object.defineProperty(shim,"length",{get:function(){return Object.keys(mem).length;}});}catch(e){}
  try{Object.defineProperty(window,"localStorage",{configurable:true,get:function(){return shim;}});}catch(e){}
}catch(e){}})();
</script>
<div id="sc-demo-banner">
  <span>🧪 <b>Live demo</b> — viewing as client Maya Rodriguez, connected to Glowing Skin Studio.</span>
  <button onclick="scResetDemo()">Reset demo</button>
</div>
<script>
function scResetDemo(){try{Object.keys(localStorage).filter(function(k){return k.indexOf("sc_")===0;}).forEach(function(k){localStorage.removeItem(k);});}catch(e){}location.reload();}
</script>

<div class="shell">

<script>
const S=document.getElementById('S');

/* ════════════════════════════════════════════════════════════════
   SLICKBRIDGE, cross-app channel (provider tab ⇆ client tab)
   Uses localStorage for persistence + storage events + BroadcastChannel
   for live delivery between the two SlickChart apps on the same origin.
   ════════════════════════════════════════════════════════════════ */
const SlickBridge=(function(){
  const K_BOOKINGS='sc_bookings';
  const K_AVAIL='sc_availability';
  const K_BUS='sc_bus';
  const handlers={};
  let bc=null;
  try{bc=new BroadcastChannel('slickchart');}catch(e){bc=null;}

  function read(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
  function write(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

  function emit(type,payload){
    (handlers[type]||[]).forEach(fn=>{try{fn(payload);}catch(e){console.warn(e);}});
  }
  let _seen=null;
  try{const cur=read(K_BUS,null);if(cur&&cur.id)_seen=cur.id;}catch(e){}
  function _ingest(m){if(!m||!m.id||m.id===_seen)return;_seen=m.id;emit(m.type,m.payload);}
  function post(type,payload){
    const msg={type,payload,t:Date.now(),id:'m'+Math.random().toString(36).slice(2)};
    _seen=msg.id;                     // our own echo won't re-fire
    write(K_BUS,msg);                 // fires 'storage' in OTHER tabs
    if(bc){try{bc.postMessage(msg);}catch(e){}}  // live in other tabs
    emit(type,payload);               // local same-tab listeners
  }
  function on(type,fn){(handlers[type]=handlers[type]||[]).push(fn);}

  // Inbound from other tab via storage event
  window.addEventListener('storage',e=>{
    if(e.key===K_BUS&&e.newValue){
      try{_ingest(JSON.parse(e.newValue));}catch(_){}
    }
  });
  // Inbound from other tab via BroadcastChannel
  if(bc)bc.onmessage=e=>{_ingest(e.data);};
  // Fallback: storage/BroadcastChannel don't fire reliably between locally-opened files, so poll the shared bus too (deduped by id)
  setInterval(()=>{try{_ingest(read(K_BUS,null));}catch(e){}},700);

  return{
    post,on,
    getBookings:()=>read(K_BOOKINGS,[]),
    setBookings:(arr)=>write(K_BOOKINGS,arr),
    upsertBooking(b){const all=read(K_BOOKINGS,[]);const i=all.findIndex(x=>x.id===b.id);if(i>=0)all[i]=b;else all.unshift(b);write(K_BOOKINGS,all);return b;},
    getAvailability:()=>read(K_AVAIL,null),
  };
})();

/* Shared URL helpers, provider-supplied product/guide/site URLs reach the client via
   sync, so treat them as untrusted: block unsafe schemes, prefix bare domains, and
   escape for the href="" attribute and for display text. */
function _safeUrl(u){
  u=String(u||'').trim();if(!u)return'';
  if(/^[a-z][a-z0-9+.-]*:/i.test(u)&&!/^https?:\/\//i.test(u))return'';   // reject javascript:, data:, file:, ...
  return /^https?:\/\//i.test(u)?u:'https://'+u;
}
function _urlAttr(u){return String(u||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Safe <img src> value: only allow data:image/* and http(s) URLs (blocks a crafted
// javascript:/other scheme sneaking through a data field), and escape it so a stray
// quote can't break out of the src="…" attribute.
function _imgSrc(u){u=String(u||'').trim();if(!u)return'';if(!/^data:image\//i.test(u)&&!/^https?:\/\//i.test(u)&&!/^blob:/i.test(u))return'';return _urlAttr(u);}
function _txt(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// A guide/form icon your provider set can be an emoji, an uploaded image (data: URL or image
// link), or nothing at all ("no icon"). Render each correctly; empty returns '' so nothing shows.
function _iconIsImage(icon){var s=String(icon==null?'':icon).trim();return /^data:image\//i.test(s)||/^https?:\/\/[^\s]+\.(png|jpe?g|gif|webp|svg)(\?|#|$)/i.test(s);}
function _iconMarkup(icon,size){
  size=size||24;var s=String(icon==null?'':icon).trim();
  if(!s)return '';
  if(_iconIsImage(s)){var src=_imgSrc(s);if(src)return '<img src="'+src+'" alt="" style="width:'+size+'px;height:'+size+'px;border-radius:8px;object-fit:cover;display:inline-block;vertical-align:middle;">';return '';}
  return '<span style="font-size:'+Math.round(size*0.92)+'px;line-height:1;display:inline-block;">'+_txt(s)+'</span>';
}
// Day-of-month with an ordinal suffix: 1->1st, 2->2nd, 11->11th, 21->21st, etc.

/* ════════════════════════════════════════════════════════════════
   PUSH ENGINE, real Web Notifications API with graceful fallback.
   Fires a true system notification when permission is granted and the
   tab is backgrounded; otherwise shows an in-app push-style banner.
   Always records to the in-app notification center (the bell).
   ════════════════════════════════════════════════════════════════ */
const Push=(function(){
  const supported=typeof window!=='undefined'&&'Notification'in window;
  function permission(){return supported?Notification.permission:'unsupported';}
  async function request(){
    if(!supported)return 'unsupported';
    try{
      let p=Notification.permission;
      if(p==='default')p=await Notification.requestPermission();
      return p;
    }catch(e){return 'blocked';}
  }
  function inQuietHours(prefs){
    if(!prefs||!prefs.quietStart||!prefs.quietEnd)return false;
    const now=new Date();const cur=now.getHours()*60+now.getMinutes();
    const[sh,sm]=prefs.quietStart.split(':').map(Number);
    const[eh,em]=prefs.quietEnd.split(':').map(Number);
    const start=sh*60+sm,end=eh*60+em;
    return start<end ? (cur>=start&&cur<end) : (cur>=start||cur<end); // overnight wrap
  }
  function fireSystem(title,body,onclick){
    try{
      const n=new Notification(title,{body,tag:'slickchart',icon:'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="%23C8A882"/%3E%3C/svg%3E'});
      n.onclick=()=>{window.focus();if(onclick)onclick();n.close();};
      return true;
    }catch(e){return false;}
  }
  return{supported,permission,request,inQuietHours,fireSystem};
})();

// ── Web Push subscription (real notifications when the app is closed) ──
// Public VAPID key, safe to embed (it's only the public half). It MUST match the
// VAPID_PUBLIC_KEY env var on the server, or the browser's push service rejects the sub.
const VAPID_PUBLIC_KEY='BI0MVqsF4ydcwZFAAoz1sOu3Cu7foQIAvnQ56SkbvMYAGZEs2XbyOvjPeT-YpMRpF0Z-wMJ5ITyCSl0g73mQ25M';
function _urlB64ToUint8(base64){
  const pad='='.repeat((4-(base64.length%4))%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');

  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);

}
// Subscribe this device for push and register it with the server. Safe to call repeatedly:
// it reuses an existing subscription and only runs for a real, signed-in client with
// notification permission already granted.
async function _subscribePush(){
  try{
    if(!client._real||!client._token)return;
    if(!('serviceWorker'in navigator)||!('PushManager'in window))return;
    if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:_urlB64ToUint8(VAPID_PUBLIC_KEY)});
    }
    if(sub){
      await fetch('/api/push-subscribe?t='+encodeURIComponent(client._token),{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({subscription:sub})
      }).catch(function(){});
    }
  }catch(e){/* push is a nice-to-have; never block the app on it */}
}
// ── Native push (Capacitor app only) ──────────────────────────────────────────────────────────
// In the App Store / Play build, web push doesn't fire — we register with the OS (APNs/FCM) via the
// Capacitor plugin, hand the device token to the server, and route taps. No-op on the web/PWA, so the
// existing web-push path is untouched there. Sending these still needs Firebase/APNs — see
// PUSH-NATIVE-SETUP.md.
let _nativePushInit=false;
async function _initNativePush(){
  try{
    if(_nativePushInit)return; _nativePushInit=true;
    if(!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform()))return;
    const PN=window.Capacitor.Plugins&&window.Capacitor.Plugins.PushNotifications;
    if(!PN)return;
    let perm=await PN.checkPermissions();
    if(perm.receive!=='granted'){perm=await PN.requestPermissions();}
    if(perm.receive!=='granted')return;   // client declined OS notifications
    PN.addListener('registration',function(tok){
      try{
        if(!client._real||!client._token||!tok||!tok.value)return;
        const platform=(window.Capacitor.getPlatform&&window.Capacitor.getPlatform())||'';
        fetch('/api/native-push?t='+encodeURIComponent(client._token),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platform,token:tok.value})}).catch(function(){});
      }catch(e){}
    });
    PN.addListener('registrationError',function(){});
    // Tapping a native notification opens the app — route to the right screen from its data payload.
    PN.addListener('pushNotificationActionPerformed',function(a){
      try{const d=(a&&a.notification&&a.notification.data)||{};const scr=d.screen||d.action||'';if(scr&&typeof nav==='function')nav(scr);else if(typeof renderHome==='function')renderHome();}catch(e){}
    });
    await PN.register();
  }catch(e){/* push is a nice-to-have; never block the app */}
}

/* central fire point used everywhere a notification should happen */
function pushNotify(o){
  // o = {type,title,body,icon,col,ic,onclick}
  const entry={id:'cn'+Date.now()+Math.random().toString(36).slice(2,5),type:o.type||'general',
    icon:o.icon||'ti-bell',col:o.col||'var(--accent-lt)',ic:o.ic||'var(--accent)',
    title:o.title,body:o.body||'',time:'Just now',read:false};
  clientNotifs.unshift(entry);
  updateClientBadge();

  const prefs=loadNotifPrefs();
  // Notifications are now a single on/off switch (no per-type toggles), so firing depends only on
  // the master enable and quiet hours.
  const allowed=o.force||(prefs.enabled&&!Push.inQuietHours(prefs));
  if(!allowed)return entry; // recorded in center, but no push/banner (off or quiet hours)

  const fireApp=()=>showPushBanner(entry,o.onclick);
  if(Push.permission()==='granted'&&document.hidden){
    if(!Push.fireSystem(o.title,o.body,o.onclick))fireApp();

  }

}

function initSwipe(card,i,onFullSwipe){
  if(!card||card._swipeInit)return;card._swipeInit=true;
  const W=80;
  // When a full-swipe handler is supplied (e.g. notifications), a big left-swipe slides the card
  // off and clears it outright; a small swipe still just reveals the DONE button.
  const MAXPULL=onFullSwipe?W*2.4:W+20;
  const FULL=W*1.5;
  let startX=0,startY=0,dx=0,dragging=false,opened=false,decided=false,horiz=false;
  const setX=x=>{card.style.transform='translateX('+x+'px)';};
  const open=()=>{opened=true;card.style.transition='transform .2s';card.style.transform='translateX(-'+W+'px)';};
  const close=()=>{opened=false;card.style.transition='transform .2s';card.style.transform='translateX(0px)';};
  const closeOthers=()=>{try{document.querySelectorAll('.swipe-card').forEach(el=>{if(el!==card){el.style.transition='transform .2s';el.style.transform='translateX(0px)';if(el._setClosed)el._setClosed();}});}catch(e){}};
  card._setClosed=()=>{opened=false;};
  const onStart=(x,y)=>{startX=x;startY=y;dx=opened?-W:0;dragging=true;decided=false;horiz=false;card.style.transition='none';};
  const onMove=(x,y)=>{
    if(!dragging)return;
    const mx=x-startX,my=y-startY;
    if(!decided){if(Math.abs(mx)>6||Math.abs(my)>6){decided=true;horiz=Math.abs(mx)>Math.abs(my);}else return;}
    if(!horiz){dragging=false;card.style.transition='transform .2s';setX(opened?-W:0);return;}
    let nx=(opened?-W:0)+mx;if(nx>0)nx=0;if(nx<-MAXPULL)nx=-MAXPULL;dx=nx;setX(nx);
  };
  const onEnd=()=>{
    if(!dragging)return;dragging=false;
    if(!horiz){card.style.transition='transform .2s';return;}
    if(onFullSwipe&&dx<-FULL){card.style.transition='transform .25s';card.style.transform='translateX(-120%)';setTimeout(onFullSwipe,180);return;}
    if(dx<-W/2){closeOthers();open();}else{close();}
  };
  card.addEventListener('touchstart',e=>{if(e.touches&&e.touches[0])onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{if(e.touches&&e.touches[0])onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchend',onEnd);card.addEventListener('touchcancel',onEnd);
  card.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);const mm=ev=>onMove(ev.clientX,ev.clientY);const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
}

// Average luminance (0-255) of a logo's opaque pixels, cached — lets any provider
// logo blend onto the bar whether it's light or dark.
var _scLogoStats={};
function _scLogoLuminance(src,cb){
  if(_scLogoStats[src]){cb(_scLogoStats[src]);return;}
  try{
    var img=new Image();
    img.onload=function(){
      try{
        var n=36,c=document.createElement('canvas');c.width=n;c.height=n;
        var x=c.getContext('2d');x.drawImage(img,0,0,n,n);
        var d=x.getImageData(0,0,n,n).data,s=0,w=0,sat=0;
        for(var i=0;i<d.length;i+=4){var a=d[i+3]/255;if(a<0.15)continue;
          var r=d[i],g=d[i+1],b=d[i+2];
          s+=(0.299*r+0.587*g+0.114*b)*a;
          var mx=Math.max(r,g,b),mn=Math.min(r,g,b);
          sat+=(mx?(mx-mn)/mx:0)*a; w+=a;}
        var st={lum:w?s/w:128,sat:w?sat/w:0};_scLogoStats[src]=st;cb(st);
      }catch(e){cb({lum:128,sat:0});}
    };
    img.onerror=function(){cb({lum:128,sat:0});};
    img.src=src;
  }catch(e){cb({lum:128,sat:0});}
}

let APPT=new Date('2026-07-17T10:00:00');
let messages=[];
function _saveClientMessages(){

    (client.providers||[]).forEach(p=>{map[p.id]=p.thread||[];});
    localStorage.setItem('sc_client_messages',JSON.stringify(map));
  }catch(e){}
}
function _loadClientMessagesInto(p){
  try{
    const raw=localStorage.getItem('sc_client_messages');
    if(raw){const map=JSON.parse(raw);if(map&&Array.isArray(map[p.id])&&map[p.id].length)p.thread=map[p.id];}
  }catch(e){}
}
function activeProvider(){return client.providers.find(p=>p.id===client.activeProviderId)||client.providers[0]||{id:'jess',name:'',first:'',initials:'',studio:'',thread:[],summaries:[],homecare:[],products:[]};}
function recomputeCountdown(){
  // Real clients count from the actual current date; the demo stays pinned to its
  // seeded "today" (TODAY) so the sample countdown reads coherently whenever it's viewed.
  const now=(client._real)?new Date():new Date(TODAY);
  // If the appointment date is missing or unparseable (e.g. nothing scheduled yet),
  // there's no countdown, mark it as such so the UI can show "Not scheduled" instead
  // of "NaN days away" or a broken progress ring. new Date(null) yields the 1970 epoch
  // rather than an Invalid Date, so also reject anything before year 2000.
  if(!APPT||isNaN(APPT.getTime())||APPT.getFullYear()<2000){
    client.daysUntilNext=null;client.hoursUntilNext=0;
    client.isThisWeek=false;client.isTomorrow=false;client.isToday=false;client.hasNextAppt=false;
    return;
  }
  client.hasNextAppt=true;
  // Count whole calendar days between today and the appointment, ignoring time-of-day
  // so an appointment later *today* reads as 0 ("Today!"), not 1. Using midnight-to-
  // midnight avoids the off-by-one that raw ms subtraction + Math.ceil produced.
  const startOfToday=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const apptDay=new Date(APPT.getFullYear(),APPT.getMonth(),APPT.getDate());
  const daysLeft=Math.round((apptDay-startOfToday)/(1000*60*60*24));
  client.daysUntilNext=daysLeft;
  client.hoursUntilNext=Math.max(0,Math.floor((APPT-now)/(1000*60*60)));
  // "This week" = within the next 7 days and not already past.
  client.isThisWeek=daysLeft>=0&&daysLeft<=7;client.isTomorrow=daysLeft===1;client.isToday=daysLeft===0;
}

  client.studio=p.studio;client.studioAddress=p.studioAddress;client.studioPhone=p.studioPhone;client.website=p.website||'';
  client.treatment=p.treatment;client.session=p.session;client.totalSessions=p.totalSessions;
  client.nextDate=p.nextDate;client.nextTime=p.nextTime;
  client.nextDateISO=p.nextDateISO;client.nextTimeISO=p.nextTimeISO;client.durationMins=p.durationMins;
  APPT=new Date(p.apptISO);
  try{if(typeof _loadClientMessagesInto==='function')_loadClientMessagesInto(p);}catch(e){}
  messages=p.thread;

  if(!p.checked)p.checked=Object.fromEntries((p.homecare||[]).map(s=>[s.key,!!s.done]));
  homecareChecked=p.checked;

  // THIS provider. _eng.steps is a flat per-client map, so without this guard two providers whose

  try{if(_eng&&_eng.day===_engToday()&&_eng.stepsProvider===p.id){Object.keys(homecareChecked).forEach(k=>{homecareChecked[k]=!!(_eng.steps||{})[k];});}}catch(e){}
  // keep photo compare indices valid for this provider's session count
  const n=(p.progress||[]).length;
  photoRight=Math.max(0,n-1);
  photoLeft=Math.max(0,n-2);
  recomputeCountdown();
  applyClientTheme(p.brand);
}

// Derive the appointment's local date/time parts from a reliable source. For real
// clients nextDateISO/nextTimeISO are empty, so we fall back to APPT (parsed from
// apptISO). Returns local wall-clock parts, calendar files should use floating local
// time (no trailing Z), otherwise a 10am local appointment lands at 10am UTC.
function _apptParts(){
  let d=null;
  // Prefer the explicit ISO fields when present AND well-formed (demo data supplies them).
  if(client.nextDateISO&&client.nextTimeISO&&/^\d{8}$/.test(client.nextDateISO)&&/^\d{6}$/.test(client.nextTimeISO)){
    // These were historically stored UTC-shifted; reconstruct the intended instant then
    // read back local parts so the calendar shows the right wall-clock time.
    const Y=+client.nextDateISO.slice(0,4),Mo=+client.nextDateISO.slice(4,6)-1,Da=+client.nextDateISO.slice(6,8);
    const H=+client.nextTimeISO.slice(0,2),Mi=+client.nextTimeISO.slice(2,4);
    d=new Date(Date.UTC(Y,Mo,Da,H,Mi,0));
  } else if(APPT&&!isNaN(APPT.getTime())&&APPT.getFullYear()>=2000){
    d=new Date(APPT);
  }
  if(!d||isNaN(d.getTime()))return null;
  const p=n=>String(n).padStart(2,'0');
  return {
    date:d.getFullYear()+p(d.getMonth()+1)+p(d.getDate()),
    time:p(d.getHours())+p(d.getMinutes())+'00',
    dObj:d
  };
}
// Escape a value for an iCal text field (RFC 5545): backslash, semicolon, comma, newlines.
function _icsEsc(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');}
function buildICS(){
  const parts=_apptParts();
  const dtstamp=(function(){const d=new Date();const p=n=>String(n).padStart(2,'0');return d.getUTCFullYear()+p(d.getUTCMonth()+1)+p(d.getUTCDate())+'T'+p(d.getUTCHours())+p(d.getUTCMinutes())+p(d.getUTCSeconds())+'Z';})();
  const uid='slickchart-'+((parts&&parts.date)||'appt')+'-'+Math.random().toString(36).slice(2,8)+'@slickchart.app';
  const dur=Math.max(5,parseInt(client.durationMins,10)||60);
  const lines=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SlickChart//EN','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'DTSTAMP:'+dtstamp,
    // Floating local time (no Z) so the event shows at the provider's local wall-clock time.
    parts?('DTSTART:'+parts.date+'T'+parts.time):'DTSTART:'+dtstamp,
    'DURATION:PT'+dur+'M',
    'SUMMARY:'+_icsEsc(client.treatment+' with '+client.provider),
    'DESCRIPTION:'+_icsEsc('Your '+client.treatment+' appointment at '+client.studio+'.\nAddress: '+(client.studioAddress||'')+'\nPhone: '+(client.studioPhone||'')),
    'LOCATION:'+_icsEsc(client.studioAddress||client.studio||''),
    'END:VEVENT','END:VCALENDAR'
  ];
  return lines.join('\r\n');
}

function downloadICS(){
  const blob=new Blob([buildICS()],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='slickchart-appointment.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  closeCalModal();
  showToast('Appointment file downloaded! Open it to add to your calendar.');
}

function openGoogleCal(){
  const parts=_apptParts();
  if(!parts){closeCalModal();showToast('No appointment date to add yet.');return;}
  const start=parts.date+'T'+parts.time;   // floating local time (Google uses the user's cal tz)
  const dur=Math.max(5,parseInt(client.durationMins,10)||60);
  const e=new Date(parts.dObj.getTime()+dur*60000);
  const pad=n=>String(n).padStart(2,'0');
  const end=e.getFullYear()+pad(e.getMonth()+1)+pad(e.getDate())+'T'+pad(e.getHours())+pad(e.getMinutes())+'00';
  const url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(client.treatment+' with '+client.provider)}&dates=${start}/${end}&details=${encodeURIComponent('Your '+client.treatment+' at '+client.studio)}&location=${encodeURIComponent(client.studioAddress||client.studio||'')}`;
  window.open(url,'_blank');
  closeCalModal();
}

function showToast(msg,ok){
  const existing=document.getElementById('cal-toast');if(existing)existing.remove();
  const t=document.createElement('div');
  t.id='cal-toast';
  t.setAttribute('role','status');t.setAttribute('aria-live','polite');
  t.style.cssText='position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:10px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:7px;z-index:999;max-width:82%;box-shadow:0 4px 20px rgba(0,0,0,.2);';
  // Pass ok:false for errors/validation so we don't show a reassuring green check on a problem.
  const icon=ok===false?'ti-alert-triangle':'ti-check';
  const iconCol=ok===false?'#e0a030':'#4ec49a';
  t.innerHTML=`<i class="ti ${icon}" aria-hidden="true" style="color:${iconCol};font-size:14px;flex-shrink:0;"></i><span style="line-height:1.4;"></span>`;
  const _s=t.querySelector('span');if(_s)_s.textContent=String(msg==null?'':msg);
  (document.querySelector('.shell')||document.body).appendChild(t);
  setTimeout(()=>t.remove(),3400);
}

// Reliable clipboard copy with a fallback for webviews/older browsers where the async
// clipboard API is missing, otherwise a copy could silently fail while still telling the
// client it succeeded. Runs onDone only when the copy actually went through.
function _clientCopy(text,onDone,onFail){
  const ok=()=>{try{onDone&&onDone();}catch(e){}};
  const fail=()=>{try{onFail&&onFail();}catch(e){}};
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(String(text)).then(ok).catch(()=>_clientCopyFallback(text,ok,fail));return;}
  }catch(e){}
  _clientCopyFallback(text,ok,fail);
}
function _clientCopyFallback(text,ok,fail){
  try{
    const ta=document.createElement('textarea');ta.value=String(text);ta.style.cssText='position:fixed;top:-1000px;left:-1000px;';
    document.body.appendChild(ta);ta.focus();ta.select();
    const done=document.execCommand('copy');document.body.removeChild(ta);
    if(done)ok();else fail();
  }catch(e){fail();}
}

// Homecare check state is per-provider (client.providers[].checked); homecareChecked points at the active one
let homecareChecked={};
// ── Client engagement: daily routine streaks + guide-read tracking (persisted) ──
let _eng={day:'',streak:0,lastDoneDay:'',steps:{},guides:{},care:{}};
function _engToday(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function _engYesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function loadEng(){
  try{const s=JSON.parse(localStorage.getItem('sc_client_engage')||'null');if(s)_eng=Object.assign(_eng,s);}catch(e){}
  if(_eng.day!==_engToday()){_eng.steps={};_eng.day=_engToday();}   // fresh checklist daily; streak preserved
  if(!_eng.guides)_eng.guides={};
  if(!_eng.care)_eng.care={};
}
function saveEng(){try{localStorage.setItem('sc_client_engage',JSON.stringify(_eng));}catch(e){}_syncClientPrefsToServer();}

// ── Real database persistence for client-owned settings ──
// localStorage is kept only as an instant-load cache now; the server is the
// actual source of truth, so settings survive a cleared browser or a new device.
let _prefsSyncTimer=null;

// Remembers which appointment a client has already completed their pre-visit check-in
// for, per provider (provider id → the appointment date it was done for). Without this,
// reopening the personal link on a fresh page load forgot the check-in was done, the
// provider object is rebuilt from scratch in _applyRealClientData, so the client was
// re-prompted to redo a check-in they'd already submitted. Keying on the appointment
// date means a NEW appointment (a rescheduled or next visit) still asks for a fresh one.
let _ciDoneMap=(function(){try{return JSON.parse(localStorage.getItem('sc_checkin_done')||'{}')||{};}catch(e){return {};}})();
function _markCheckinDone(prov){
  prov=prov||activeProvider();
  if(!prov)return;
  prov.checkinDone=true;
  _ciDoneMap[prov.id]=prov.nextDate||'';
  try{localStorage.setItem('sc_checkin_done',JSON.stringify(_ciDoneMap));}catch(e){}
  try{if(typeof _ciClearDraft==='function')_ciClearDraft();}catch(e){}   // check-in submitted — drop the resume draft
  _syncClientPrefsToServer();
}
// Re-apply saved check-in completion onto the freshly-rebuilt provider objects. Only
// restores it when the stored appointment date still matches the provider's current
// next appointment, so a new/rescheduled visit correctly resets to "not done yet".
function _applyCheckinDoneFromMap(){
  try{(client.providers||[]).forEach(function(p){
    if(p&&_ciDoneMap[p.id]!==undefined&&_ciDoneMap[p.id]===(p.nextDate||''))p.checkinDone=true;
  });}catch(e){}
}

// Same idea as _ciDoneMap, but for pre-visit forms. A submitted form is removed from the
// pending list locally, but on reload p.pendingForms is replaced by the server's copy, and
// the server only drops it once the PROVIDER's app has processed the submission and re-synced.
// In the window before that, a form the client already completed would pop back onto their
// to-do list and invite a duplicate submission. This map remembers which specific form
// instances were submitted (provider|formId → the form's assignedAt) so they stay off the
// list. A form the provider RE-sends gets a new assignedAt, so it correctly reappears.
let _formsDoneMap=(function(){try{return JSON.parse(localStorage.getItem('sc_forms_done')||'{}')||{};}catch(e){return {};}})();
function _formDoneKey(provId,formId){return String(provId)+'|'+String(formId);}
function _markFormDone(provId,pf){
  if(!pf)return;
  _formsDoneMap[_formDoneKey(provId,pf.formId)]=pf.assignedAt||'';
  try{localStorage.setItem('sc_forms_done',JSON.stringify(_formsDoneMap));}catch(e){}
  _syncClientPrefsToServer();
}
// Drop from every provider's pending list any form the client has already submitted (matching
// the exact instance by assignedAt). A re-send has a newer assignedAt, so it is left in place.
function _applyFormsDoneFromMap(){
  try{(client.providers||[]).forEach(function(p){
    if(p&&Array.isArray(p.pendingForms)){
      p.pendingForms=p.pendingForms.filter(function(pf){
        if(!pf)return false;
        const k=_formDoneKey(p.id,pf.formId);
        return !(_formsDoneMap[k]!==undefined&&_formsDoneMap[k]===(pf.assignedAt||''));
      });
    }
  });}catch(e){}
}
function _collectClientPrefs(){
  let welcomeDismissed=[];try{welcomeDismissed=JSON.parse(localStorage.getItem('sc_welcome_dismissed')||'[]');}catch(e){}
  const installDismissed=(function(){try{return localStorage.getItem('sc_install_dismissed')==='1';}catch(e){return false;}})();
  let saved=[];try{saved=JSON.parse(localStorage.getItem('sc_client_saved')||'[]');}catch(e){}
  // Everything below was localStorage-only and silently reverted on a fresh device — now synced so a
  // client's own customizations (hidden summaries, deleted/cleared guides, course progress, a corrected
  // phone/avatar, dismissed banners) follow them to any device.
  const _j=(k,d)=>{try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}};
  const _s=(k)=>{try{return localStorage.getItem(k)||'';}catch(e){return '';}};
  return {notif:loadNotifPrefs(),eng:_eng,welcomeDismissed,installDismissed,checkinDone:_ciDoneMap,formsDone:_formsDoneMap,reminders:_reminderContext(),saved,
    hiddenSummaries:_j('sc_client_hidden_summaries',{}),
    a2hsDismissed:(_s('sc_a2hs_dismissed')==='1'),
    courseProg:_j('sc_course_prog_jess',{}),
    clearedRes:_j('sc_home_cleared_res',[]),
    deletedRes:_j('sc_deleted_res',[]),
    contact:_j('sc_client_contact',null),
    avatar:_s('sc_client_avatar'),
    vcSubmitted:_s('sc_vc_submitted')};
}
// Context the reminder cron needs, computed here where the browser knows the client's real
// timezone and the appointment time is already parsed (apptISO). apptAt is an absolute epoch
// ms, so the server compares it to "now" without re-parsing any display string.
function _reminderContext(){
  try{
    const tz=(typeof Intl!=='undefined'&&Intl.DateTimeFormat)?(Intl.DateTimeFormat().resolvedOptions().timeZone||''):'';
    // Build one upcoming appointment per provider the client sees — not just the active one — so a client
    // with more than one SlickChart provider gets a reminder for EVERY upcoming appointment. Rebuilt from
    // current provider data on each sync, so a provider's cancelled/moved appointment drops out here too.
    const _now=Date.now();
    const appts=[];
    const provs=(client&&Array.isArray(client.providers))?client.providers:[];
    provs.forEach(function(p){
      if(!p||!p.apptISO)return;
      const t=Date.parse(p.apptISO);
      if(isNaN(t)||t<_now-3*3600000)return;   // skip missing/past appts (a passed or cleared one is stale)
      appts.push({at:t,label:((p.nextDate||'')+' '+(p.nextTime||'')).trim(),treatment:p.treatment||''});
    });
    const ap=(typeof activeProvider==='function')?activeProvider():null;
    let apptAt=0,apptLabel='',treatment='';
    if(ap&&ap.apptISO){const t=Date.parse(ap.apptISO);if(!isNaN(t))apptAt=t;}
    if(ap){apptLabel=(((client.nextDate||ap.nextDate||'')+' '+(client.nextTime||ap.nextTime||'')).trim());treatment=ap.treatment||client.treatment||'';}
    const hasHomecare=!!(ap&&Array.isArray(ap.homecare)&&ap.homecare.length);
    // apptAt/apptLabel/treatment remain for older server builds; `appts` is the multi-provider superset.
    return {tz,apptAt,apptLabel,treatment,hasHomecare,appts};
  }catch(e){return {};}
}
function _syncClientPrefsToServer(){
  if(!client._real||!client._token)return; // nothing to sync in local/demo mode
  clearTimeout(_prefsSyncTimer);
  _prefsSyncTimer=setTimeout(()=>{
    fetch('/api/client-prefs?t='+encodeURIComponent(client._token),{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prefs:_collectClientPrefs()})
    }).catch(e=>console.error('[client prefs] save failed:',e&&e.message));
  },900);
}
async function _loadClientPrefsFromServer(){
  if(!client._real||!client._token)return;
  try{
    const r=await fetch('/api/client-prefs?t='+encodeURIComponent(client._token));
    const j=await r.json();
    if(!(j&&j.ok&&j.prefs&&Object.keys(j.prefs).length))return; // nothing saved server-side yet, keep local defaults
    const p=j.prefs;
    if(p.notif)saveNotifPrefs(p.notif);
    if(p.eng){_eng=Object.assign(_eng,p.eng);try{localStorage.setItem('sc_client_engage',JSON.stringify(_eng));}catch(e){}
      // Only restore the saved checklist onto the provider it was recorded under. The old `undefined`
      // fallback applied it to whatever provider was active, so for a client with multiple providers a
      // legacy record (no stepsProvider) marked another provider's shared step keys as done. Still allow
      // the legacy fallback when the client has at most one provider (no one to cross-contaminate).
      if(_eng.day===_engToday()&&(_eng.stepsProvider===(client&&client.activeProviderId)||(_eng.stepsProvider===undefined&&((client&&client.providers)||[]).length<=1)))Object.keys(homecareChecked).forEach(k=>{homecareChecked[k]=!!(_eng.steps||{})[k];});
    }
    if(Array.isArray(p.welcomeDismissed))try{const cur=JSON.parse(localStorage.getItem('sc_welcome_dismissed')||'[]');const u=Array.from(new Set(cur.concat(p.welcomeDismissed)));localStorage.setItem('sc_welcome_dismissed',JSON.stringify(u));}catch(e){}
    if(typeof p.installDismissed==='boolean')try{localStorage.setItem('sc_install_dismissed',p.installDismissed?'1':'0');}catch(e){}
    if(Array.isArray(p.saved)){try{localStorage.setItem('sc_client_saved',JSON.stringify(p.saved));}catch(e){}try{const _ap=activeProvider();if(_ap)_ap.saved=p.saved.slice();}catch(e){}}
    if(p.checkinDone&&typeof p.checkinDone==='object'){
      _ciDoneMap=Object.assign({},_ciDoneMap,p.checkinDone);
      try{localStorage.setItem('sc_checkin_done',JSON.stringify(_ciDoneMap));}catch(e){}
      _applyCheckinDoneFromMap();
    }
    if(p.formsDone&&typeof p.formsDone==='object'){
      _formsDoneMap=Object.assign({},_formsDoneMap,p.formsDone);
      try{localStorage.setItem('sc_forms_done',JSON.stringify(_formsDoneMap));}catch(e){}
      _applyFormsDoneFromMap();
    }
    // Restore the newly-synced customization keys (see _collectClientPrefs).
    // Merge (union), not overwrite: a summary the client just removed is a monotonic tombstone. Plain
    // overwrite could wipe a removal whose debounced save hadn't round-tripped, so it reappeared.
    if(p.hiddenSummaries&&typeof p.hiddenSummaries==='object')try{const cur=JSON.parse(localStorage.getItem('sc_client_hidden_summaries')||'{}')||{};const merged=Object.assign({},p.hiddenSummaries,cur);localStorage.setItem('sc_client_hidden_summaries',JSON.stringify(merged));}catch(e){}
    if(typeof p.a2hsDismissed==='boolean')try{localStorage.setItem('sc_a2hs_dismissed',p.a2hsDismissed?'1':'0');}catch(e){}
    if(p.courseProg&&typeof p.courseProg==='object')try{localStorage.setItem('sc_course_prog_jess',JSON.stringify(p.courseProg));}catch(e){}
    // Merge (union), never overwrite: clears/deletes are monotonic tombstones. Overwriting with the
    // server copy used to wipe a just-made local clear whose debounced save hadn't round-tripped yet,
    // so the guide reappeared — and the follow-up sync then re-pushed the stale set, losing it for good.
    // Union keeps the local tombstone (the follow-up sync pushes it back) and refreshes the in-memory
    // Sets the home/library filters actually read.
    if(Array.isArray(p.clearedRes)){try{const s=_resSetLoad('sc_home_cleared_res');p.clearedRes.forEach(x=>s.add(x));_homeClearedRes.forEach(x=>s.add(x));_homeClearedRes=s;localStorage.setItem('sc_home_cleared_res',JSON.stringify(Array.from(s)));}catch(e){}}
    if(Array.isArray(p.deletedRes)){try{const s=_resSetLoad('sc_deleted_res');p.deletedRes.forEach(x=>s.add(x));_deletedRes.forEach(x=>s.add(x));_deletedRes=s;localStorage.setItem('sc_deleted_res',JSON.stringify(Array.from(s)));}catch(e){}}
    if(p.vcSubmitted)try{localStorage.setItem('sc_vc_submitted',String(p.vcSubmitted));}catch(e){}
    // Contact + avatar: the client's own correction. Restore it AND apply to the live view so a fresh
    // device shows their edit immediately, not the provider's older on-file value.
    if(p.contact&&typeof p.contact==='object'){try{localStorage.setItem('sc_client_contact',JSON.stringify(p.contact));}catch(e){}
      try{if(p.contact.email)client.email=p.contact.email;if(p.contact.phone)client.phone=p.contact.phone;}catch(e){}}
    if(p.avatar){try{localStorage.setItem('sc_client_avatar',String(p.avatar));}catch(e){}try{client.avatar=p.avatar;}catch(e){}}
  }catch(e){ console.error('[client prefs] load failed:',e&&e.message); /* fall back to whatever's cached locally */ }
}
function _engStreakLive(){return _eng.lastDoneDay===_engToday()||_eng.lastDoneDay===_engYesterday();}
function _engSteps(){return (activeProvider().homecare||[]);}
function _engProgress(){const s=_engSteps();const total=s.length;const done=s.filter(x=>homecareChecked[x.key]).length;return {total,done,pct:total?Math.round(done/total*100):0};}
function toggleHomecareStep(key,where){
  homecareChecked[key]=!homecareChecked[key];
  _eng.steps=Object.assign({},homecareChecked);_eng.day=_engToday();
  try{_eng.stepsProvider=(typeof activeProvider==='function')?activeProvider().id:(client&&client.activeProviderId);}catch(e){}
  const s=_engSteps();const allDone=s.length>0&&s.every(x=>homecareChecked[x.key]);
  if(allDone&&_eng.lastDoneDay!==_engToday()){
    _eng.streak=(_eng.lastDoneDay===_engYesterday())?(_eng.streak+1):1;
    _eng.lastDoneDay=_engToday();saveEng();
    if(typeof showToast==='function')showToast(_eng.streak>1?`Routine complete · ${_eng.streak}-day streak 🔥`:'Routine complete for today 🎉');
  } else saveEng();
  if(where==='home')renderMagicLanding(); else renderHomecare();
}
function _engNudge(){
  const {total,done}=_engProgress();
  if(!total)return '';
  if(done>=total)return _eng.streak>1?`All done today, ${_eng.streak}-day streak`:'All done for today';
  const left=total-done;
  if(done===0&&_engStreakLive()&&_eng.streak>0)return `Keep your ${_eng.streak}-day streak going, ${left} step${left>1?'s':''} today`;
  if(done===0)return `${left} step${left>1?'s':''} to do today`;
  return `${left} step${left>1?'s':''} left today`;
}
function _guideKey(r){return (r&&(r.id||r.title)||'').toString().replace(/[^a-z0-9]/gi,'').slice(0,40);}
function _guidesProgress(list){const total=(list||[]).length;const read=(list||[]).filter(r=>_eng.guides[_guideKey(r)]).length;return {total,read};}

function _topOverlay(){

  const shell=document.querySelector('.shell');

// Download the provider's uploaded guide file. Legacy shares carried the bytes inline
// (fileData); newer ones just flag hasFile and we fetch the file from the server on demand,
// authenticated by this client's own link token. Convert to a Blob so it downloads
// reliably (especially on mobile Safari) rather than pointing an anchor at a data URL.
function _guideInlineData(fileId){
  const gs=activeProvider().pendingGuides||[];
  for(var i=0;i<gs.length;i++){var pg=gs[i];
    if(pg.guideId===fileId&&pg.fileData)return pg.fileData;
    if(Array.isArray(pg.files)){var f=pg.files.find(function(x){return x&&x.fileId===fileId;});if(f&&f._data)return f._data;}
  }

    .then(function(j){

// Turn a YouTube/Vimeo/Loom link into an embeddable URL; fall back to null (show a link button).
function _videoEmbed(url){
  try{
    const u=String(url||'').trim();if(!u)return null;
    let m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{6,})/);
    if(m)return 'https://www.youtube.com/embed/'+m[1];
    m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    if(m)return 'https://player.vimeo.com/video/'+m[1];
    m=u.match(/loom\.com\/share\/([\w-]+)/);
    if(m)return 'https://www.loom.com/embed/'+m[1];
    return null;
  }catch(e){return null;}
}

// ── PUSH NOTIFICATION SETTINGS ──
function loadNotifPrefs(){
  const defaults={
    enabled:false,
    appointmentReminder:true,
    appointmentDay:true,
    homecareReminder:true,
    summaryReady:true,
    messagereply:true,
    quietStart:'21:00',
    quietEnd:'08:00',
  };
  // Merge saved values OVER the defaults rather than returning the saved object directly
  // a prefs object written by an older version may be missing newer keys, which would
  // otherwise come back undefined (e.g. an undefined quietStart breaks quiet-hours logic).
  try{const s=localStorage.getItem('notif_prefs');if(s){const saved=JSON.parse(s);if(saved&&typeof saved==='object')return Object.assign(defaults,saved);}}catch(e){}
  return defaults;
}
function saveNotifPrefs(prefs){
  try{localStorage.setItem('notif_prefs',JSON.stringify(prefs));}catch(e){}
  _syncClientPrefsToServer();
}
function toggleNotif(key){
  const p=loadNotifPrefs();
  p[key]=!p[key];
  saveNotifPrefs(p);

function _visibleSummaries(){

// Turn URLs in a message into clickable links. Escapes every non-URL part (XSS-safe) and only
// linkifies http(s)/www URLs that pass _safeUrl, so a message like "see slickchart.app/x" is tappable.
function _linkifyMsg(text){
  const s=String(text||'');
  const re=/(https?:\/\/[^\s<]+|www\.[^\s<]+)/gi;
  let out='',last=0,m;
  while((m=re.exec(s))){
    out+=_txt(s.slice(last,m.index));
    let url=m[0],trail='';
    const tm=url.match(/[.,;:!?)]+$/);if(tm){trail=tm[0];url=url.slice(0,url.length-trail.length);}
    const href=/^https?:\/\//i.test(url)?url:('https://'+url);
    const safe=(typeof _safeUrl==='function')?_safeUrl(href):href;
    out+= safe
      ? `<a href="${_urlAttr(safe)}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:underline;word-break:break-all;">${_txt(url)}</a>`
      : _txt(url);
    out+=_txt(trail);
    last=m.index+m[0].length;
  }
  out+=_txt(s.slice(last));
  return out;
}

function sendClientMsg(imgArg){
  const inp=document.getElementById('cinput');
  let text=(inp&&inp.value.trim())||'';
  let imgs=Array.isArray(imgArg)?imgArg:(imgArg?[imgArg]:[]);
  if(!text&&!imgs.length)return;
  // A chat message has a natural length; an extremely long one is almost always an
  // accidental paste and would bloat local storage / risk a failed sync. Cap it generously.
  const MAX=5000;
  if(text.length>MAX){text=text.slice(0,MAX);if(typeof showToast==='function')showToast('Message shortened to '+MAX+' characters');}
  // Photos are downscaled small, but cap how many ride in one message so a big multi-select
  // can't push the sync payload past the server's size limit (which would fail the send).
  const MAXP=6;
  if(imgs.length>MAXP){imgs=imgs.slice(0,MAXP);if(typeof showToast==='function')showToast('Sent the first '+MAXP+' photos, send the rest in another message');}
  // Text and photos both reach the provider now, so any real message gets a live delivery
  // status + retry, the client can see whether it actually landed.
  const track=!!(client._real&&(text||imgs.length));
  const msg={_id:'cm'+(++_clientMsgSeq),from:'me',text,imgs,time:'Just now',status:track?'sending':undefined};
  messages.push(msg);
  try{_saveClientMessages();}catch(e){}
  if(inp){inp.value='';inp.style.height='auto';}
  renderMessages();
  if(track)_deliverClientMsg(msg);
}
let _clientMsgSeq=0;
// Deliver a client text message and reflect the real outcome in its bubble. _clientSubmit
// retries a network blip itself; here we also handle the per-kind in-flight guard (a second
// quick message) by re-attempting a few times before giving up.
function _deliverClientMsg(msg,attempt){
  attempt=attempt||0;
  // Stable idempotency key per message, persisted on the bubble — so a MANUAL "tap to retry" (a fresh
  // _deliverClientMsg call) reuses the same key instead of minting a new one. Without this, retrying a
  // message the server already stored (but whose response was lost) delivered it to the provider twice.
  if(!msg._idem){try{msg._idem=(self.crypto&&crypto.randomUUID)?crypto.randomUUID():(Date.now().toString(36)+Math.random().toString(36).slice(2));}catch(e){msg._idem=Date.now().toString(36)+Math.random().toString(36).slice(2);}try{_saveClientMessages();}catch(_){}}
  // Lock per message id (not just per kind 'message') so a second quickly-sent message doesn't dedupe
  // against the first still in flight — otherwise it'd exhaust its retries and show a false "Not delivered".
  _clientSubmit('message',{text:msg.text||'',photos:(msg.imgs||[]),_lock:(msg._id||('m'+(++_clientMsgSeq))),_idem:msg._idem}).then(function(res){
    if(res&&res.duplicate&&attempt<4){setTimeout(function(){_deliverClientMsg(msg,attempt+1);},1200);return;}
    msg.status=(res&&res.ok)?'sent':'failed';
    try{_saveClientMessages();}catch(e){}
    if(document.getElementById('chat-body'))renderMessages();
  }).catch(function(){
    msg.status='failed';try{_saveClientMessages();}catch(e){}
    if(document.getElementById('chat-body'))renderMessages();
  });
}
function retryClientMsg(id){
  const msg=messages.find(function(m){return m._id===id;});if(!msg)return;
  msg.status='sending';try{_saveClientMessages();}catch(e){}
  if(document.getElementById('chat-body'))renderMessages();
  _deliverClientMsg(msg);
}

// ── PRE-VISIT CHECK-IN (data-driven, per provider) ──
// Each provider defines client.providers[].checkin = {steps:[{title,questions:[...]}]}.
// Question types: boolean (yes/no + optional detail), iconChoice (option grid, optional custom), notes (textarea).
let checkinAnswers={};
let checkinStep=0;

function _ciSteps(){
  // Use the provider's own saved check-in config (what they built in their editor)
  // whenever we have it, both for the connected demo provider AND for real client
  // links (client._real). Previously this only checked .connected, so real clients
  // fell through to the hardcoded default steps and saw drink options the provider
  // had actually removed.
  if(activeProvider().connected||client._real){
    const cfg=loadClientCheckinCfg();
    if(cfg)return _ciStepsFromCfg(cfg);
  }
  return (activeProvider().checkin&&activeProvider().checkin.steps)||[];
}
// The client can mark this as their first visit (opt-in — we never assume it, because on a
// brand-new account even long-time returning clients have no visit history on file yet, so an
// empty record is NOT a reliable "new client" signal). When they do, the "since your last visit"
// framing is dropped: the step is retitled, a friendly note is shown, and each question loses its
// "since your last visit / since last time" clause so nothing reads as if there were a prior visit.
function _ciFirstVisit(){return checkinAnswers&&checkinAnswers._firstVisit==='yes';}
function _ciStripSinceLast(lbl){
  return String(lbl||'')
    .replace(/,?\s*since (?:your |we )?last (?:visit|time|appointment|session)\b/ig,'')
    .replace(/,?\s*since (?:we )?last (?:met|saw you)\b/ig,'')
    .replace(/,?\s*since last time\b/ig,'')
    .replace(/\s{2,}/g,' ')
    .replace(/\s+([?.!,])/g,'$1')
    .trim();
}
function _ciStepsFromCfg(cfg){
  const steps=[];
  const fv=_ciFirstVisit();
  const qs=(cfg.skinQ||[]).filter(q=>q.on!==false).map(q=>{const o={type:'boolean',id:q.id,label:fv?_ciStripSinceLast(q.label):q.label,detailPh:'Add any details for '+_txt(client.providerFirst)+'...'};if(fv)o.noLabel='No';return o;});
  if(qs.length)steps.push({title:fv?'A few quick questions':'Since your last visit',id:'updates',questions:qs,firstVisitToggle:true,note:fv?('This is your first visit with '+_txt(client.providerFirst)+' — there’s no past visit to compare to, so just answer what applies and skip the rest.'):''});
  const comfort=_comfortStepFromCfg(cfg);
  if(comfort&&comfort.questions.length)steps.push(comfort);
  // Image-forward professions ask for a reference/inspiration photo before the visit.
  if(cfg.referencePhotoOn)steps.push({title:'Reference photo',id:'refphoto',questions:[{type:'photo',id:'refPhoto',label:'Share a reference or your current look (optional)',hint:'Inspiration, a photo of your current style, or anything you want '+client.providerFirst+' to see before your visit.'}]});
  if(cfg.extraNotes!==false)steps.push({title:'Anything else',id:'notes',questions:[{type:'notes',id:'notes',ph:'Questions, requests, anything on your mind...'}]});
  return steps;
}
function loadClientCheckinCfg(){
  try{const v=localStorage.getItem('sc_checkin_cfg');return v?JSON.parse(v):null;}catch(e){return null;}
}
function _comfortStepFromCfg(cfg){
  if(cfg.chairComfortOn===false)return null;   // provider removed the section
  const qs=[];
  if(cfg.drinks&&cfg.drinks.length){
    // If a saved (possibly older) config has drinks but NONE carry a temperature/sub,
    // fall back to the temperature-aware defaults so clients are still asked cold vs hot.
    const anySub=cfg.drinks.some(d=>String(d.sub||'').trim());
    const drinkOpts=anySub?cfg.drinks.map(d=>[d.emoji,d.label,d.sub||'']):CI_DRINKS;
    qs.push({type:'iconChoice',id:'drink',label:'Your drink',options:drinkOpts});
  }
  if(cfg.snacksOn&&cfg.snacks&&cfg.snacks.length)qs.push({type:'iconChoice',id:'snack',label:'Snack',options:cfg.snacks.map(s=>{const i=s.indexOf(' ');return i>0?[s.slice(0,i),s.slice(i+1)]:['🍽️',s];})});
  if(cfg.music&&cfg.music.length)qs.push({type:'iconChoice',id:'music',label:'Music',options:cfg.music.map(m=>[m.emoji,m.label]),allowCustom:cfg.musicCustom!==false,customPh:'e.g. a podcast, no music…'});
  (cfg.heat||[]).filter(h=>h.on!==false).forEach(h=>qs.push({type:'levelChoice',id:h.id,label:h.label,options:h.levels||['Off','Low','Med','High']}));
  if(cfg.blankets&&cfg.blankets.length)qs.push({type:'iconChoice',id:'covering',label:'Covering',columns:3,options:cfg.blankets.map(b=>[b.emoji,b.label])});
  return{title:cfg.chairComfortLabel||'Comfort',id:'comfort',questions:qs};
}

// ── Image helpers (downscale uploads to a shareable data URL, or accept a link) ──
// True only inside the Capacitor native shell (App Store / Play build), false on the web/PWA.
function _isNativeApp(){try{return !!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());}catch(e){return false;}}
// Native camera/library via the Capacitor Camera plugin (used only in the native app). Returns a
// downscaled dataURL, or null (cancelled / not native) so callers fall back to the web file input.
async function _ncPhotoDataUrl(fromCamera,maxW){
  try{
    if(!_isNativeApp())return null;
    const Camera=window.Capacitor.Plugins&&window.Capacitor.Plugins.Camera;
    if(!Camera||!Camera.getPhoto)return null;
    const photo=await Camera.getPhoto({quality:82,width:(maxW||1200),resultType:'dataUrl',correctOrientation:true,source:fromCamera?'CAMERA':'PHOTOS',saveToGallery:false});
    return (photo&&photo.dataUrl)||null;
  }catch(e){return null;}   // user cancelled or denied permission — no-op, caller handles fallback
}
function _pickImages(cb,capture){
  // Native app: single-shot capture goes through the OS camera plugin (proper permission prompt + a
  // real camera UI). Multi-select from the library keeps the web file input, which the webview opens
  // as the native photo picker anyway.
  if(capture&&_isNativeApp()){
    _ncPhotoDataUrl(true,1000).then(function(d){if(d)cb([d]);});
    return;
  }
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  // capture=true jumps straight to the device camera (single shot); otherwise allow picking
  // multiple from the library. Both invoke the native picker in an app-store-wrapped build.
  if(capture){inp.capture='environment';}else{inp.multiple=true;}
  inp.onchange=()=>{
    const files=Array.from(inp.files||[]);if(!files.length)return;
    const out=[];let done=0;
    files.forEach((f,idx)=>_downscaleImg(f,src=>{out[idx]=src;if(++done===files.length)cb(out.filter(Boolean));}));
  };
  inp.click();
}
function _downscaleImg(file,cb,max=900){
  // Guard against enormous files (e.g. RAW/HEIC) that can crash a mobile tab when read
  // into a base64 data URL. 25MB is generous for a photo; anything bigger is dropped.
  if(file&&file.size&&file.size>25*1024*1024){cb('');return;}
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      try{c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.72));}
      catch(_){cb(e.target.result);}
    };
    // Decode failed, return empty rather than the full-size original (which would
    // defeat downscaling and could bloat storage). Callers drop empty results.
    img.onerror=()=>cb('');
    img.src=e.target.result;
  };
  // File read failed, must still call back, or a batch upload's completion counter
  // never advances and the whole "add photos" flow hangs silently forever.
  r.onerror=()=>cb('');
  r.readAsDataURL(file);
}

async function _doDeleteClientData(){
  const m=document.getElementById('del-data-modal');if(m)m.remove();
  const who=_txt(client.provider||'your provider');
  // Try the server delete FIRST and only proceed if it succeeded, otherwise we'd wipe this
  // device (and the retry token with it) while the provider-side records + notification never
  // happened, yet tell the client "deleted". On failure, keep everything and let them retry.
  if(client._real&&client._token){
    let ok=false;
    try{const r=await fetch('/api/client-delete?t='+encodeURIComponent(client._token),{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});ok=!!(r&&r.ok);}catch(e){ok=false;}
    if(!ok){if(typeof showToast==='function')showToast('Couldn’t reach the server to delete your data, please check your connection and try again',false);return;}
  }
  // Unsubscribe this device from push.
  try{ if('serviceWorker'in navigator){ const reg=await navigator.serviceWorker.ready; const sub=await reg.pushManager.getSubscription(); if(sub){try{await sub.unsubscribe();}catch(_){}} } }catch(e){}
  // Wipe local data on this device.
  try{ Object.keys(localStorage).filter(function(k){return k.indexOf('sc_')===0||k==='notif_prefs';}).forEach(function(k){localStorage.removeItem(k);}); }catch(e){}
  // Confirmation screen.
  try{
    document.getElementById('tt').textContent='Data Deleted';
    const nv=document.querySelector('.nav');if(nv)nv.style.display='none';
    S.innerHTML='<div style="padding:64px 26px;text-align:center;color:var(--c-mut);"><div style="font-size:34px;margin-bottom:14px;">✅</div><div style="font-size:17px;font-weight:700;color:var(--c-ink);margin-bottom:8px;">Your data has been deleted</div><div style="font-size:13px;line-height:1.6;max-width:300px;margin:0 auto 8px;">We’ve deleted your personal info and submissions from SlickChart, turned off notifications, and let '+who+' know. You can close this page.</div><div style="font-size:12px;color:var(--c-mut);line-height:1.55;max-width:300px;margin:0 auto;">Changed your mind later? Just ask '+who+' to resend your link.</div></div>';
  }catch(e){}

// Reference-photo reordering. The old version used HTML5 drag-and-drop (draggable/ondragstart),
// which simply does not fire on mobile touch — so on a phone the photos couldn't be dragged at all.
// This uses Pointer Events (touch + mouse), tracking the tile under the finger via elementFromPoint
// and reordering on release. Works the same on phone and desktop; no arrow buttons needed.
let _ciReorder=null;
function _ciTileAt(x,y){const el=document.elementFromPoint(x,y);return el?el.closest('[data-ci-photo]'):null;}
function ciPtrDown(qid,i,ev){
  if(ev.button!==undefined&&ev.button!==0)return;   // primary button / touch only
  const tile=ev.currentTarget;
  _ciReorder={qid,from:i,startX:ev.clientX,startY:ev.clientY,moved:false,tile};
  try{tile.setPointerCapture(ev.pointerId);}catch(_){}
}
function ciPtrMove(ev){
  if(!_ciReorder)return;
  const dx=ev.clientX-_ciReorder.startX,dy=ev.clientY-_ciReorder.startY;
  if(!_ciReorder.moved&&(Math.abs(dx)+Math.abs(dy))<6)return;   // ignore tiny jitters (still a tap)
  _ciReorder.moved=true;
  ev.preventDefault();
  _ciReorder.tile.style.opacity='.55';
  const t=_ciTileAt(ev.clientX,ev.clientY);
  document.querySelectorAll('[data-ci-photo]').forEach(el=>{el.style.outline='';el.style.outlineOffset='';});
  if(t&&t!==_ciReorder.tile){t.style.outline='2px solid var(--accent)';t.style.outlineOffset='1px';}
}
function ciPtrUp(ev){
  if(!_ciReorder)return;
  const r=_ciReorder;_ciReorder=null;
  try{r.tile.releasePointerCapture(ev.pointerId);}catch(_){}
  r.tile.style.opacity='';
  document.querySelectorAll('[data-ci-photo]').forEach(el=>{el.style.outline='';el.style.outlineOffset='';});
  if(!r.moved)return;   // no real drag — leave it as a tap
  const t=_ciTileAt(ev.clientX,ev.clientY);if(!t)return;
  const qid=t.getAttribute('data-ci-photo'),to=parseInt(t.getAttribute('data-idx'),10);
  if(qid!==r.qid||isNaN(to)||to===r.from)return;
  const a=checkinAnswers[r.qid+'Photos']||[];const[m]=a.splice(r.from,1);a.splice(to,0,m);
  _renderCheckinStep();
}

function _ciBuildPayload(){
  const groups=[];const flagged=[];let notes='';let photos=[];
  _ciSteps().forEach(st=>{
    const rows=[];
    (st.questions||[]).forEach(q=>{
      if(q.type==='boolean'){
        const yes=checkinAnswers[q.id]==='yes';
        rows.push({label:q.label,value:yes?'Yes':(_ciFirstVisit()?'No':'No changes'),detail:yes?(checkinAnswers[q.id+'Detail']||''):'',flagged:yes});
        if(yes)flagged.push((q.flagLabel||q.label||'').replace(/\?$/,''));
      }else if(q.type==='iconChoice'){
        const v=checkinAnswers[q.id];let val='—';
        if(v===-1)val=checkinAnswers[q.id+'Custom']||'Something else';
        else if(typeof v==='number'&&q.options&&q.options[v])val=q.options[v][1]+(q.options[v][2]?' ('+q.options[v][2]+')':'');
        rows.push({label:q.label,value:val,flagged:false});
      }else if(q.type==='levelChoice'){
        const opts=q.options||['Off','Low','Med','High'];
        rows.push({label:q.label,value:checkinAnswers[q.id]||opts[0],flagged:false});
      }else if(q.type==='notes'){
        notes=checkinAnswers[q.id]||'';
        photos=(photos||[]).concat(checkinAnswers[q.id+'Photos']||[]);
      }else if(q.type==='photo'){
        photos=(photos||[]).concat(checkinAnswers[q.id+'Photos']||[]);
      }
    });
    if(st.id==='updates'&&_ciFirstVisit())rows.unshift({label:'Visit type',value:'First visit',flagged:false});
    if(rows.length)groups.push({title:st.title,rows});
  });
  return{groups,flagged,notes,photos,firstVisit:_ciFirstVisit()};
}

let rebookState={date:null,time:null,treatment:client.treatment,note:''};

// Per-day availability (mirrors provider business hours)
const REBOOK_DAYKEYS=['sun','mon','tue','wed','thu','fri','sat'];
function normalizeAvail(a){
  const keys=['mon','tue','wed','thu','fri','sat','sun'];
  const def={};keys.forEach(d=>def[d]={open:d!=='sun',start:'09:00',end:'17:00'});
  if(!a)return def;
  if(a.days&&!a.mon){const out={};keys.forEach(d=>out[d]={open:!!a.days[d],start:a.start||'09:00',end:a.end||'17:00'});return out;}
  const out={};keys.forEach(d=>out[d]=(a[d]&&typeof a[d]==='object')?{open:!!a[d].open,start:a[d].start||'09:00',end:a[d].end||'17:00'}:def[d]);return out;
}
let rebookAvail=null;
function rebookHourlySlots(dayObj){
  if(!dayObj||!dayObj.open)return[];
  // Parse real hours AND minutes (the provider can open/close on the :30). parseInt dropped the minutes,
  // so a 9:30 open offered a pre-open 9:00 slot and a 17:30 close dropped the 5:00 slot.
  const pm=s=>{const m=String(s||'').match(/^(\d{1,2}):(\d{2})/);return m?(+m[1])*60+(+m[2]):NaN;};
  let startMin=pm(dayObj.start),endMin=pm(dayObj.end);
  if(!isFinite(startMin))startMin=9*60;
  if(!isFinite(endMin))endMin=17*60;
  // Hours that close at/after midnight (end <= start, e.g. 2 PM–12 AM) are evening/overnight: roll the
  // close to the next day. The old code collapsed these to a hardcoded 9–5, offering a full set of morning
  // slots the provider never works and hiding the real evening availability.
  if(endMin<=startMin)endMin+=24*60;
  const slots=[];
  // Whole-hour start times at/after opening (round a :30 open UP so no pre-open slot) and before close
  // (a :30 close still offers the preceding whole hour).
  for(let t=Math.ceil(startMin/60)*60;t<endMin;t+=60){const h=Math.floor(t/60)%24;let hr=h%12;if(hr===0)hr=12;slots.push(`${hr}:00 ${h<12?'AM':'PM'}`);}
  return slots;
}
function rebookTimeBtnHTML(t){
  const on=rebookState.time===t;
  return`<button onclick="rebookState.time='${t}';document.querySelectorAll('.time-btn').forEach(b=>{b.style.background=b.textContent==='${t}'?'var(--accent)':'#fff';b.style.color=b.textContent==='${t}'?'#fff':'#54645e';b.style.borderColor=b.textContent==='${t}'?'var(--accent)':'#d9e7e1';})" class="time-btn" style="border:1.5px solid ${on?'var(--accent)':'#d9e7e1'};background:${on?'var(--accent)':'#fff'};color:${on?'#fff':'#54645e'};border-radius:8px;padding:9px 4px;font-size:12px;cursor:pointer;font-weight:500;">${t}</button>`;
}
function refreshRebookTimes(){
  const c=document.getElementById('rebook-times');if(!c||!rebookAvail)return;
  let dayObj=null;
  if(rebookState.date){const wd=new Date(rebookState.date+'T12:00:00').getDay();dayObj=rebookAvail[REBOOK_DAYKEYS[wd]];}
  const slots=dayObj?rebookHourlySlots(dayObj):[];
  if(rebookState.time&&!slots.includes(rebookState.time))rebookState.time=null;
  c.innerHTML=slots.length?slots.map(rebookTimeBtnHTML).join(''):`<div style="grid-column:1/-1;text-align:center;font-size:12px;color:var(--c-mut);padding:12px;">Pick a date above to see available times</div>`;

  const _base=(client._real)?new Date():new Date('2026-07-18T12:00:00');

let lastBookingId=null;
function submitRebook(){

    time:rebookState.time,

  };
  lastBookingId=booking.id;
  const _showRebookSent=()=>{
    S.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:24px;text-align:center;">

      <div id="rebook-status" style="background:var(--c-surf3);border:1.5px solid #f0e2c8;border-radius:10px;padding:10px 14px;margin:12px 0;font-size:13px;color:var(--c-mut);line-height:1.5;display:flex;align-items:center;gap:8px;">

      </div>
      <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px;margin-top:12px;">
        <button class="btnp" style="border-radius:10px;" onclick="nav('home')">Back to home</button>
      </div>
    </div>`;
  };
  if(prov.connected){
    // real cross-app flow → lands in the provider app's inbox
    SlickBridge.upsertBooking(booking);
    SlickBridge.post('booking-request',booking);
    _showRebookSent();
    return;
  }
  if(client._real){
    // Confirm the request actually reached the server before telling them it's sent.
    S.innerHTML=_sendingHTML('Sending your request…');
    _clientSubmit('booking',{treatment:booking.treatment,date:booking.date,dateLabel:booking.dateLabel,time:booking.time,note:booking.note,client:client.name})
      .then(function(res){
        if(res&&res.duplicate)return;
        if(res&&res.ok!==false)_showRebookSent();
        else S.innerHTML=_submitFailedHTML('submitRebook()',"Couldn't send your request");
      });
    return;
  }
  // demo provider (no live provider app) → simulate a confirmation shortly after
  setTimeout(()=>{
    const p=client.providers.find(x=>x.id===booking.providerId);if(!p)return;
    p.nextDate=new Date(booking.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    p.nextTime=booking.time;p.treatment=booking.treatment;

    // hourly countdown use the actual time rather than a hardcoded noon. _timeTo24ISO returns
    // HHMMSS; fall back to noon only when the display time can't be parsed.
    (function(){var _t=_timeTo24ISO(booking.time);var _hm=/^\d{6}$/.test(_t)?(_t.slice(0,2)+':'+_t.slice(2,4)+':00'):'12:00:00';p.apptISO=booking.date+'T'+_hm;})();

    // above (which carries this booking's real local time) instead of preferring stale values.
    p.nextDateISO='';p.nextTimeISO='';if(client.activeProviderId===p.id){client.nextDateISO='';client.nextTimeISO='';}
    if(client.activeProviderId===p.id){client.nextDate=p.nextDate;client.nextTime=p.nextTime;client.treatment=p.treatment;updateRebookStatusPill('<i class="ti ti-circle-check" style="font-size:15px;"></i> Confirmed! Added to your appointments.','#f0fff5','#c0e8d0','#2a6a4a');}

  },2600);
  _showRebookSent();

// ── Real image capture, downscaling, and on-device pixel analysis ──
function _downscaleImage(file,maxDim,cb){
  if(file&&file.size&&file.size>25*1024*1024){cb('');return;}
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;const scale=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*scale);h=Math.round(h*scale);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    try{cb(cv.toDataURL('image/jpeg',0.78));}catch(err){cb(e.target.result);}
  };img.onerror=()=>cb('');img.src=e.target.result;};
  r.onerror=()=>cb('');r.readAsDataURL(file);
}
// Real measurements computed from the actual pixels (runs on-device; the hosted vision model layers on top of these)
function _imgMeasures(dataURL){return new Promise(res=>{
  if(!dataURL)return res(null);
  const img=new Image();img.onload=()=>{

      <button onclick="event.preventDefault();event.stopPropagation();markGuideRead('${gk}')" aria-label="${read?'Mark as unread':'Mark as read'}" style="width:26px;height:26px;border-radius:50%;border:2px solid ${read?'var(--accent)':'#e0d5c8'};background:${read?'var(--accent)':'#fff'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">${read?'<i class="ti ti-check" aria-hidden="true" style="font-size:13px;color:#fff;"></i>':''}</button>
