<style>
*{box-sizing:border-box;margin:0;padding:0;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
:root{
  --accent:#C8A882;--accent-2:#2C5F8A;--accent-ink:#1a1208;
  --accent-tint:#2a231b;--accent-tint2:#3c3227;
  --accent-lt:#f5ede3;--accent-lt2:#f5e6d3;
  --accent-a20:rgba(200,168,130,.125);--accent-a30:rgba(200,168,130,.19);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0eb;display:flex;justify-content:center;padding:24px 0 48px;min-height:100vh;}
.shell{width:390px;background:#fff;border-radius:24px;border:1px solid #e8e0d8;overflow:hidden;min-height:720px;display:flex;flex-direction:column;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.08);}
@media (max-width:480px){
  html,body{height:100%;}
  body{padding:0;min-height:100%;background:#fff;overflow:hidden;}
  .shell{width:100%;max-width:100%;height:100vh;height:100dvh;min-height:0;border-radius:0;border:none;box-shadow:none;}
}
/* No fake phone status bar. In a standalone (installed) PWA the real OS status bar overlays the
   top, so the topbar pads by the safe-area inset to sit just below it; in a normal browser tab the
   inset is 0 and it reads as an ordinary header. */
.topbar{background:#fff;padding:calc(10px + env(safe-area-inset-top,0px)) 16px 13px;border-bottom:1px solid #f0ebe4;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo i{font-size:15px;color:#fff;}
#tt{font-size:17px;font-weight:500;color:#1a1a1a;flex:1;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-lt2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;border:1.5px solid #e8d5c0;}
main.scr{flex:1;overflow-y:auto;padding-bottom:72px;}
main.scr::-webkit-scrollbar{display:none;}
nav.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0ebe4;display:flex;padding:6px 0 12px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px 0;border:none;background:none;min-height:44px;justify-content:center;}
.ni i{font-size:18px;color:#82715f;}
.ni span{font-size:10px;color:#82715f;font-weight:500;}
.ni.active i,.ni.active span{color:var(--accent);}
.ni:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
.card{background:#fff;border:1px solid #f0ebe4;border-radius:14px;margin:0 16px 10px;padding:16px;cursor:pointer;}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.sh{padding:14px 16px 7px;}
.swipe-card{transition:transform .2s;touch-action:pan-y;position:relative;z-index:1;}
.swipe-reveal{position:absolute;right:0;top:0;bottom:0;width:80px;z-index:0;background:#e6f4ec;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border-radius:0 13px 13px 0;}
.swipe-reveal i{font-size:18px;color:#2e9e6b;}
.swipe-reveal span{font-size:10px;color:#2e9e6b;font-weight:700;letter-spacing:.04em;}
.sh h2{font-size:11px;font-weight:600;color:#786858;text-transform:capitalize;letter-spacing:.06em;}
.btnp{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
.btnp:focus-visible{outline:2px solid #9a7d5e;outline-offset:2px;}
.btng{background:#fff;border:1.5px solid #e8ddd3;border-radius:10px;padding:10px 14px;font-size:13px;color:#6b5d52;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.btng:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.back{background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;font-weight:500;display:flex;align-items:center;gap:4px;padding:0;min-height:44px;}
.back:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
.pill-row{display:flex;gap:6px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;}
.pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;border:1.5px solid #e8ddd3;color:#6b5d52;background:#fff;cursor:pointer;white-space:nowrap;font-weight:500;}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
/* font-size must be >=16px: iOS Safari auto-zooms the viewport when a focused field is smaller,
   which was the "screen zooms in" when tapping into a field. Many fields set a smaller inline
   font-size, and only !important beats an inline style, nothing here needs controls above 16px. */
input,textarea,select{font-size:16px!important;}
.fi{width:100%;background:#faf7f4;border:1.5px solid #e8ddd3;border-radius:10px;padding:10px 12px;font-size:16px;color:#1a1a1a;font-family:inherit;}
.fi:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent);}
.tag{font-size:12px;padding:5px 12px;border-radius:20px;background:var(--accent-lt);color:#8b6b4a;border:none;font-weight:500;display:inline-block;}
.divider{height:1px;background:#f0ebe4;margin:0 16px;}
/* Progress bar */
.prog-track{height:6px;background:#f0ebe4;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#e0b88a);}
/* Countdown ring */
.ring-wrap{position:relative;width:80px;height:80px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-wrap .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
/* Message bubbles */
.bub-them{background:#f5f0eb;color:#1a1a1a;border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;font-size:13px;line-height:1.6;align-self:flex-start;overflow-wrap:break-word;}
.bub-me{background:var(--accent);color:#fff;border-radius:16px;border-bottom-right-radius:4px;padding:10px 14px;font-size:13px;line-height:1.6;align-self:flex-end;overflow-wrap:break-word;}
/* Check circle */
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid #e8ddd3;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.check-circle.done{background:var(--accent);border-color:var(--accent);}
.check-circle.done i{color:#fff;}
/* Stat card */
.stat{background:#faf7f4;border-radius:12px;padding:12px 14px;flex:1;}
/* Skin score arc */
.score-arc{position:relative;width:120px;height:64px;overflow:hidden;}
.score-arc svg{position:absolute;top:0;left:0;}
@media print{
  .sb,.topbar,.nav,#client-notif-bell,.no-print{display:none !important;}
  .shell{box-shadow:none !important;border:none !important;border-radius:0 !important;width:100% !important;max-width:100% !important;height:auto !important;overflow:visible !important;}
  #S{overflow:visible !important;height:auto !important;}
  body{background:#fff !important;}
}
#sc-demo-banner{position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(90deg,#2a231b,#1a1208);border-bottom:1px solid #3c3227;color:#f3ecdf;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:12px;padding:9px 14px;flex-wrap:wrap;text-align:center;}#sc-demo-banner b{color:#C8A882;}#sc-demo-banner button{background:none;border:1px solid #6b5d45;color:#C8A882;border-radius:20px;padding:4px 12px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;}#sc-demo-banner button:hover{border-color:#C8A882;}html,body{height:100%;margin:0;}.shell{height:100vh !important;max-height:100vh !important;min-height:0 !important;}
</style>

<script>
/* DEMO ISOLATION: this public demo shares its origin with the real app, so without this it would
   read (and "Reset" would wipe) a logged-in provider's REAL data from localStorage. Replace storage
   with an in-memory store and flag demo mode so the app skips login/Cloud and shows sample data. */
(function(){try{
  window.__SC_DEMO__=true;
  var mem=Object.create(null);
  var shim={
    getItem:function(k){k=String(k);return (k in mem)?mem[k]:null;},
    setItem:function(k,v){mem[String(k)]=String(v);},
    removeItem:function(k){delete mem[String(k)];},
    clear:function(){mem=Object.create(null);},
    key:function(i){return Object.keys(mem)[i]||null;}
  };
  try{Object.defineProperty(shim,"length",{get:function(){return Object.keys(mem).length;}});}catch(e){}
  try{Object.defineProperty(window,"localStorage",{configurable:true,get:function(){return shim;}});}catch(e){}
}catch(e){}})();
</script>
<div id="sc-demo-banner">
  <span>🧪 <b>Live demo</b> — viewing as client Maya Rodriguez, connected to Glowing Skin Studio.</span>
  <button onclick="scResetDemo()">Reset demo</button>
</div>
<script>
function scResetDemo(){try{Object.keys(localStorage).filter(function(k){return k.indexOf("sc_")===0;}).forEach(function(k){localStorage.removeItem(k);});}catch(e){}location.reload();}
</script>
<div class="shell">

    </button>

<script>
const S=document.getElementById('S');

/* ════════════════════════════════════════════════════════════════
   SLICKBRIDGE, cross-app channel (provider tab ⇆ client tab)
   Uses localStorage for persistence + storage events + BroadcastChannel
   for live delivery between the two SlickChart apps on the same origin.
   ════════════════════════════════════════════════════════════════ */
const SlickBridge=(function(){
  const K_BOOKINGS='sc_bookings';
  const K_AVAIL='sc_availability';
  const K_BUS='sc_bus';
  const handlers={};
  let bc=null;
  try{bc=new BroadcastChannel('slickchart');}catch(e){bc=null;}

  function read(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
  function write(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

  function emit(type,payload){
    (handlers[type]||[]).forEach(fn=>{try{fn(payload);}catch(e){console.warn(e);}});
  }
  let _seen=null;
  try{const cur=read(K_BUS,null);if(cur&&cur.id)_seen=cur.id;}catch(e){}
  function _ingest(m){if(!m||!m.id||m.id===_seen)return;_seen=m.id;emit(m.type,m.payload);}
  function post(type,payload){
    const msg={type,payload,t:Date.now(),id:'m'+Math.random().toString(36).slice(2)};
    _seen=msg.id;                     // our own echo won't re-fire
    write(K_BUS,msg);                 // fires 'storage' in OTHER tabs
    if(bc){try{bc.postMessage(msg);}catch(e){}}  // live in other tabs
    emit(type,payload);               // local same-tab listeners
  }
  function on(type,fn){(handlers[type]=handlers[type]||[]).push(fn);}

  // Inbound from other tab via storage event
  window.addEventListener('storage',e=>{
    if(e.key===K_BUS&&e.newValue){
      try{_ingest(JSON.parse(e.newValue));}catch(_){}
    }
  });
  // Inbound from other tab via BroadcastChannel
  if(bc)bc.onmessage=e=>{_ingest(e.data);};
  // Fallback: storage/BroadcastChannel don't fire reliably between locally-opened files, so poll the shared bus too (deduped by id)
  setInterval(()=>{try{_ingest(read(K_BUS,null));}catch(e){}},700);

  return{
    post,on,
    getBookings:()=>read(K_BOOKINGS,[]),
    setBookings:(arr)=>write(K_BOOKINGS,arr),
    upsertBooking(b){const all=read(K_BOOKINGS,[]);const i=all.findIndex(x=>x.id===b.id);if(i>=0)all[i]=b;else all.unshift(b);write(K_BOOKINGS,all);return b;},
    getAvailability:()=>read(K_AVAIL,null),
  };
})();

/* Shared URL helpers, provider-supplied product/guide/site URLs reach the client via
   sync, so treat them as untrusted: block unsafe schemes, prefix bare domains, and
   escape for the href="" attribute and for display text. */
function _safeUrl(u){
  u=String(u||'').trim();if(!u)return'';
  if(/^[a-z][a-z0-9+.-]*:/i.test(u)&&!/^https?:\/\//i.test(u))return'';   // reject javascript:, data:, file:, ...
  return /^https?:\/\//i.test(u)?u:'https://'+u;
}
function _urlAttr(u){return String(u||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Safe <img src> value: only allow data:image/* and http(s) URLs (blocks a crafted
// javascript:/other scheme sneaking through a data field), and escape it so a stray
// quote can't break out of the src="…" attribute.
function _imgSrc(u){u=String(u||'').trim();if(!u)return'';if(!/^data:image\//i.test(u)&&!/^https?:\/\//i.test(u)&&!/^blob:/i.test(u))return'';return _urlAttr(u);}
function _txt(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Day-of-month with an ordinal suffix: 1->1st, 2->2nd, 11->11th, 21->21st, etc.
function _ordDay(d){d=parseInt(d,10);if(!d)return String(d);const t=d%100;if(t>=11&&t<=13)return d+'th';switch(d%10){case 1:return d+'st';case 2:return d+'nd';case 3:return d+'rd';default:return d+'th';}}
// Add an ordinal suffix to the day-of-month inside an already-formatted date string so clients see
// "July 11th" rather than "July 11". Matches a month name followed by a 1-2 digit day and rewrites
// just the day; leaves 4-digit years and everything else untouched. Safe to run on any date string
// (idempotent — a day that already ends in st/nd/rd/th is skipped).
const _MONTHS_RE=/\b(Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:t(?:ember)?)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+(\d{1,2})(?!\d)(?!\s*(?:st|nd|rd|th))/gi;
function _ordinalize(s){if(s==null)return s;return String(s).replace(_MONTHS_RE,function(m,mon,day){return mon+' '+_ordDay(day);});}
// Escape + ordinalize, for rendering a client-facing date string.
function _dt(s){return _txt(_ordinalize(s));}
// Emoji-safe initials (first letter of the first two words). Uses Array.from so a name with
// an emoji or other multi-byte character yields a whole glyph, not a broken half-surrogate.
function _initialsOf(name){var parts=String(name==null?'':name).trim().split(/\s+/).filter(Boolean);var ini=parts.slice(0,2).map(function(w){return Array.from(w)[0]||'';}).join('');return (ini||'?').toUpperCase();}
// Convert a display time like "2:30 PM" to the HHMMSS form _apptParts expects, so a booked
// appointment's calendar event lands at the real time rather than the noon fallback. Returns
// '' for anything unparseable (callers then fall back to the existing behavior).
function _timeTo24ISO(t){var m=String(t==null?'':t).trim().match(/^(\d{1,2}):(\d{2})\s*([AaPp][Mm])?$/);if(!m)return '';var h=parseInt(m[1],10),mi=parseInt(m[2],10),ap=(m[3]||'').toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;if(h<0||h>23||mi<0||mi>59)return '';return String(h).padStart(2,'0')+String(mi).padStart(2,'0')+'00';}
// Escape a value for safe placement inside a single-quoted JS string in an inline handler
// (onclick="fn('…')"). Backslash MUST be escaped first, otherwise a name like  x\'+code+'
// would slip an apostrophe through and break out of the string. Also neutralizes < so a
// stray closing script tag in the data can't terminate the surrounding block.
function _jsAttr(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,'\\n').replace(/\r/g,'').replace(/</g,'\\x3c');}
// Time-of-day greeting based on the client's own device clock.
function _greeting(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';}

/* ════════════════════════════════════════════════════════════════
   PUSH ENGINE, real Web Notifications API with graceful fallback.
   Fires a true system notification when permission is granted and the
   tab is backgrounded; otherwise shows an in-app push-style banner.
   Always records to the in-app notification center (the bell).
   ════════════════════════════════════════════════════════════════ */
const Push=(function(){
  const supported=typeof window!=='undefined'&&'Notification'in window;
  function permission(){return supported?Notification.permission:'unsupported';}
  async function request(){
    if(!supported)return 'unsupported';
    try{
      let p=Notification.permission;
      if(p==='default')p=await Notification.requestPermission();
      return p;
    }catch(e){return 'blocked';}
  }
  function inQuietHours(prefs){
    if(!prefs||!prefs.quietStart||!prefs.quietEnd)return false;
    const now=new Date();const cur=now.getHours()*60+now.getMinutes();
    const[sh,sm]=prefs.quietStart.split(':').map(Number);
    const[eh,em]=prefs.quietEnd.split(':').map(Number);
    const start=sh*60+sm,end=eh*60+em;
    return start<end ? (cur>=start&&cur<end) : (cur>=start||cur<end); // overnight wrap
  }
  function fireSystem(title,body,onclick){
    try{
      const n=new Notification(title,{body,tag:'slickchart',icon:'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="%23C8A882"/%3E%3C/svg%3E'});
      n.onclick=()=>{window.focus();if(onclick)onclick();n.close();};
      return true;
    }catch(e){return false;}
  }
  return{supported,permission,request,inQuietHours,fireSystem};
})();

// ── Web Push subscription (real notifications when the app is closed) ──
// Public VAPID key, safe to embed (it's only the public half). It MUST match the
// VAPID_PUBLIC_KEY env var on the server, or the browser's push service rejects the sub.
const VAPID_PUBLIC_KEY='BI0MVqsF4ydcwZFAAoz1sOu3Cu7foQIAvnQ56SkbvMYAGZEs2XbyOvjPeT-YpMRpF0Z-wMJ5ITyCSl0g73mQ25M';
function _urlB64ToUint8(base64){
  const pad='='.repeat((4-(base64.length%4))%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b);const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
  return arr;
}
// Subscribe this device for push and register it with the server. Safe to call repeatedly:
// it reuses an existing subscription and only runs for a real, signed-in client with
// notification permission already granted.
async function _subscribePush(){
  try{
    if(!client._real||!client._token)return;
    if(!('serviceWorker'in navigator)||!('PushManager'in window))return;
    if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:_urlB64ToUint8(VAPID_PUBLIC_KEY)});
    }
    if(sub){

function pushNotify(o){
  // o = {type,title,body,icon,col,ic,onclick}
  const entry={id:'cn'+Date.now()+Math.random().toString(36).slice(2,5),type:o.type||'general',
    icon:o.icon||'ti-bell',col:o.col||'var(--accent-lt)',ic:o.ic||'var(--accent)',
    title:o.title,body:o.body||'',time:'Just now',read:false};
  clientNotifs.unshift(entry);
  updateClientBadge();

  const prefs=loadNotifPrefs();
  // Notifications are now a single on/off switch (no per-type toggles), so firing depends only on
  // the master enable and quiet hours.
  const allowed=o.force||(prefs.enabled&&!Push.inQuietHours(prefs));
  if(!allowed)return entry; // recorded in center, but no push/banner (off or quiet hours)

}

function initSwipe(card,i,onFullSwipe){
  if(!card||card._swipeInit)return;card._swipeInit=true;
  const W=80;
  // When a full-swipe handler is supplied (e.g. notifications), a big left-swipe slides the card
  // off and clears it outright; a small swipe still just reveals the DONE button.
  const MAXPULL=onFullSwipe?W*2.4:W+20;
  const FULL=W*1.5;
  let startX=0,startY=0,dx=0,dragging=false,opened=false,decided=false,horiz=false;
  const setX=x=>{card.style.transform='translateX('+x+'px)';};
  const open=()=>{opened=true;card.style.transition='transform .2s';card.style.transform='translateX(-'+W+'px)';};
  const close=()=>{opened=false;card.style.transition='transform .2s';card.style.transform='translateX(0px)';};
  const closeOthers=()=>{try{document.querySelectorAll('.swipe-card').forEach(el=>{if(el!==card){el.style.transition='transform .2s';el.style.transform='translateX(0px)';if(el._setClosed)el._setClosed();}});}catch(e){}};
  card._setClosed=()=>{opened=false;};
  const onStart=(x,y)=>{startX=x;startY=y;dx=opened?-W:0;dragging=true;decided=false;horiz=false;card.style.transition='none';};
  const onMove=(x,y)=>{
    if(!dragging)return;
    const mx=x-startX,my=y-startY;
    if(!decided){if(Math.abs(mx)>6||Math.abs(my)>6){decided=true;horiz=Math.abs(mx)>Math.abs(my);}else return;}
    if(!horiz){dragging=false;card.style.transition='transform .2s';setX(opened?-W:0);return;}
    let nx=(opened?-W:0)+mx;if(nx>0)nx=0;if(nx<-MAXPULL)nx=-MAXPULL;dx=nx;setX(nx);
  };
  const onEnd=()=>{
    if(!dragging)return;dragging=false;
    if(!horiz){card.style.transition='transform .2s';return;}
    if(onFullSwipe&&dx<-FULL){card.style.transition='transform .25s';card.style.transform='translateX(-120%)';setTimeout(onFullSwipe,180);return;}
    if(dx<-W/2){closeOthers();open();}else{close();}
  };
  card.addEventListener('touchstart',e=>{if(e.touches&&e.touches[0])onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{if(e.touches&&e.touches[0])onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchend',onEnd);card.addEventListener('touchcancel',onEnd);
  card.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);const mm=ev=>onMove(ev.clientX,ev.clientY);const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
}

/* ════════════════════════════════════════════════════════════════
   BRAND THEMING, client-facing screens inherit the provider's
   brand colors (set in the provider app's Branding section).
   ════════════════════════════════════════════════════════════════ */
function _hexA(hex,a){const h=hex.replace('#','');return`rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
function _srgbC(c){c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function _lumHex(hex){const h=hex.replace('#','');return 0.2126*_srgbC(parseInt(h.slice(0,2),16))+0.7152*_srgbC(parseInt(h.slice(2,4),16))+0.0722*_srgbC(parseInt(h.slice(4,6),16));}
function _cr(L1,L2){const a=Math.max(L1,L2),b=Math.min(L1,L2);return (a+0.05)/(b+0.05);}
// Pick black or white text for MAX readability on a background (WCAG contrast). The old version
// used a single brightness cutoff, which left mid-tone brand colors (a medium green, say) carrying
// hard-to-read dark text.
function _ink(hex){const L=_lumHex(hex);return _cr(L,1)>=_cr(L,0)?'#ffffff':'#181410';}
function _mixDark(hex,f){const h=hex.replace('#','');const m=(c)=>Math.round(parseInt(c,16)*f).toString(16).padStart(2,'0');return`#${m(h.slice(0,2))}${m(h.slice(2,4))}${m(h.slice(4,6))}`;}
function _mixLight(hex,wa){const h=hex.replace('#','');const f=(c)=>Math.round(parseInt(c,16)*(1-wa)+255*wa).toString(16).padStart(2,'0');return`#${f(h.slice(0,2))}${f(h.slice(2,4))}${f(h.slice(4,6))}`;}
// Guarantee a brand accent used as a solid button/fill is legible. If neither black nor white text
// clears WCAG AA (4.5:1) on the accent, deepen the accent (same hue) until white text passes, so
// any color a provider picks in Branding stays accessible instead of producing unreadable buttons.
function _readableAccent(hex){
  const ink=_ink(hex);
  const inkL=(ink==='#ffffff')?1:_lumHex('#181410');
  if(_cr(_lumHex(hex),inkL)>=4.5)return{accent:hex,ink:ink};
  let d=hex;
  for(let i=0;i<24;i++){d=_mixDark(d,0.9);if(_cr(_lumHex(d),1)>=4.5)return{accent:d,ink:'#ffffff'};}
  return{accent:d,ink:_ink(d)};
}
function loadClientBrand(){try{const s=localStorage.getItem('sc_brand_colors');if(s)return JSON.parse(s);}catch(e){}return{primary:'#C8A882',secondary:'#2C5F8A'};}
let clientBrand=loadClientBrand();
function applyClientTheme(b){
  if(b)clientBrand=b;
  // Provider brand colors arrive via sync and may be missing, malformed, or a named
  // color, any of which would make the hex math below produce "#NaNNaNNaN" (invalid
  // CSS the browser ignores, breaking every tint). Normalize to a valid 6-digit hex,
  // falling back to the default accent so the theme always renders.
  const _normHex=(c,fallback)=>{
    c=String(c==null?'':c).trim();
    if(/^#?[0-9a-fA-F]{6}$/.test(c))return c[0]==='#'?c:('#'+c);
    if(/^#?[0-9a-fA-F]{3}$/.test(c)){const x=c.replace('#','');return '#'+x[0]+x[0]+x[1]+x[1]+x[2]+x[2];}
    return fallback;
  };
  const p=_normHex(clientBrand.primary,'#C8A882'),s=_normHex(clientBrand.secondary,'#2C5F8A'),root=document.documentElement;
  // Deepen the accent if needed so text on solid buttons stays legible; tints below still derive
  // from the true brand color p, so light backgrounds keep the provider's exact hue.
  const _ra=_readableAccent(p);
  root.style.setProperty('--accent',_ra.accent);
  root.style.setProperty('--accent-2',s);
  root.style.setProperty('--accent-ink',_ra.ink);
  root.style.setProperty('--accent-tint',_mixDark(p,0.21));
  root.style.setProperty('--accent-tint2',_mixDark(p,0.30));
  root.style.setProperty('--accent-lt',_mixLight(p,0.80));
  root.style.setProperty('--accent-lt2',_mixLight(p,0.72));
  root.style.setProperty('--accent-a20',_hexA(p,0.125));
  root.style.setProperty('--accent-a30',_hexA(p,0.19));
  updateTopbarLogo();
}

  const jess=client.providers.find(p=>p.id==='jess');if(!jess)return;
  pushNotify({type:'link',icon:'ti-link',col:'var(--accent-lt)',ic:'var(--accent)',
    title:client.providerFirst+' sent you a link',body:'Tap to view your visit recap and routine, no app needed',
    onclick:()=>{client.activeProviderId='jess';applyActiveProvider();nav('welcome');}});
});

SlickBridge.on('resource-shared',d=>{
  // provider shared a guide/resource, it rides along on the client's link
  const jess=client.providers.find(p=>p.id==='jess');if(!jess||!d.resource)return;
  jess.resources=jess.resources||[];
  if(!jess.resources.some(r=>r.title===d.resource.title))jess.resources.unshift(d.resource);
  if(client.activeProviderId==='jess'&&currentScreen==='welcome')renderMagicLanding();
  pushNotify({type:'resource',icon:'ti-file-text',col:'var(--accent-lt)',ic:'var(--accent)',
    title:client.providerFirst+' shared a guide',body:d.resource.title,
    onclick:()=>{client.activeProviderId='jess';applyActiveProvider();nav('welcome');}});
});

SlickBridge.on('course-shared',d=>{
  // provider sent a full course, it appears in the client's "Your courses" area
  const jess=client.providers.find(p=>p.id==='jess');if(!jess||!d.course)return;
  jess.pendingCourses=jess.pendingCourses||[];
  const i=jess.pendingCourses.findIndex(c=>c.id===d.course.id);
  if(i>=0)jess.pendingCourses[i]=d.course;else jess.pendingCourses.unshift(d.course);
  if(client.activeProviderId==='jess'&&currentScreen==='home')renderHome();
  pushNotify({type:'course',icon:'ti-book',col:'var(--accent-lt)',ic:'var(--accent)',
    title:client.providerFirst+' shared a course',body:d.course.title,
    onclick:()=>{client.activeProviderId='jess';applyActiveProvider();_viewCourseId=d.course.id;nav('view-course');}});
});

SlickBridge.on('form-shared',d=>{
  // provider sent a consent/intake form to complete (aftercare + contraindication docs arrive as resources)
  const jess=client.providers.find(p=>p.id==='jess');if(!jess||!d.form)return;
  jess.forms=jess.forms||[];
  const f={id:d.form.id,title:d.form.title,docs:d.form.docs||[],qs:d.form.qs||[],contra:d.form.contra||[],consent:d.form.consent||'',status:'Action needed',date:'Today'};
  const ex=jess.forms.findIndex(x=>x.id===f.id);
  if(ex>=0)jess.forms[ex]=f; else jess.forms.unshift(f);
  // Add to the "before your visit" checklist (pendingForms) so it shows up in the home banner and
  // task list, matching how real clients receive forms. Real clients get pendingForms from the
  // server; the demo bridge needs to mirror that here.
  jess.pendingForms=jess.pendingForms||[];
  if(!jess.pendingForms.some(pf=>pf.formId===f.id))jess.pendingForms.push({formId:f.id,title:f.title,assignedAt:Date.now()});
  if(client.activeProviderId==='jess'){if(currentScreen==='welcome')renderMagicLanding();else if(currentScreen==='home'&&typeof renderHome==='function')renderHome();}
  pushNotify({type:'form',icon:'ti-file-text',col:'var(--accent-lt)',ic:'var(--accent)',
    title:client.providerFirst+' sent a form to complete',body:d.form.title,
    onclick:()=>{client.activeProviderId='jess';applyActiveProvider();nav('home');}});
});

let APPT=new Date('2026-07-17T10:00:00');

function _loadClientMessagesInto(p){

function recomputeCountdown(){
  // Real clients count from the actual current date; the demo stays pinned to its
  // seeded "today" (TODAY) so the sample countdown reads coherently whenever it's viewed.
  const now=(client._real)?new Date():new Date(TODAY);
  // If the appointment date is missing or unparseable (e.g. nothing scheduled yet),
  // there's no countdown, mark it as such so the UI can show "Not scheduled" instead
  // of "NaN days away" or a broken progress ring. new Date(null) yields the 1970 epoch
  // rather than an Invalid Date, so also reject anything before year 2000.
  if(!APPT||isNaN(APPT.getTime())||APPT.getFullYear()<2000){
    client.daysUntilNext=null;client.hoursUntilNext=0;
    client.isThisWeek=false;client.isTomorrow=false;client.isToday=false;client.hasNextAppt=false;
    return;
  }
  client.hasNextAppt=true;
  // Count whole calendar days between today and the appointment, ignoring time-of-day
  // so an appointment later *today* reads as 0 ("Today!"), not 1. Using midnight-to-
  // midnight avoids the off-by-one that raw ms subtraction + Math.ceil produced.
  const startOfToday=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const apptDay=new Date(APPT.getFullYear(),APPT.getMonth(),APPT.getDate());
  const daysLeft=Math.round((apptDay-startOfToday)/(1000*60*60*24));
  client.daysUntilNext=daysLeft;
  client.hoursUntilNext=Math.max(0,Math.floor((APPT-now)/(1000*60*60)));
  // "This week" = within the next 7 days and not already past.
  client.isThisWeek=daysLeft>=0&&daysLeft<=7;client.isTomorrow=daysLeft===1;client.isToday=daysLeft===0;
}

// Derive the appointment's local date/time parts from a reliable source. For real
// clients nextDateISO/nextTimeISO are empty, so we fall back to APPT (parsed from
// apptISO). Returns local wall-clock parts, calendar files should use floating local
// time (no trailing Z), otherwise a 10am local appointment lands at 10am UTC.
function _apptParts(){
  let d=null;
  // Prefer the explicit ISO fields when present AND well-formed (demo data supplies them).
  if(client.nextDateISO&&client.nextTimeISO&&/^\d{8}$/.test(client.nextDateISO)&&/^\d{6}$/.test(client.nextTimeISO)){
    // These were historically stored UTC-shifted; reconstruct the intended instant then
    // read back local parts so the calendar shows the right wall-clock time.
    const Y=+client.nextDateISO.slice(0,4),Mo=+client.nextDateISO.slice(4,6)-1,Da=+client.nextDateISO.slice(6,8);
    const H=+client.nextTimeISO.slice(0,2),Mi=+client.nextTimeISO.slice(2,4);
    d=new Date(Date.UTC(Y,Mo,Da,H,Mi,0));
  } else if(APPT&&!isNaN(APPT.getTime())&&APPT.getFullYear()>=2000){
    d=new Date(APPT);
  }
  if(!d||isNaN(d.getTime()))return null;
  const p=n=>String(n).padStart(2,'0');
  return {
    date:d.getFullYear()+p(d.getMonth()+1)+p(d.getDate()),
    time:p(d.getHours())+p(d.getMinutes())+'00',
    dObj:d
  };
}
// Escape a value for an iCal text field (RFC 5545): backslash, semicolon, comma, newlines.
function _icsEsc(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');}
function buildICS(){
  const parts=_apptParts();
  const dtstamp=(function(){const d=new Date();const p=n=>String(n).padStart(2,'0');return d.getUTCFullYear()+p(d.getUTCMonth()+1)+p(d.getUTCDate())+'T'+p(d.getUTCHours())+p(d.getUTCMinutes())+p(d.getUTCSeconds())+'Z';})();
  const uid='slickchart-'+((parts&&parts.date)||'appt')+'-'+Math.random().toString(36).slice(2,8)+'@slickchart.app';
  const dur=Math.max(5,parseInt(client.durationMins,10)||60);
  const lines=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SlickChart//EN','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'DTSTAMP:'+dtstamp,
    // Floating local time (no Z) so the event shows at the provider's local wall-clock time.
    parts?('DTSTART:'+parts.date+'T'+parts.time):'DTSTART:'+dtstamp,
    'DURATION:PT'+dur+'M',
    'SUMMARY:'+_icsEsc(client.treatment+' with '+client.provider),
    'DESCRIPTION:'+_icsEsc('Your '+client.treatment+' appointment at '+client.studio+'.\nAddress: '+(client.studioAddress||'')+'\nPhone: '+(client.studioPhone||'')),
    'LOCATION:'+_icsEsc(client.studioAddress||client.studio||''),
    'END:VEVENT','END:VCALENDAR'
  ];
  return lines.join('\r\n');
}

// Reliable clipboard copy with a fallback for webviews/older browsers where the async
// clipboard API is missing, otherwise a copy could silently fail while still telling the
// client it succeeded. Runs onDone only when the copy actually went through.
function _clientCopy(text,onDone,onFail){
  const ok=()=>{try{onDone&&onDone();}catch(e){}};
  const fail=()=>{try{onFail&&onFail();}catch(e){}};
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(String(text)).then(ok).catch(()=>_clientCopyFallback(text,ok,fail));return;}
  }catch(e){}
  _clientCopyFallback(text,ok,fail);
}
function _clientCopyFallback(text,ok,fail){
  try{
    const ta=document.createElement('textarea');ta.value=String(text);ta.style.cssText='position:fixed;top:-1000px;left:-1000px;';
    document.body.appendChild(ta);ta.focus();ta.select();
    const done=document.execCommand('copy');document.body.removeChild(ta);
    if(done)ok();else fail();
  }catch(e){fail();}
}

function _applyCheckinDoneFromMap(){

// the server only drops it once the PROVIDER's app has processed the submission and re-synced.

let _formsDoneMap=(function(){try{return JSON.parse(localStorage.getItem('sc_forms_done')||'{}')||{};}catch(e){return {};}})();

function _saveDataUrlAsFile(dataUrl,fileName,fileType){
  try{
    const parts=String(dataUrl).split(',');
    const meta=parts[0]||'',b64=parts[1]||'';
    const mime=(meta.match(/data:([^;]+)/)||[])[1]||fileType||'application/octet-stream';
    const bin=atob(b64),arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([arr],{type:mime}));
    const a=document.createElement('a');a.href=url;a.download=fileName||'guide';
    document.body.appendChild(a);a.click();
    setTimeout(function(){try{a.remove();URL.revokeObjectURL(url);}catch(e){}},1500);
    return true;
  }catch(e){ try{window.open(dataUrl,'_blank');}catch(_){} return false; }
}
// Download the provider's uploaded guide file. Legacy shares carried the bytes inline
// (fileData); newer ones just flag hasFile and we fetch the file from the server on demand,
// authenticated by this client's own link token. Convert to a Blob so it downloads
// reliably (especially on mobile Safari) rather than pointing an anchor at a data URL.
function _downloadGuideFile(guideId,btn){
  const pg=(activeProvider().pendingGuides||[]).find(g=>g.guideId===guideId);
  if(!pg)return;
  if(pg.fileData){_saveDataUrlAsFile(pg.fileData,pg.fileName,pg.fileType);return;}
  if(!pg.hasFile){return;}
  if(!client._real||!client._token){alert('This file will be available once you open your link online.');return;}
  const orig=btn?btn.innerHTML:'';
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Getting your file…';}
  fetch('/api/guide-file?id='+encodeURIComponent(guideId)+'&t='+encodeURIComponent(client._token))
    .then(function(r){return r.ok?r.json():null;})
    .then(function(j){
      if(j&&j.file&&j.file.data){_saveDataUrlAsFile(j.file.data,j.file.name||pg.fileName,j.file.type||pg.fileType);}
      else{alert('Sorry, that file couldn’t be loaded. Please try again in a moment.');}
    })
    .catch(function(){alert('Couldn’t reach the server. Please check your connection and try again.');})
    .then(function(){ if(btn){btn.disabled=false;btn.innerHTML=orig;} });
}

function _courseProgKey(){const p=activeProvider();return 'sc_course_prog_'+(p&&p.id||'jess');}
function _courseProg(){try{return JSON.parse(localStorage.getItem(_courseProgKey())||'{}')||{};}catch(e){return {};}}
function _courseSaveProg(o){try{localStorage.setItem(_courseProgKey(),JSON.stringify(o));}catch(e){}}
function _lessonDone(courseId,lessonId){const o=_courseProg();return !!(o[courseId]&&o[courseId][lessonId]);}
function _courseDoneCount(co){const o=_courseProg();const m=o[co.id]||{};return (co.lessons||[]).filter(l=>m[l.id]).length;}
function _toggleLessonDone(courseId,lessonId){const o=_courseProg();if(!o[courseId])o[courseId]={};o[courseId][lessonId]=!o[courseId][lessonId];_courseSaveProg(o);}
// Turn a YouTube/Vimeo/Loom link into an embeddable URL; fall back to null (show a link button).
function _videoEmbed(url){
  try{
    const u=String(url||'').trim();if(!u)return null;
    let m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{6,})/);
    if(m)return 'https://www.youtube.com/embed/'+m[1];
    m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    if(m)return 'https://player.vimeo.com/video/'+m[1];
    m=u.match(/loom\.com\/share\/([\w-]+)/);
    if(m)return 'https://www.loom.com/embed/'+m[1];
    return null;
  }catch(e){return null;}
}

// The pre-visit check-in plus every form the provider assigned form ONE checklist. Instead of
// making the client bounce back to Home and hunt for the next card, finishing one item walks
// straight into the next incomplete one, so a single tap flows through everything.
function _previsitItems(){
  const p=activeProvider();const pf=(p.pendingForms||[]);
  return [{type:'checkin',label:'Pre-visit check-in',done:!!p.checkinDone}]
    .concat(pf.map(f=>({type:'form',formId:f.formId,label:f.title,done:false})));
}
function _nextPrevisitItem(){return _previsitItems().find(i=>!i.done)||null;}
function _startPrevisitFlow(){
  const t=_nextPrevisitItem();
  if(!t){nav('home');return;}
  if(t.type==='checkin')nav('checkin');
  else{_fillFormId=t.formId;nav('fill-form');}
}
// After a check-in / form submit, continue into the next incomplete item. Returns true if it
// navigated onward, so the caller can skip its own "back to home" / success screen.
function _advancePrevisitFlow(doneLabel){
  const t=_nextPrevisitItem();
  if(!t)return false;
  if(doneLabel)showToast(doneLabel+' ✓');
  if(t.type==='checkin')nav('checkin');
  else{_fillFormId=t.formId;nav('fill-form');}
  return true;
}

// ── PUSH NOTIFICATION SETTINGS ──
function loadNotifPrefs(){
  const defaults={
    enabled:false,
    appointmentReminder:true,
    appointmentDay:true,
    homecareReminder:true,
    summaryReady:true,
    messagereply:true,
    quietStart:'21:00',
    quietEnd:'08:00',
  };
  // Merge saved values OVER the defaults rather than returning the saved object directly
  // a prefs object written by an older version may be missing newer keys, which would
  // otherwise come back undefined (e.g. an undefined quietStart breaks quiet-hours logic).
  try{const s=localStorage.getItem('notif_prefs');if(s){const saved=JSON.parse(s);if(saved&&typeof saved==='object')return Object.assign(defaults,saved);}}catch(e){}
  return defaults;
}
function saveNotifPrefs(prefs){
  try{localStorage.setItem('notif_prefs',JSON.stringify(prefs));}catch(e){}
  _syncClientPrefsToServer();
}
function toggleNotif(key){
  const p=loadNotifPrefs();
  p[key]=!p[key];
  saveNotifPrefs(p);
  renderNotifSettings();
}
async function enableNotifs(){
  const btn=document.getElementById('enable-notif-btn');
  if(btn){btn.disabled=true;btn.style.opacity='.6';btn.innerHTML='<i class="ti ti-loader-2"></i> Requesting…';}
  const result=await Push.request(); // real Notification.requestPermission()
  const p=loadNotifPrefs();
  if(result==='denied'||result==='blocked'){
    // OS blocked it, keep app-level prefs on so in-app banners still work, but flag the block
    p.enabled=true;p.osBlocked=true;
  }else{
    p.enabled=true;p.osBlocked=false;
  }
  saveNotifPrefs(p);
  renderNotifSettings();
  // Register this device for real push (so notifications arrive with the app closed).
  try{_subscribePush();}catch(e){}
  // welcome ping so the user immediately sees it working
  setTimeout(()=>pushNotify({type:'summaryReady',icon:'ti-bell-ringing',col:'#f0fff5',ic:'#4ec49a',
    title:'Notifications are on 🎉',body:"You'll get reminders, messages, and booking updates here.",force:true}),420);
}
// The single master switch. On → request permission + enable (enableNotifs handles the rest);
// off → disable. Everything (reminders, messages, summaries) rides this one toggle now.
function toggleAllNotifs(){
  const p=loadNotifPrefs();
  if(p.enabled){p.enabled=false;saveNotifPrefs(p);renderNotifSettings();}
  else{enableNotifs();}
}
function setQuietStart(val){
  const p=loadNotifPrefs();p.quietStart=val;saveNotifPrefs(p);
}
function setQuietEnd(val){
  const p=loadNotifPrefs();p.quietEnd=val;saveNotifPrefs(p);

function attachClientPhoto(){_pickImages(srcs=>{if(srcs&&srcs.length)sendClientMsg(srcs);});}
function attachClientCamera(){_pickImages(srcs=>{if(srcs&&srcs.length)sendClientMsg(srcs);},true);}
function attachClientLink(){const u=prompt('Paste an image link (URL):');if(u&&u.trim())sendClientMsg([u.trim()]);}

function sendClientMsg(imgArg){
  const inp=document.getElementById('cinput');
  let text=(inp&&inp.value.trim())||'';
  let imgs=Array.isArray(imgArg)?imgArg:(imgArg?[imgArg]:[]);
  if(!text&&!imgs.length)return;
  // A chat message has a natural length; an extremely long one is almost always an
  // accidental paste and would bloat local storage / risk a failed sync. Cap it generously.
  const MAX=5000;
  if(text.length>MAX){text=text.slice(0,MAX);if(typeof showToast==='function')showToast('Message shortened to '+MAX+' characters');}
  // Photos are downscaled small, but cap how many ride in one message so a big multi-select
  // can't push the sync payload past the server's size limit (which would fail the send).
  const MAXP=6;
  if(imgs.length>MAXP){imgs=imgs.slice(0,MAXP);if(typeof showToast==='function')showToast('Sent the first '+MAXP+' photos, send the rest in another message');}
  // Text and photos both reach the provider now, so any real message gets a live delivery
  // status + retry, the client can see whether it actually landed.
  const track=!!(client._real&&(text||imgs.length));
  const msg={_id:'cm'+(++_clientMsgSeq),from:'me',text,imgs,time:'Just now',status:track?'sending':undefined};
  messages.push(msg);
  try{_saveClientMessages();}catch(e){}
  if(inp){inp.value='';inp.style.height='auto';}
  renderMessages();
  if(track)_deliverClientMsg(msg);
}
let _clientMsgSeq=0;
// Deliver a client text message and reflect the real outcome in its bubble. _clientSubmit
// retries a network blip itself; here we also handle the per-kind in-flight guard (a second
// quick message) by re-attempting a few times before giving up.
function _deliverClientMsg(msg,attempt){
  attempt=attempt||0;
  _clientSubmit('message',{text:msg.text||'',photos:(msg.imgs||[])}).then(function(res){
    if(res&&res.duplicate&&attempt<4){setTimeout(function(){_deliverClientMsg(msg,attempt+1);},1200);return;}
    msg.status=(res&&res.ok)?'sent':'failed';
    try{_saveClientMessages();}catch(e){}
    if(document.getElementById('chat-body'))renderMessages();
  }).catch(function(){
    msg.status='failed';try{_saveClientMessages();}catch(e){}
    if(document.getElementById('chat-body'))renderMessages();
  });
}
function retryClientMsg(id){
  const msg=messages.find(function(m){return m._id===id;});if(!msg)return;
  msg.status='sending';try{_saveClientMessages();}catch(e){}
  if(document.getElementById('chat-body'))renderMessages();
  _deliverClientMsg(msg);
}

// ── PRE-VISIT CHECK-IN (data-driven, per provider) ──
// Each provider defines client.providers[].checkin = {steps:[{title,questions:[...]}]}.
// Question types: boolean (yes/no + optional detail), iconChoice (option grid, optional custom), notes (textarea).
let checkinAnswers={};
let checkinStep=0;

function _ciSteps(){
  // Use the provider's own saved check-in config (what they built in their editor)
  // whenever we have it, both for the connected demo provider AND for real client
  // links (client._real). Previously this only checked .connected, so real clients
  // fell through to the hardcoded default steps and saw drink options the provider
  // had actually removed.
  if(activeProvider().connected||client._real){
    const cfg=loadClientCheckinCfg();
    if(cfg)return _ciStepsFromCfg(cfg);
  }
  return (activeProvider().checkin&&activeProvider().checkin.steps)||[];
}
function _ciStepsFromCfg(cfg){
  const steps=[];
  const qs=(cfg.skinQ||[]).filter(q=>q.on!==false).map(q=>({type:'boolean',id:q.id,label:q.label,detailPh:'Add any details for '+_txt(client.providerFirst)+'...'}));
  if(qs.length)steps.push({title:'Since your last visit',id:'updates',questions:qs});
  const comfort=_comfortStepFromCfg(cfg);
  if(comfort&&comfort.questions.length)steps.push(comfort);
  // Image-forward professions ask for a reference/inspiration photo before the visit.
  if(cfg.referencePhotoOn)steps.push({title:'Reference photo',id:'refphoto',questions:[{type:'photo',id:'refPhoto',label:'Share a reference or your current look (optional)',hint:'Inspiration, a photo of your current style, or anything you want '+client.providerFirst+' to see before your visit.'}]});
  if(cfg.extraNotes!==false)steps.push({title:'Anything else',id:'notes',questions:[{type:'notes',id:'notes',ph:'Questions, requests, anything on your mind...'}]});
  return steps;
}
function loadClientCheckinCfg(){
  try{const v=localStorage.getItem('sc_checkin_cfg');return v?JSON.parse(v):null;}catch(e){return null;}
}
function _comfortStepFromCfg(cfg){
  if(cfg.chairComfortOn===false)return null;   // provider removed the section
  const qs=[];
  if(cfg.drinks&&cfg.drinks.length){
    // If a saved (possibly older) config has drinks but NONE carry a temperature/sub,
    // fall back to the temperature-aware defaults so clients are still asked cold vs hot.
    const anySub=cfg.drinks.some(d=>String(d.sub||'').trim());
    const drinkOpts=anySub?cfg.drinks.map(d=>[d.emoji,d.label,d.sub||'']):CI_DRINKS;
    qs.push({type:'iconChoice',id:'drink',label:'Your drink',options:drinkOpts});
  }
  if(cfg.snacksOn&&cfg.snacks&&cfg.snacks.length)qs.push({type:'iconChoice',id:'snack',label:'Snack',options:cfg.snacks.map(s=>{const i=s.indexOf(' ');return i>0?[s.slice(0,i),s.slice(i+1)]:['🍽️',s];})});
  if(cfg.music&&cfg.music.length)qs.push({type:'iconChoice',id:'music',label:'Music',options:cfg.music.map(m=>[m.emoji,m.label]),allowCustom:cfg.musicCustom!==false,customPh:'e.g. a podcast, no music…'});
  (cfg.heat||[]).filter(h=>h.on!==false).forEach(h=>qs.push({type:'levelChoice',id:h.id,label:h.label,options:h.levels||['Off','Low','Med','High']}));
  if(cfg.blankets&&cfg.blankets.length)qs.push({type:'iconChoice',id:'covering',label:'Covering',columns:3,options:cfg.blankets.map(b=>[b.emoji,b.label])});
  return{title:cfg.chairComfortLabel||'Comfort',id:'comfort',questions:qs};
}

  }

  }
  if(q.type==='Long text'){

  }
  if(q.type==='Date'){
    return `<div style="${wrapStyle}">${label}<input id="ff-${i}" ${aria} type="date" value="${_txt(_ffDraft['q'+i]||'').replace(/"/g,'&quot;')}" oninput="_ffSetDraft('q${i}',this.value)" style="width:100%;background:#faf7f4;border:1px solid #e8ddd3;border-radius:10px;padding:11px;font-size:14px;color:#3a2f28;box-sizing:border-box;"></div>`;
  }
  if(q.type==='File upload'||q.type==='Photo upload'){
    return `<div style="${wrapStyle}">${label}
      <div id="ff-photos-${i}" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;"></div>
      <button type="button" onclick="_ffAddPhotos(${i})" style="width:100%;background:#faf7f4;border:1.5px dashed #e8ddd3;border-radius:10px;padding:14px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;"><i class="ti ti-camera" style="font-size:16px;"></i> Add photo${q.multiple===false?'':'s'}</button>
      <div style="font-size:11px;color:#786858;margin-top:5px;">Tap to upload from your camera or photos.</div>

  // mobile keyboard (the field type is generic "Short text").
  const _it=/e-?mail/i.test(q.label||'')?'email':(/phone|mobile|cell/i.test(q.label||'')?'tel':'text');
  const _im=_it==='email'?' inputmode="email" autocomplete="email"':(_it==='tel'?' inputmode="tel" autocomplete="tel"':'');
  return `<div style="${wrapStyle}">${label}<input id="ff-${i}" ${aria} type="${_it}"${_im} value="${_txt(_ffDraft['q'+i]||'').replace(/"/g,'&quot;')}" oninput="_ffSetDraft('q${i}',this.value)" style="width:100%;background:#faf7f4;border:1px solid #e8ddd3;border-radius:10px;padding:11px;font-size:14px;color:#3a2f28;box-sizing:border-box;"></div>`;

function _ffSetChoice(i,val,btn){
  const hid=document.getElementById('ff-'+i);if(hid)hid.value=val;
  _ffSetDraft('q'+i,val);

// Photos attached to a File-upload form question, keyed by field index.
let _ffPhotos={};
// Draft persistence for intake forms, clients fill long forms (medical history,
// allergies, meds) on mobile and get interrupted. Without this, navigating away or a
// tab reload wipes everything typed. Answers are keyed by form id + question index and
// mirrored to localStorage so they survive until the form is submitted.
let _ffDraft={};
function _ffDraftStorageKey(){return 'sc_ffdraft_'+((typeof _fillFormId!=='undefined'&&_fillFormId)||'form');}
function _ffLoadDraft(){
  try{const raw=localStorage.getItem(_ffDraftStorageKey());_ffDraft=raw?(JSON.parse(raw)||{}):{};}catch(e){_ffDraft={};}
}
let _ffDraftTimer=null;
function _ffSetDraft(key,val){
  _ffDraft[key]=val;
  clearTimeout(_ffDraftTimer);
  _ffDraftTimer=setTimeout(()=>{try{localStorage.setItem(_ffDraftStorageKey(),JSON.stringify(_ffDraft));}catch(e){}},400);
}
function _ffClearDraft(){
  _ffDraft={};
  try{localStorage.removeItem(_ffDraftStorageKey());}catch(e){}
}
function _ffAddPhotos(i){
  _pickImages(function(srcs){
    if(!srcs||!srcs.length)return;
    if(!_ffPhotos[i])_ffPhotos[i]=[];
    srcs.forEach(function(s){_ffPhotos[i].push(s);});
    _ffRenderPhotos(i);
  });
}
function _ffRemovePhoto(i,idx){
  if(_ffPhotos[i])_ffPhotos[i].splice(idx,1);
  _ffRenderPhotos(i);
}
function _ffRenderPhotos(i){
  const box=document.getElementById('ff-photos-'+i);if(!box)return;
  const list=_ffPhotos[i]||[];
  box.innerHTML=list.map(function(src,idx){
    return `<div style="position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid #e8ddd3;">
      <img src="${_imgSrc(src)}" alt="Attached photo" style="width:100%;height:100%;object-fit:cover;">
      <button type="button" onclick="_ffRemovePhoto(${i},${idx})" aria-label="Remove photo" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>`;
  }).join('');
}
function _submitFillForm(){
  const pf=_pendingForm();if(!pf)return;
  const qs=_orderedFormQs(pf.qs);
  const answers={};const flagged=[];let signed=false;
  let missingRequired=false;let badFormat='';
  // Email/phone fields come through as generic "Short text" (there's no dedicated type),
  // so infer them from the label to validate format. Only validates when a value is
  // present, emptiness is handled by the required check.
  const _looksEmail=lbl=>/e-?mail/i.test(lbl||'');
  const _looksPhone=lbl=>/phone|mobile|cell/i.test(lbl||'');
  const _validEmail=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const _validPhone=v=>{const d=v.replace(/[^0-9]/g,'');return d.length>=7&&d.length<=15;};
  qs.forEach((q,i)=>{
    if(q.type==='Contraindications'){
      const checked=(q.items||[]).map((it,ii)=>({it,el:document.getElementById(`ff-${i}-${ii}`)})).filter(x=>x.el&&x.el.checked).map(x=>x.it);
      answers[q.id]=checked;
      flagged.push(...checked);
    }else if(q.type==='Multiple choice'){
      const checked=(q.options||[]).map((o,oi)=>({o,el:document.getElementById(`ff-${i}-${oi}`)})).filter(x=>x.el&&x.el.checked).map(x=>x.o);
      answers[q.id]=checked;
      if(q.required&&!checked.length)missingRequired=true;
    }else if(q.type==='File upload'||q.type==='Photo upload'){
      const photos=(_ffPhotos[i]||[]).slice();
      answers[q.id]=photos;
      if(q.required&&!photos.length)missingRequired=true;
    }else{
      const el=document.getElementById('ff-'+i);
      const val=el?el.value.trim():'';
      answers[q.id]=val;
      if(q.type==='Signature'&&val)signed=true;
      if(q.required&&!val)missingRequired=true;
      // Format-check email/phone short-text fields when the person entered something.
      if(val&&(q.type==='Short text'||!q.type)){
        if(_looksEmail(q.label)&&!_validEmail(val))badFormat=badFormat||'Please enter a valid email address.';
        else if(_looksPhone(q.label)&&!_validPhone(val))badFormat=badFormat||'Please enter a valid phone number.';
      }
    }
  });
  if(missingRequired){ showToast('Please fill in the required fields',false); return; }
  if(badFormat){ showToast(badFormat,false); return; }
  const dateLabel=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const _finishFormSent=()=>{
    // Remove it from the pending list only once we know it's been sent, so a failed
    // submit doesn't make the form vanish while the provider never received it.
    const p=activeProvider();
    p.pendingForms=(p.pendingForms||[]).filter(x=>x.formId!==pf.formId);
    try{_markFormDone(p.id,pf);}catch(e){}   // persist so it doesn't reappear on reload before the provider syncs
    _ffPhotos={};
    _ffClearDraft();   // typed answers are now sent, drop the saved draft
    if(_advancePrevisitFlow('Sent'))return;
    showToast('Sent \u2713');
    nav('home');
  };
  if(client._real){
    const btns=document.querySelectorAll('button');
    showToast('Sending\u2026');
    _clientSubmit('form',{formId:pf.formId,title:pf.title,answers,flagged,signed,date:dateLabel})
      .then(function(res){
        if(res&&res.duplicate)return;   // a submit is already in flight, ignore the duplicate tap
        if(res&&res.ok!==false)_finishFormSent();
        else showToast("Couldn't send \u2014 check your connection and tap Submit again",false);
      });
    return;
  }
  _finishFormSent();
}
function renderCheckin(){
  setNav('home');
  document.getElementById('tt').textContent='Pre-visit check-in';
  const p=activeProvider();
  if(!p.checkinAnswers)p.checkinAnswers={};
  checkinAnswers=p.checkinAnswers;
  checkinStep=0;
  _ciLastStep=-1;
  _renderCheckinStep();
}

// Track which step is currently on screen so we only jump the view back to the top when the client
// actually moves to a new step (Next/Back), not on the many in-step re-renders that happen while
// they answer questions, which would otherwise yank the page up on every tap.
let _ciLastStep=-1;
function _renderCheckinStep(){
  const steps=_ciSteps();
  if(!steps.length){nav('home');return;}
  if(checkinStep>steps.length-1)checkinStep=steps.length-1;
  const step=steps[checkinStep];
  const isLast=checkinStep===steps.length-1;
  const _stepChanged=(_ciLastStep!==checkinStep);_ciLastStep=checkinStep;
  S.innerHTML=`
  <div style="padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;">
    <button class="back" onclick="${checkinStep===0?'nav(\'home\')':'checkinStep--;_renderCheckinStep()'}" aria-label="Back">
      <i class="ti ti-arrow-left"></i> ${checkinStep===0?'Home':'Back'}
    </button>
    <span style="font-size:12px;color:#786858;font-weight:500;">${checkinStep+1} of ${steps.length}</span>
  </div>
  <div style="padding:10px 16px 0;">
    <div style="display:flex;gap:4px;margin-bottom:10px;">
      ${steps.map((_,i)=>`<div style="flex:1;height:4px;border-radius:2px;background:${i<=checkinStep?'var(--accent)':'#f0ebe4'};"></div>`).join('')}
    </div>
    <div style="font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:2px;">${_txt(step.title)}</div>
    <div style="font-size:13px;color:#786858;">For your ${_dt(client.nextDate)} appointment · ${_txt(client.providerFirst)} sees this before you arrive.</div>
  </div>
  <div id="checkin-body">
    <div style="padding:10px 16px 0;">
      ${(step.questions||[]).map(_renderCIQuestion).join('')}
    </div>
  </div>
  <div style="padding:12px 16px 20px;">
    <button class="btnp" style="border-radius:10px;" onclick="${isLast?'submitCheckin()':'checkinStep++;_renderCheckinStep()'}">
      <i class="ti ti-${isLast?'check':'arrow-right'}" aria-hidden="true"></i>
      ${isLast?'Submit check-in':'Next'}
    </button>
  </div>`;
  if(_stepChanged)_scrollScreenTop();
}
// Reset the screen view to the top. Used when a multi-step flow advances so each new step starts
// at the top of the field instead of wherever the previous step was scrolled to.
function _scrollScreenTop(){try{S.scrollTop=0;}catch(e){}try{window.scrollTo(0,0);}catch(e){}}

function _renderCIQuestion(q){
  if(q.type==='boolean')return _ciBoolean(q);
  if(q.type==='iconChoice')return _ciIconChoice(q);
  if(q.type==='levelChoice')return _ciLevel(q);

  if(q.type==='photo')return _ciPhoto(q);

}

        <i class="ti ti-camera-plus" aria-hidden="true" style="font-size:20px;"></i><span style="font-size:10px;">Upload</span>

function _ciFlagged(){

// ── Image helpers (downscale uploads to a shareable data URL, or accept a link) ──
function _pickImages(cb,capture){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  // capture=true jumps straight to the device camera (single shot); otherwise allow picking
  // multiple from the library. Both invoke the native picker in an app-store-wrapped build.
  if(capture){inp.capture='environment';}else{inp.multiple=true;}
  inp.onchange=()=>{
    const files=Array.from(inp.files||[]);if(!files.length)return;
    const out=[];let done=0;
    files.forEach((f,idx)=>_downscaleImg(f,src=>{out[idx]=src;if(++done===files.length)cb(out.filter(Boolean));}));
  };
  inp.click();
}
function _downscaleImg(file,cb,max=900){
  // Guard against enormous files (e.g. RAW/HEIC) that can crash a mobile tab when read
  // into a base64 data URL. 25MB is generous for a photo; anything bigger is dropped.
  if(file&&file.size&&file.size>25*1024*1024){cb('');return;}
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      try{c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.72));}
      catch(_){cb(e.target.result);}
    };
    // Decode failed, return empty rather than the full-size original (which would
    // defeat downscaling and could bloat storage). Callers drop empty results.
    img.onerror=()=>cb('');
    img.src=e.target.result;
  };
  // File read failed, must still call back, or a batch upload's completion counter
  // never advances and the whole "add photos" flow hangs silently forever.
  r.onerror=()=>cb('');
  r.readAsDataURL(file);
}

async function _doDeleteClientData(){

  if(client._real&&client._token){

  try{ Object.keys(localStorage).filter(function(k){return k.indexOf('sc_')===0||k==='notif_prefs';}).forEach(function(k){localStorage.removeItem(k);}); }catch(e){}

function ciAddPhoto(qid){_pickImages(srcs=>{if(!srcs||!srcs.length)return;const a=(checkinAnswers[qid+'Photos']=checkinAnswers[qid+'Photos']||[]);srcs.forEach(s=>a.push(s));_renderCheckinStep();});}

function ciRemovePhoto(qid,i){const a=checkinAnswers[qid+'Photos']||[];a.splice(i,1);_renderCheckinStep();}
function ciMovePhoto(qid,i,dir){const a=checkinAnswers[qid+'Photos']||[];const j=i+dir;if(j<0||j>=a.length)return;const t=a[i];a[i]=a[j];a[j]=t;_renderCheckinStep();}
// Reference-photo reordering. The old version used HTML5 drag-and-drop (draggable/ondragstart),
// which simply does not fire on mobile touch — so on a phone the photos couldn't be dragged at all.
// This uses Pointer Events (touch + mouse), tracking the tile under the finger via elementFromPoint
// and reordering on release. Works the same on phone and desktop; no arrow buttons needed.
let _ciReorder=null;
function _ciTileAt(x,y){const el=document.elementFromPoint(x,y);return el?el.closest('[data-ci-photo]'):null;}
function ciPtrDown(qid,i,ev){
  if(ev.button!==undefined&&ev.button!==0)return;   // primary button / touch only
  const tile=ev.currentTarget;
  _ciReorder={qid,from:i,startX:ev.clientX,startY:ev.clientY,moved:false,tile};
  try{tile.setPointerCapture(ev.pointerId);}catch(_){}
}
function ciPtrMove(ev){
  if(!_ciReorder)return;
  const dx=ev.clientX-_ciReorder.startX,dy=ev.clientY-_ciReorder.startY;
  if(!_ciReorder.moved&&(Math.abs(dx)+Math.abs(dy))<6)return;   // ignore tiny jitters (still a tap)
  _ciReorder.moved=true;
  ev.preventDefault();
  _ciReorder.tile.style.opacity='.55';
  const t=_ciTileAt(ev.clientX,ev.clientY);
  document.querySelectorAll('[data-ci-photo]').forEach(el=>{el.style.outline='';el.style.outlineOffset='';});
  if(t&&t!==_ciReorder.tile){t.style.outline='2px solid var(--accent)';t.style.outlineOffset='1px';}
}
function ciPtrUp(ev){
  if(!_ciReorder)return;
  const r=_ciReorder;_ciReorder=null;
  try{r.tile.releasePointerCapture(ev.pointerId);}catch(_){}
  r.tile.style.opacity='';
  document.querySelectorAll('[data-ci-photo]').forEach(el=>{el.style.outline='';el.style.outlineOffset='';});
  if(!r.moved)return;   // no real drag — leave it as a tap
  const t=_ciTileAt(ev.clientX,ev.clientY);if(!t)return;
  const qid=t.getAttribute('data-ci-photo'),to=parseInt(t.getAttribute('data-idx'),10);
  if(qid!==r.qid||isNaN(to)||to===r.from)return;
  const a=checkinAnswers[r.qid+'Photos']||[];const[m]=a.splice(r.from,1);a.splice(to,0,m);
  _renderCheckinStep();
}

function _ciBuildPayload(){
  const groups=[];const flagged=[];let notes='';let photos=[];
  _ciSteps().forEach(st=>{
    const rows=[];
    (st.questions||[]).forEach(q=>{
      if(q.type==='boolean'){
        const yes=checkinAnswers[q.id]==='yes';
        rows.push({label:q.label,value:yes?'Yes':'No changes',detail:yes?(checkinAnswers[q.id+'Detail']||''):'',flagged:yes});
        if(yes)flagged.push((q.flagLabel||q.label||'').replace(/\?$/,''));
      }else if(q.type==='iconChoice'){
        const v=checkinAnswers[q.id];let val='—';
        if(v===-1)val=checkinAnswers[q.id+'Custom']||'Something else';
        else if(typeof v==='number'&&q.options&&q.options[v])val=q.options[v][1]+(q.options[v][2]?' ('+q.options[v][2]+')':'');
        rows.push({label:q.label,value:val,flagged:false});
      }else if(q.type==='levelChoice'){
        const opts=q.options||['Off','Low','Med','High'];
        rows.push({label:q.label,value:checkinAnswers[q.id]||opts[0],flagged:false});
      }else if(q.type==='notes'){
        notes=checkinAnswers[q.id]||'';
        photos=(photos||[]).concat(checkinAnswers[q.id+'Photos']||[]);
      }else if(q.type==='photo'){
        photos=(photos||[]).concat(checkinAnswers[q.id+'Photos']||[]);
      }
    });
    if(rows.length)groups.push({title:st.title,rows});
  });
  return{groups,flagged,notes,photos};
}

function submitCheckin(){
  const prov=activeProvider();
  const pay=_ciBuildPayload();
  // Show the client the SAME flags that get sent to the provider (lower-cased only for
  // the friendly confirmation copy). Deriving both from one source prevents the two
  // lists from drifting apart, which for a check-in could mean the client thinks they
  // flagged something the provider never received.
  const flagged=(pay.flagged||[]).map(f=>String(f).toLowerCase());
  // Connected providers (the live provider app) receive the check-in instantly via the bridge
  if(prov.connected){
    _markCheckinDone(prov);
    SlickBridge.post('checkin-submitted',{
      id:'ci'+Date.now()+Math.random().toString(36).slice(2,5),
      providerId:prov.id,clientId:'maya',client:client.name,
      dateLabel:client.nextDate,time:client.nextTime,treatment:client.treatment,
      groups:pay.groups,flagged:pay.flagged,notes:pay.notes,photos:pay.photos,submittedAt:Date.now(),
    });
    // If forms are still pending, walk straight into them; otherwise show the all-set screen.
    if(_advancePrevisitFlow('Check-in saved'))return;
    S.innerHTML=_checkinSuccessHTML(flagged);
    return;
  }
  // Real client, send for real and confirm it actually reached the server before
  // telling them they're all set. A dropped check-in could hide a contraindication.

// Per-day availability (mirrors provider business hours)
const REBOOK_DAYKEYS=['sun','mon','tue','wed','thu','fri','sat'];
function normalizeAvail(a){
  const keys=['mon','tue','wed','thu','fri','sat','sun'];
  const def={};keys.forEach(d=>def[d]={open:d!=='sun',start:'09:00',end:'17:00'});
  if(!a)return def;
  if(a.days&&!a.mon){const out={};keys.forEach(d=>out[d]={open:!!a.days[d],start:a.start||'09:00',end:a.end||'17:00'});return out;}
  const out={};keys.forEach(d=>out[d]=(a[d]&&typeof a[d]==='object')?{open:!!a[d].open,start:a[d].start||'09:00',end:a[d].end||'17:00'}:def[d]);return out;
}
let rebookAvail=null;
function rebookHourlySlots(dayObj){
  if(!dayObj||!dayObj.open)return[];
  let sH=parseInt(dayObj.start,10),eH=parseInt(dayObj.end,10);
  // Guard against a saved inverted/invalid range (end <= start), which would otherwise
  // yield zero slots and silently block booking. Fall back to standard 9–5 hours.
  if(!isFinite(sH)||!isFinite(eH)||eH<=sH){sH=9;eH=17;}
  const slots=[];for(let h=sH;h<eH;h++){let hr=h%12;if(hr===0)hr=12;slots.push(`${hr}:00 ${h<12?'AM':'PM'}`);}
  return slots;
}

}

// ── Real image capture, downscaling, and on-device pixel analysis ──
function _downscaleImage(file,maxDim,cb){
  if(file&&file.size&&file.size>25*1024*1024){cb('');return;}
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;const scale=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*scale);h=Math.round(h*scale);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    try{cb(cv.toDataURL('image/jpeg',0.78));}catch(err){cb(e.target.result);}
  };img.onerror=()=>cb('');img.src=e.target.result;};
  r.onerror=()=>cb('');r.readAsDataURL(file);
}
// Real measurements computed from the actual pixels (runs on-device; the hosted vision model layers on top of these)
function _imgMeasures(dataURL){return new Promise(res=>{
  if(!dataURL)return res(null);
  const img=new Image();img.onload=()=>{
    const s=72,cv=document.createElement('canvas');cv.width=s;cv.height=s;const ctx=cv.getContext('2d');
    ctx.drawImage(img,0,0,s,s);let d;try{d=ctx.getImageData(0,0,s,s).data;}catch(e){return res(null);}
    const n=s*s;let sumL=0,sumR=0,sumG=0,sumB=0;const Ls=[];
    for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2],L=0.299*r+0.587*g+0.114*b;sumL+=L;sumR+=r;sumG+=g;sumB+=b;Ls.push(L);}
    const mL=sumL/n,mR=sumR/n,mG=sumG/n,mB=sumB/n;let vL=0;Ls.forEach(L=>vL+=(L-mL)*(L-mL));const sd=Math.sqrt(vL/n);
    res({brightness:mL,redness:mR/(((mG+mB)/2)||1),warmth:mR-mB,evenness:Math.max(0,Math.min(100,100-sd/1.6)),sd:sd,mR:mR,mG:mG,mB:mB});
  };img.onerror=()=>res(null);img.src=dataURL;
});}

function submitVirtualConsult(){
  if(!vcInvite)return;
  const inv=vcInvite;const sets=_vcSets(inv.kind);
  const photos=sets.photos.map(l=>({label:l,src:(_vcSubmitState.photos[l]||{}).src||''})).filter(p=>p.src);
  const refs=sets.refs?sets.refs.map(l=>({label:l,src:(_vcSubmitState.refs[l]||{}).src||''})).filter(p=>p.src):null;
  const goals=(document.getElementById('vc-goals')||{}).value||'';
  const date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const entry={date,kind:inv.kind,title:inv.title,photos,refs:(refs&&refs.length)?refs:null,goals};
  // compute real measurements from the first photo, then hand the submission (images + measures) to the provider
  const firstSrc=(photos[0]||{}).src||'';
  // Only consume the invite once the submission is safely away. The old code recorded the
  // consult and set sc_vc_submitted up front, so a failed send (after _clientSubmit's own
  // retry) silently lost the whole consult with no way to try again. Now we record + clear
  // + notify only on success; on failure we keep the invite and photos so they can retry.
  const finalize=()=>{
    const j=client.providers.find(p=>p.id==='jess');
    if(j){j.virtualConsults=j.virtualConsults||[];j.virtualConsults.unshift(entry);try{persistVirtualConsults();}catch(e){}}
    try{if(inv&&inv.invitedAt)localStorage.setItem('sc_vc_submitted',String(inv.invitedAt));}catch(e){}
    vcInvite=null;_vcSubmitState={photos:{},refs:{}};try{persistInvite();}catch(e){}
    if(typeof pushNotify==='function')pushNotify({type:'vcSubmitted',icon:'ti-check',col:'#e9f7f0',ic:'#4ec49a',title:'Consult submitted',body:client.providerFirst+' will review your photos and send notes back.'});
    nav('journey');
  };
  const fail=()=>{if(typeof showToast==='function')showToast('Couldn’t send your consult, please check your connection and try again.',false);};
  _imgMeasures(firstSrc).catch(()=>null).then(measures=>{
    try{SlickBridge.post('virtual-consult-submitted',{providerId:'jess',clientId:'maya',kind:inv.kind,title:inv.title,date,photos,refs:entry.refs,goals,measures});}catch(e){}
    if(client._real){
      return _clientSubmit('vc_submit',{kind:inv.kind,title:inv.title,date,photos,refs:entry.refs,goals,measures})
        .then(res=>{if(res&&res.ok)finalize();else if(res&&res.duplicate){/* already sending, ignore double tap */}else fail();})
        .catch(fail);
    }
    finalize(); // demo / same-browser preview, no server dependency
  });
}

function _cfSignInit(){
  const c=document.getElementById('cf-sign-pad');if(!c||!c.getContext)return;
  const ctx=c.getContext('2d');if(!ctx)return;
  const r=c.getBoundingClientRect?c.getBoundingClientRect():{width:320,height:150};c.width=r.width||320;c.height=r.height||150;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';
  let drawing=false,last=null;_cfPadInk=false;
  const pos=e=>{const b=c.getBoundingClientRect();const t=(e.touches&&e.touches[0])||e;return{x:t.clientX-b.left,y:t.clientY-b.top};};
  const start=e=>{drawing=true;last=pos(e);if(e.cancelable)e.preventDefault();};
  const move=e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;_cfPadInk=true;if(e.cancelable)e.preventDefault();};
  const end=()=>{drawing=false;};
  // Remove any window 'mouseup' left from a previous open so it doesn't accumulate each
  // time the on-device signing pad is shown (canvas listeners die with the canvas; the
  // window one does not).
  try{if(_cfPadWinUp)window.removeEventListener('mouseup',_cfPadWinUp);}catch(e){}
  _cfPadWinUp=end;
  c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  c.addEventListener('touchstart',start,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',end);
}
