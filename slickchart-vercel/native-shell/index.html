<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SlickChart</title>
<style>
  html,body{margin:0;height:100%;background:#0d0d0d;color:#e8ddd0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;box-sizing:border-box;}
  .logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#C8A882,#a9895f);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:30px;color:#1a1408;}
  h1{font-size:19px;font-weight:600;margin:6px 0 0;}
  p{font-size:14px;color:#a89a8a;line-height:1.5;max-width:280px;margin:0;}
  button{margin-top:8px;background:#C8A882;color:#1a1408;border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
  <!-- This page only shows if the device is offline when the app launches. Normally the native shell
       loads the live app from `server.url` in capacitor.config.json, so every web deploy updates the
       app instantly with no re-submission. -->
  <div class="wrap">
    <div class="logo">S</div>
    <h1>You're offline</h1>
    <p>SlickChart needs a connection to load. Check your internet and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
