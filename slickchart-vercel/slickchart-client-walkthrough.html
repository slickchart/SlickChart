<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SlickChart Client App — Walkthrough</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#C8A882;--accent-2:#2C5F8A;--accent-ink:#1a1208;
  --accent-tint:#2a231b;--accent-tint2:#3c3227;
  --accent-lt:#f5ede3;--accent-lt2:#f5e6d3;
  --accent-a30:rgba(200,168,130,.19);
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, monospace;
}
body{
  font-family:var(--font-body);
  background:radial-gradient(ellipse at 50% -10%, #2a2318 0%, #16110a 60%);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:18px;
  padding:32px 16px;
}
.top-label{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase;
  color:#9c8265; text-align:center;
}

.device-wrap{ display:flex; flex-direction:column; align-items:center; gap:14px; }

/* ================= REAL APP REPLICA ================= */
.shell{
  width:min(390px,90vw);
  background:#fff;
  border-radius:24px;
  border:1px solid #e8e0d8;
  overflow:hidden;
  height:min(760px,78vh,155vw);
  display:flex; flex-direction:column;
  position:relative;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.04);
}
.sb{background:#fff;padding:10px 20px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sb span{font-size:13px;font-weight:500;color:#1a1a1a;}
.sb .ic{display:flex;gap:6px;font-size:13px;color:#1a1a1a;}
.topbar{background:#fff;padding:10px 16px 13px;border-bottom:1px solid #f0ebe4;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo i{font-size:15px;color:#fff;}
#tt{font-size:17px;font-weight:600;color:#1a1a1a;flex:1;transition:opacity .15s;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-lt2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);border:1.5px solid #e8d5c0;flex-shrink:0;}

main.scr{flex:1;overflow:hidden;position:relative;}
.screen{
  position:absolute; inset:0;
  overflow-y:auto;
  padding-bottom:20px;
  opacity:0; transform:translateY(6px);
  transition:opacity .28s ease, transform .28s ease;
  pointer-events:none;
}
.screen.on{ opacity:1; transform:translateY(0); pointer-events:auto; }
.screen::-webkit-scrollbar{display:none;}

nav.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0ebe4;display:flex;padding:6px 0 12px;z-index:20;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;min-height:44px;justify-content:center;position:relative;transition:transform .12s;}
.ni i{font-size:18px;color:#c4b9ae;}
.ni span{font-size:10px;color:#c4b9ae;font-weight:500;}
.ni.active i,.ni.active span{color:var(--accent);}
.ni.press{ transform:scale(0.88); }
.tapdot{
  position:absolute; width:38px; height:38px; border-radius:50%;
  background:rgba(200,168,130,.35);
  top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
  pointer-events:none;
}
.ni.press .tapdot{ animation:tapripple .5s ease-out; }
@keyframes tapripple{ 0%{transform:translate(-50%,-50%) scale(0); opacity:1;} 100%{transform:translate(-50%,-50%) scale(1.4); opacity:0;} }

.card{background:#fff;border:1.5px solid #f0ebe4;border-radius:14px;margin:0 16px 12px;padding:14px 16px;}
.sh{padding:14px 16px 8px;}
.sh h2{font-size:11px;font-weight:700;color:#b8a898;text-transform:uppercase;letter-spacing:.08em;}
.btnp{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
.pill{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11.5px;border:1.5px solid #e8ddd3;color:#9a8a7e;background:#fff;white-space:nowrap;font-weight:500;}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid #e8ddd3;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s;}
.check-circle.done{background:var(--accent);border-color:var(--accent);}
.check-circle.done i{color:#fff;font-size:12px;}

/* ---------- caption strip, OUTSIDE the app so the UI itself stays pristine ---------- */
.caption-bar{
  width:min(390px,90vw);
  background:rgba(243,236,223,0.05);
  border:1px solid rgba(243,236,223,0.14);
  border-radius:14px;
  padding:13px 16px;
  min-height:56px;
}
.caption-bar .eyebrow{ font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#C8A882; margin-bottom:4px;}
.caption-bar .line{ font-family:var(--font-body); font-size:13px; color:#F3ECDF; opacity:.85; line-height:1.5;}

.controls{ display:flex; gap:10px; }
.btn{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.06em;
  color:#F3ECDF; background:transparent; border:1px solid rgba(243,236,223,.14);
  border-radius:20px; padding:8px 16px; cursor:pointer;
}
.btn:hover{ border-color:#C8A882; color:#C8A882; }
</style>
</head>
<body>

<div class="top-label">Client App Walkthrough · Home → Journey → Homecare → Book</div>

<div class="device-wrap">
  <div class="shell">
    <div class="sb">
      <span id="clock">9:41</span>
      <div class="ic"><i class="ti ti-wifi"></i><i class="ti ti-battery-4"></i></div>
    </div>
    <div class="topbar">
      <div class="logo"><i class="ti ti-sparkles"></i></div>
      <div id="tt">Bloom Aesthetics</div>
      <div class="avatar">MR</div>
    </div>
    <main class="scr" id="scr"></main>
    <nav class="nav" id="navbar">
      <button class="ni active" id="ni-home"><i class="ti ti-home"></i><span>Home</span><span class="tapdot"></span></button>
      <button class="ni" id="ni-journey"><i class="ti ti-chart-line"></i><span>Journey</span><span class="tapdot"></span></button>
      <button class="ni" id="ni-homecare"><i class="ti ti-droplet"></i><span>Homecare</span><span class="tapdot"></span></button>
      <button class="ni" id="ni-messages"><i class="ti ti-message-circle"></i><span>Messages</span><span class="tapdot"></span></button>
      <button class="ni" id="ni-shop"><i class="ti ti-shopping-bag"></i><span>Shop</span><span class="tapdot"></span></button>
    </nav>
  </div>

  <div class="caption-bar">
    <div class="eyebrow" id="capEyebrow">01 — Home</div>
    <div class="line" id="capLine">This is exactly what your client sees the morning after booking.</div>
  </div>

  <div class="controls">
    <button class="btn" id="playBtn">Pause</button>
    <button class="btn" id="replayBtn">Replay</button>
  </div>
</div>

<script>
/* ---------------- screen markup, styled to match the real client app ---------------- */

      <div style="flex:1;">
        <div style="font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Next appointment</div>

      </div>

    <button style="width:100%;margin-top:14px;background:rgba(200,168,130,.15);border:1px solid rgba(200,168,130,.3);border-radius:10px;padding:10px;display:flex;align-items:center;justify-content:center;gap:7px;">
      <i class="ti ti-calendar-plus" style="font-size:15px;color:var(--accent);"></i>

        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);">67%</div>
      </div>
    </div>
  </div>

  <div class="card" style="cursor:pointer;display:flex;align-items:center;gap:12px;">
    <div style="width:42px;height:42px;background:var(--accent-lt);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-clipboard-check" style="font-size:20px;color:var(--accent);"></i></div>
    <div style="flex:1;"><div style="font-size:13px;font-weight:600;color:#1a1a1a;">Pre-visit check-in</div>
    <div style="font-size:12px;color:#b8a898;">Quick prep so Priya is ready for Thursday</div></div>
    <span style="font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-lt);padding:4px 10px;border-radius:20px;flex-shrink:0;">Start</span>
  </div>

  <div class="card" style="cursor:pointer;display:flex;align-items:center;gap:12px;">
    <div style="width:42px;height:42px;background:var(--accent-lt);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-file-text" style="font-size:20px;color:var(--accent);"></i></div>
    <div style="flex:1;"><div style="font-size:13px;font-weight:600;color:#1a1a1a;">Latest summary</div>

  <div class="sh"><h2>Quick actions</h2></div>

      <i class="ti ti-chart-line" style="font-size:22px;color:var(--accent);display:block;margin-bottom:8px;"></i>
      <div style="font-size:13px;font-weight:600;color:#1a1a1a;">My journey</div><div style="font-size:11px;color:#9a8a7e;margin-top:2px;">Your progress</div>

function messagesScreen(){
  return `
  <div style="padding:10px 16px;border-bottom:1px solid #f0ebe4;display:flex;align-items:center;gap:10px;background:#fff;">
    <div style="width:38px;height:38px;border-radius:50%;background:var(--accent-lt2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);border:1.5px solid #e8d0b8;">PR</div>
    <div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#1a1a1a;">Priya</div>
    <div style="font-size:11px;color:#b8a898;">Bloom Aesthetics · Typically replies same day</div></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#4ec49a;"></div>
  </div>
  <div id="chatBody" style="padding:14px 16px;display:flex;flex-direction:column;gap:10px;">
    <div style="text-align:center;font-size:11px;color:#b8a898;background:#faf7f4;border-radius:20px;padding:4px 12px;align-self:center;">Jun 30</div>
    <div style="align-self:flex-start;max-width:82%;">

      <div style="font-size:10px;color:#c4b9ae;margin-top:3px;">9:14 AM</div>
    </div>
  </div>

    <div style="width:36px;height:36px;border-radius:50%;background:#faf7f4;border:1.5px solid #e8ddd3;flex-shrink:0;"></div>
    <div id="chatInput" style="flex:1;background:#faf7f4;border:1.5px solid #e8ddd3;border-radius:20px;padding:9px 14px;font-size:13px;color:#1a1a1a;min-height:18px;"></div>
    <button style="width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-send" style="font-size:15px;color:#fff;"></i></button>

function shopProductCard(icon,name,brand,why,idx,opts){
  return `<div class="shop-card" data-i="${idx}" style="background:#fff;border:1.5px solid #f0ebe4;border-radius:14px;margin:0 16px 10px;overflow:hidden;">

        <span style="font-size:28px;line-height:1;">${icon}</span>

        </div>
        <button class="heart-btn" data-i="${idx}" style="width:34px;height:34px;border-radius:50%;border:1.5px solid #e8ddd3;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">

        </button>
      </div>

        <div style="font-size:11px;font-weight:600;color:#b8a898;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Why Priya recommends this</div>
        <div style="font-size:13px;color:#6b5d52;line-height:1.6;">${why}</div>
      </div>
      <button class="buy-btn" data-i="${idx}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;transition:transform .15s;"><i class="ti ti-shopping-bag" style="font-size:15px;"></i> Buy · ${opts} ways to get it</button>

const buyOptions = {
  0: { icon:'🧴', name:'Barrier Repair Cream', brand:'Rooted Botanicals',
    rows:[
      {icon:'ti-building-store',title:'Buy in office',sub:'Pick up at your next visit · tap to message Priya',highlight:true},
      {icon:'ti-shopping-bag',title:"Buy from Bloom Aesthetics",sub:'bloomaesthetics.com/shop/barrier-cream',code:'MAYA10'},
      {icon:'ti-external-link',title:'Shop at Rooted Botanicals',sub:'rootedbotanicals.com/barrier-repair',code:''},
      {icon:'ti-brand-amazon',title:'Buy on Amazon',sub:'amzn.to/priya-skincare',code:'PRIYASKIN'},
    ]
  }
};

function buySheetHTML(p){
  const cline = code => code ? `<div style="display:flex;align-items:center;gap:8px;margin-top:5px;padding:8px 11px;background:var(--accent-a30);border:1px dashed var(--accent);border-radius:10px;">
      <i class="ti ti-discount-2" style="font-size:15px;color:var(--accent);flex-shrink:0;"></i>
      <div style="flex:1;min-width:0;font-size:12px;color:#6b5d52;">Use <b style="color:var(--accent);letter-spacing:.03em;">${code}</b> at checkout</div>
      <button class="copy-code-btn" style="border:1.5px solid var(--accent);background:none;color:var(--accent);border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;">Copy</button>
    </div>` : '';
  const rows = p.rows.map(r=>`
    <div style="margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid ${r.highlight?'var(--accent)':'#f0ebe4'};background:${r.highlight?'var(--accent-a30)':'#fff'};border-radius:12px;">
        <i class="ti ${r.icon}" style="font-size:18px;color:var(--accent);flex-shrink:0;"></i>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:#1a1a1a;">${r.title}</div>
          <div style="font-size:11px;color:#b8a898;word-break:break-all;">${r.sub}</div>
        </div>
        <i class="ti ti-chevron-right" style="color:#c4b9ae;flex-shrink:0;"></i>
      </div>
      ${cline(r.code)}
    </div>`).join('');
  return `<div id="buySheetCard" style="background:#fff;width:100%;border-radius:16px 16px 0 0;padding:16px;box-shadow:0 -8px 30px rgba(0,0,0,.18);position:absolute;left:0;right:0;bottom:0;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span style="font-size:22px;">${p.icon}</span>
      <div style="flex:1;"><div style="font-size:15px;font-weight:700;color:#1a1a1a;">${p.name}</div><div style="font-size:12px;color:#b8a898;">${p.brand}</div></div>
      <span id="closeSheetX" style="font-size:20px;color:#b8a898;line-height:1;">✕</span>
    </div>
    <div style="font-size:11px;color:#b8a898;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:8px;">Where to buy</div>
    ${rows}
  </div>`;
}

function shopScreen(){
  return `
  <div style="padding:14px 16px 12px;"><div style="font-size:17px;font-weight:700;color:#1a1a1a;">Priya's Shop</div></div>

function smoothScrollEl(el, toFraction, dur){
  return new Promise(resolve=>{
    if(!el){ resolve(); return; }
    const start = performance.now();
    const from = el.scrollTop;
    const to = (el.scrollHeight - el.clientHeight) * toFraction;
    function step(t){
      const p = Math.min(1,(t-start)/dur);
      const eased = p<0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
      el.scrollTop = from + (to-from)*eased;
      if(p<1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

function animateSlider(){
  const line = document.getElementById('compareLine');
  const before = document.getElementById('compareBefore');
  if(!line || !before) return Promise.resolve();
  return new Promise(resolve=>{
    const target = 78;
    const start = performance.now();
    function step(t){
      const p = Math.min(1,(t-start)/1500);
      const eased = 1-Math.pow(1-p,3);
      const val = 50 + (target-50)*eased;
      line.style.left = val+'%';
      before.style.clipPath = `inset(0 ${100-val}% 0 0)`;
      if(p<1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

function selectDateChip(idx, role){
  const chips = document.querySelectorAll('.date-chip');
  chips.forEach(c=>{
    const i = +c.dataset.i;

    const roleEl = c.querySelector('.date-chip-role');
    if(i===idx){
      c.style.background = 'var(--accent)'; c.style.borderColor='var(--accent)';
      nameEl.style.color = '#fff'; roleEl.style.color='rgba(255,255,255,.8)'; roleEl.textContent = role;
    } else if(c.dataset.locked==='1'){
      c.style.background='var(--accent-lt)'; c.style.borderColor='#d4a870';
      nameEl.style.color='#9a7a5e'; roleEl.style.color='#b89a6e';
    } else {
      c.style.background='#faf7f4'; c.style.borderColor='#e8ddd3';
      nameEl.style.color='#b8a898'; roleEl.style.color='#c4b9ae'; roleEl.textContent='·';
    }
  });
}

let screenEls = {};

function ensureScreen(key, builder){
  if(!screenEls[key]){
    const d = document.createElement('div');
    d.className = 'screen';
    d.innerHTML = builder();
    scrEl.appendChild(d);
    screenEls[key] = d;
  }
  return screenEls[key];
}

function setActiveNav(key){
  Object.values(navBtns).forEach(id=>document.getElementById(id).classList.remove('active'));
  if(navBtns[key]) document.getElementById(navBtns[key]).classList.add('active');
}

function pressNav(key, cb){
  const id = navBtns[key];
  if(!id){ cb(); return; }
  const btn = document.getElementById(id);
  btn.classList.add('press');
  setTimeout(()=>{ btn.classList.remove('press'); cb(); }, 260);
}

function showStep(i){
  const s = seqFinal[i];
  const isLast = i === seqFinal.length - 1;
  const key = s.nav + (s.customNav || isLast ? ':' + i : '');
  const doSwitch = ()=>{
    removeBuySheet();
    Object.values(screenEls).forEach(el=>el.classList.remove('on'));
    const el = ensureScreen(key, s.build);
    if(isLast) el.scrollTop = 0;
    void el.offsetWidth;
    el.classList.add('on');
    ttEl.style.opacity = 0;
    setTimeout(()=>{ ttEl.textContent = s.title; ttEl.style.opacity = 1; }, 150);
    setActiveNav(s.nav);
    if(s.eyebrow){ capEyebrow.textContent = s.eyebrow; capLine.textContent = s.line; }
    if(s.after) setTimeout(s.after, 250);
  };
  if(!s.customNav){ pressNav(s.nav, doSwitch); } else { doSwitch(); }
}

function schedule(){
  clearTimeout(timer);
  timer = setTimeout(()=>{
    if(step === seqFinal.length-1){ playing=false; document.getElementById('playBtn').textContent='Play'; return; }
    step++;
    showStep(step);
    schedule();
  }, seqFinal[step].dur);
}

document.getElementById('playBtn').addEventListener('click', ()=>{
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? 'Pause' : 'Play';
  if(playing) schedule(); else clearTimeout(timer);
});
document.getElementById('replayBtn').addEventListener('click', ()=>{
  clearTimeout(timer);
  screenEls = {};
  scrEl.innerHTML = '';
  step = 0;
  playing = true;
  document.getElementById('playBtn').textContent = 'Pause';
  showStep(0);
  schedule();
});

showStep(0);
schedule();

/* live clock in status bar, purely cosmetic realism */
function tickClock(){
  const now = new Date();
  let h = now.getHours()%12; if(h===0)h=12;
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m;
}
tickClock(); setInterval(tickClock, 30000);
</script>
